    overcall: "Natural, good suit required"
    note: "Dangerous position — only act with shape or genuine strength"

# ── Defensive Carding ─────────────────────────────

carding:
  principle: "Use your head first. Signals are a last resort."

  signal_selection:
    axis_1_partner_need: >
      Ace lead → count. Dummy threatens → count. Shift question → suit preference.
      Default → attitude. Trumps → suit preference (TSP).
    axis_2_card_cost: "Cheapest card that conveys the message. Never signal with a trick."
    axis_3_adversarial_cost: >
      FREE signal = declarer already knows (bid suit count, obvious shift, overcalled suit).
      COSTLY signal = declarer gains info (unbid suit count, ambiguous attitude, critical guess).
      Prefer free. Costly only when defensive gain outweighs declarer gain.

  attitude:
    low: encourage
    high: discourage
    obvious_shift: >
      Trick 1: attitude refers to the obvious shift suit (dummy's shortest side suit,
      ≤1 honor, excluding trump/led/declarer's suits; vs NT = shortest). Encourage =
      continue (no shift tolerance). Discourage = wants the obvious shift. FREE signal.

  count:
    high: even
    low: odd

  smith_echo:
    name: "Reverse Smith Echo"
    when: "vs NT only, trick 2+, following to declarer's suit"
    low: "Like the opening lead suit (continue)"
    high: "Don't like it (switch)"
    adversarial_cost: "FREE"
    note: "Reverse Smith — matches our attitude (low = encourage)"
    exception: "Count overrides when dummy has entryless long suit"

  trump_signals:
    high_low: "Prefer higher-ranking side suit (TSP)"
    low_high: "Prefer lower-ranking side suit (TSP)"
    caution: "Never signal with potential trump tricks (Qxx)"

  suit_preference:
    name: Italian Style (on discards)
    odd_card: "Interest in discarded suit"
    low_even: "Interest in lower suit"
    high_even: "Interest in higher suit"

  discard_discipline: "Never signal with potential tricks. Cheapest card that conveys the message."

  leads:
    from_length: "3rd or 5th highest"
    from_sequences: "Top of sequence (AKx→K, KQx→K, QJx→Q, JTx→J, T9x→T)"
    AK_agreement: "K lead from AK; A asks for count"
    from_xx: "Higher"
    from_xxx: "Lowest (3rd highest)"
    from_xxxx: "Highest safe, then low"
    with_J: "Lead 4th highest (KJ732→3)"
    vs_suits: "Prefer sequences; avoid unsupported honours"
    vs_NT: "Longest suit unless bidding says opponents hold it"

  dummy_analysis:
    principle: "Classify dummy's suits → reconstruct declarer from bidding → choose defence line"
    suit_categories:
      running_threat: "5+ cards, 3+ honours (AKQxx, KQJ9x) — RACE to cash or CUT entries"
      establishable_source: "4+ cards, 1-2 honours (KJ84, Q10753) — HOLD UP, attack entries"
      attack_target: "≤3 cards or long without honours (73, xxx) — safe to LEAD"
      entry_suit: "Contains A or K as side entry — attack to strand long suit"
      trump_ruffing: "Short side suit + trumps = lead trumps to CUT RUFFS"
    five_lines:
      1_race: "Running threat + entries → cash winners NOW"
      2_entries: "Establishable source + limited entries → attack entries"
      3_passive: "Flat dummy, no threats → don't break new suits"
      4_cut_ruffs: "Singleton + trumps → lead trumps"
      5_force: "You have 4+ trumps → force declarer to ruff, shorten their trumps"
    bidding_clues:
      "1NT-3NT": "Balanced ~25 HCP, no long suit. Lead longest, then passive."
      "1M-2M-4M": "Dummy 6-9. Check for singleton. Flat = passive."
      "1M-3M-4M": "Dummy 10-12, 4+ trumps. More entries. Be active."
      "Weak two-4M": "Shape but no tricks. Cash fast."
