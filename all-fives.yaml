      2H: "Positive relay, balanced, no 5-card suit, 8+"
      2S: "5+ spades, 8+ (GF)"
      2NT: "5+ hearts, 8+ (GF, swapped with 2!S)"
      3C_3D: "5+ minor, GF, slam interest"

  2D:
    name: Strong Game-Force
    ltc: "3-4 losers"
    responses_controls: "A=2, K=1"
    2H: "0-1"
    2S: "2"
    2NT: "3"
    3C: "4"
    3D: "5"
    3H: "6"

  2H_2S:
    name: Weak Two
    hcp: 6-10
    ltc: "8-9 losers"
    suit: 6+ cards, 2+ of top 5 honours
    style: "Disciplined, especially vulnerable"
    avoid: "Void or strong 4-card side suit"
    ogust_2NT_asks:
      3C: "Min, poor suit"
      3D: "Min, good suit"
      3H: "Max, poor suit"
      3S: "Max, good suit"
      3NT: "Solid (AKQxxx+)"
    ogust_continuations:
      3M: "Sign-off"
      new_suit_3: "Forcing"
      3NT: "To play"
      4M: "To play"
      new_suit_4: "Cue-bid, slam try"
    interference_DOPI:
      XX: "= 3!C (min/poor)"
      Pass: "= 3!D (min/good)"
      overcall: "Ogust off, natural"

  2NT:
    hcp: 20-21, balanced
    responses:
      3C: "Puppet Stayman"
      3D: "Transfer to !H"
      3H: "Transfer to !S"
      4NT: "Quantitative (invite 6NT)"

  preempts:
