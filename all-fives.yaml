# All Fives — Compact Convention Card
# Quick reference for table use. Full specification: all-fives-verbose.yaml

system: All Fives
tagline: "Every 1-level suit opening promises 5+ cards (with known exceptions)."

# ── Openings ──────────────────────────────────────

openings:
  1NT:
    1st_2nd: 12-14 HCP, balanced (4333/4432/5332 incl. 5M)
    3rd_4th: 15-17 HCP, balanced
    responses:
      2C: "Split Stayman — 4-card major ask (inv+). Crawling: weak 4-4 majors"
      2D: "5-card major ask (inv+, 8+ HCP). Artificial 2!H denial"
      2H: "Natural, to play (weak, 5+ !H)"
      2S: "Natural, to play (weak, 5+ !S)"
      2NT: "Natural invitation (no 4M, no 5M)"
      3C: "5-5 minors, slam interest"
      3D: "5-5 majors, GF"
      3H: "Splinter — short !H, 5-4+ minors, slam interest"
      3S: "Splinter — short !S, 5-4+ minors, slam interest"
    split_stayman_2C:
      opener_rebids:
        2D: "No 4M (denial)"
        2H: "4+ hearts (may also have 4 spades)"
        2S: "4 spades, not 4 hearts"
      after_2D_denial:
        pass: "Weak, no 4M (drop)"
        2H: "Crawling — weak 4-4 majors. Opener passes or corrects to 2!S"
        2NT: "Invitational, no 4M"
        3H: "Smolen — 5!S + 4!H, GF (right-sides 5-3 !S fit)"
        3S: "Smolen — 5!H + 4!S, GF (right-sides 5-3 !H fit)"
        3NT: "Game values, no 4M"
    five_card_ask_2D:
      opener_rebids:
        2H: "No 5M (artificial denial — keeps 2NT free for invite)"
        2S: "5 spades"
        2NT: "5 hearts"
      after_2H_denial:
        pass: "Weak hand (rare — usually uses 2H/2S natural instead)"
        2S: "Natural invite, 5+ !S"
        2NT: "Invitational, no fit"
        3NT: "Game values, no fit"
      after_2S_five_spades:
        3S: "Invite with !S support"
        4S: "Game with !S support"
      after_2NT_five_hearts:
        3H: "Invite with !H support"
        4H: "Game with !H support"
    interference_after_asks:
      principle: "Pass = stolen denial. X = their suit. 3-level+ = system OFF."
      after_2D_X: "System ON (opener bids normally). Responder XX = penalty."
      after_2D_2H: "Pass = no 5M. X = 5!H. 2!S = 5!S."
      after_2D_2S: "Pass = no 5M. X = 5!S. 2NT = 5!H."
      after_2D_3plus: "System OFF. X = penalty-oriented."
      after_2C_X: "System ON (opener bids normally). Responder XX = penalty."
      after_2C_overcall: "Pass = no 4M. X = their suit. Bid = natural."
      after_2C_3plus: "System OFF. X = penalty-oriented."
    escape_1NTx:
      name: Helvic Wriggle
      XX: "One-suited (opener bids 2!C, pass or correct)"
      2C: "!C+!D (touching)"
      2D: "!D+!H (touching)"
      2H: "!H+!S (touching)"
      Pass: "To play / later"
      delayed_XX: "Non-touching (!C+!H or !D+!S)"
      strong_10plus: "Pass for penalty"

  1C_3rd_4th:
    seat: "3rd/4th"
    hcp: "8+"
    promise: "3+ clubs (best minor — SAYC style). 12-14 bal opens longest minor, 3-3 = 1♣."
    forcing_1nt: "OFF (responder is a passed hand — cannot force). 1NT = natural 6-10."
    note: "Best minor for balanced hands. 1♣ may be 3. 1♦ may be 3. 1♥/1♠ = strict 5+ in 3rd/4th."

  1_suit:
    1st_2nd: "12+ HCP (~7 losers)"
    3rd: "8+ HCP (light, tactical). Best minor: 1♣ may be 3, 1♦ may be 3. 1♥/1♠ strict 5+."
    suit_promises:
      1C: "4+ clubs (1st/2nd: 4 only with 15+ bal 3334. 3rd/4th: 3+ best minor)"
      1D: "4+ diamonds (1st/2nd). 3+ diamonds (3rd/4th best minor)"
      1H: "5+ hearts (may be 4: 4333 with 15+ bal in 1st/2nd only. 3rd/4th: strict 5+)"
      1S: "5+ spades (may be 4: 4333 or 4-4 majors in 1st/2nd. 3rd/4th: strict 5+)"
    rules:
      - "4-4 majors with 4+ minor: open the minor, show majors naturally"
      - "4-4 majors, no 4+ minor (15 HCP 1st/2nd): open 1♠, bid 2♥ next"
      - "4-4 majors, no 4+ minor (3rd/4th 12-14): open 1♣ (best minor)"
      - "4-4 majors, no 4+ minor (1st/2nd, 16-17): open 1♠, rebid 2NT"
      - "4-4 majors, no 4+ minor (3rd/4th, 15-17): open 1NT"
      - "4333 with 15+ bal: open the 4-card suit, rebid 2NT"
      - "2NT rebid = balanced (opening suit may be only 4)"
    1NT_response:
      meaning: "6-12 HCP, FORCING one round (DEC-6)"
      conditions: "No fit (≤3 cards), no new suit at 1-level. 1st/2nd seat only. OFF in competition and 3rd/4th seat (passed hand)."
      opener_rebids:
        after_1M:
          2_new_suit: "4+ cards, any strength"
          2M: "6+ in opened major, minimum"
          2NT: "15-17 balanced (4-card opening)"
          3M: "6+ in opened major, invitational"
          note: "After 1!S: 2!H is NOT a reverse (below 2!S)"
        after_1m:
          2_new_suit: "4+ cards (may be convenient rebid)"
          2m: "6+ in opened minor, minimum"
          2H_2S: "Reverse — 16+ HCP, 4+ (forcing)"
          2NT: "15-17 balanced (4-card opening)"
          3m: "6+ in opened minor, invitational"
      responder_second_bid:
        weak_6_9: "Place the contract: pass, correct to long suit, or give preference"
        inv_10_12: "Bid again: raise, preference, or 2NT"
        hidden_4M: "After 1m: show 4-card major now (inv+ values)"
      new_suit_at_1_level: "1st/2nd: 5+ (4-card hands route through forcing 1NT). Exception: 1♣-1♦ = 4+. 3rd/4th: 4+ (forcing 1NT off — passed hand)."
    raises:
      single: "6-9 HCP, 3+ support, 9-10 losers"
      limit: "10-12 HCP, 4+ support, 7-8 losers"
      game: "Distributional, 5+ support, 6-7 losers"
    raise_note: "After fit, use LTC: 24 - combined losers = tricks (H-8)"
    jump_responses_over_1M:
      seat_note: "1st/2nd seat (forcing 1NT ON) vs 3rd/4th (OFF) changes 2NT and 3M meaning."
      first_second:
        2NT: "LTC weak-suit ask — GF raise, 4+ trumps (opener: 3C/3D/3oM=3 losers in that suit, 3M=no weak suit)"
        3_new_suit: "Fit jump — good 5+ suit + 3+ support, inv 10-12"
        3M: "Slam try — 4+ trumps, GF, continue with cue-bids"
        4M: "Game raise, no slam interest (opener may try with 3 extra covers)"
      third_fourth:
        2NT: "Natural inv 11-12"
        3_new_suit: "Fit jump (same as 1st/2nd)"
        3M: "Limit raise 10-12, 4+ support"
        4M: "To play, distributional"
    jump_responses_over_1m:
      2NT: "Natural inv 11-12 balanced"
      3m: "Inv raise, 5+ support, 10-12"
      jump_major: "Strong jump shift — 16+ GF, 5+ suit"
      jump_other_minor: "Inv, 5+ suit, 10-12"
    two_over_one_gf:
      trigger: "New suit at 2-level by unpassed hand (13+ HCP) = GF"
      opener_rebids: "2M=6+, new suit=4+, 2NT=12-14 bal, raise=4+, 3M=6+ extras, 3NT=15-17 bal"
      responder_after_nt: "Pass 3NT, 4M=3+ support, 4NT=quantitative, new suit over 2NT=forcing"
      fourth_suit: "Natural (4+ cards) — GF already established, no artificial ask needed"
      competitive: "GF survives interference. Pass=forcing, X=penalty, new suit=natural forcing"
      slam: "Cuebid controls up the line (bypass=denial), then RKCB 4NT"
      minor_fit: "Prefer 3NT unless unstopped suit, extreme shape, or 33+ HCP"
      exceptions: "OFF in 3rd/4th seat (passed hand) and after interference on the opening bid"

  2C:
    name: Benji
    type_1: "22-23 bal (2!C-2!D-2NT)"
    type_2: "Strong major, ~5 losers, 5+ suit, 3 top honours (2!C-2!D-2!H/2!S)"
    type_3:
      name: "Strong Two-Suiter (~4 losers, 5-5+)"
      after_2C_2D:
        3C: "Clubs + any suit. Suit=pass/correct (3!D nat, pass/3!H/3!S). 3NT asks (4!C=C+D, 4!D=C+H, 4!H=C+S)"
        3D: "Diamonds + a major. 3!H=pass/correct (pass=D+H, 3!S=D+S). 3NT asks (4!C=D+H, 4!D=D+S)"
        3H: "Both majors (known — bid naturally)"
        3S: "4!S + 6+ minor. 4!C=pass/correct (pass=S+C, 4!D=S+D). 3NT asks (4!C=S+C, 4!D=S+D)"
        3NT: "4!H + 6+ minor. 4!C=pass/correct only (pass=H+C, 4!D=H+D)"
    responses:
      2D: "Relay (always) — opener describes hand with rebid"

  2D:
    name: Strong Game-Force
    ltc: "3-4 losers"
    responses_controls: "A=2, K=1"
    2H: "0-1"
    2S: "2"
    2NT: "3"
    3C: "4"
    3D: "5"
    3H: "6"
    interference:
      principle: "DOPI/ROPI — preserve control steps. Penalties on second round (forcing pass)."
      after_X: "ROPI: XX=0-1, Pass=2, 2H=3, 2S=4, 2NT=5, 3C=6"
      after_2H: "DOPI: X=0-1, Pass=2, 2S=3, 2NT=4, 3C=5, 3D=6"
      after_2S: "DOPI: X=0-1, Pass=2, 2NT=3, 3C=4, 3D=5, 3H=6"
      after_2NT: "DOPI: X=0-1, Pass=2, 3C=3, 3D=4, 3H=5, 3S=6"
      after_3_level: "DOPI compressed: X=0-1, Pass=2, cheapest=3, next=4..."
      after_4_level: "DEPO: X=even (0,2,4,6), Pass=odd (1,3,5)"
      after_5_level: "Forcing pass. Pull of X = slam values."
      penalty: "Second-round X by either partner = PENALTY"

  2H_2S:
    name: Weak Two
    hcp: 6-10
    ltc: "8-9 losers"
    suit: 6+ cards, 2+ of top 5 honours
    style: "Disciplined, especially vulnerable"
    avoid: "Void or strong 4-card side suit"
    ogust_2NT_asks:
      3C: "Min, poor suit"
      3D: "Min, good suit"
      3H: "Max, poor suit"
      3S: "Max, good suit"
      3NT: "Solid (AKQxxx+)"
    ogust_continuations:
      3M: "Sign-off"
      new_suit_3: "Forcing"
      3NT: "To play"
      4M: "To play"
      new_suit_4: "Cue-bid, slam try"
    interference_DOPI:
      XX: "= 3!C (min/poor)"
      Pass: "= 3!D (min/good)"
      overcall: "Ogust off, natural"

  2NT:
    hcp: 20-21, balanced
    responses:
      3C: "Puppet Stayman"
      3D: "Transfer to !H"
      3H: "Transfer to !S"
      4NT: "Quantitative (invite 6NT)"

  preempts:
    3x: "7+ cards, ~5-10 HCP, 7-8 losers (fav: 8-9, unfav: 7), destructive"
    3NT: "UCM Shape — two same-shape suits (♠♦ or ♥♣), 5-5+, ≤3 losers. 4♣ asks: 4♦=pointed, 4♥=rounded"
    4C: "UCM Color — two same-color suits (♥♦ or ♠♣), 5-5+, ≤3 losers. 4♦ asks: 4♥=red, 4♠=black"
    4D: "UCM Rank — two same-rank suits (♠♥ or ♣♦), 5-5+, ≤3 losers. 4♥ asks: 4♠=majors, 4NT=minors"
    4H_4S: "To play (distributional or preemptive)"
    4NT: "Acol Specific Ace Ask (monster hand): 5C=none, 5D=♦A, 5H=♥A, 5S=♠A, 5NT=♣A, 6C=two aces"
    5C_5D: "Extreme preempt or to play"

