# All Fives — Compact Convention Card
# Quick reference for table use. Full specification: all-fives-verbose.yaml

system: All Fives
tagline: "Every 1-level suit opening promises 5+ cards."

# ── Openings ──────────────────────────────────────

openings:
  1NT:
    1st_2nd: 12-14 HCP, balanced (4333/4432/5332 incl. 5M)
    3rd: 15-17 HCP, balanced
    responses:
      2C: "Puppet Stayman (asks 5-card major)"
      2D: "Transfer to !H"
      2H: "Transfer to !S"
      2S: "Transfer to !C"
      3C: "Transfer to !D"
    puppet_stayman:
      2D: "Denies 5M"
      2H: "5 hearts"
      2S: "5 spades"
      after_2D_denial:
        2H: "4 spades (transfer-like), opener bids 2!S or 2NT"
        2S: "4 hearts (transfer-like), opener bids 3!H or 2NT"
        2NT: "No 4M, invitational"
        3NT: "No 4M, game values"
    escape_1NTx:
      name: Helvic Wriggle
      XX: "One-suited (opener bids 2!C, pass or correct)"
      2C: "!C+!D (touching)"
      2D: "!D+!H (touching)"
      2H: "!H+!S (touching)"
      Pass: "To play / later"
      delayed_XX: "Non-touching (!C+!H or !D+!S)"
      strong_10plus: "Pass for penalty"

  1_suit:
    1st_2nd: 12+ HCP (~7 losers), 5+ cards (4+ with 15-17 bal, rebid NT)
    3rd: 8+ HCP, 5+ cards (light, tactical)
    rules:
      - "Two 4-card suits: open lower"
      - "15-17 bal: open 4 cards, rebid NT"
      - "2NT rebid confirms 4 cards in opened suit"
    1NT_response: "6-9, no fit, no 5M (non-forcing; see H-2)"
    raises:
      single: "6-9 HCP, 3+ support, 9-10 losers"
      limit: "10-12 HCP, 4+ support, 7-8 losers"
      game: "Distributional, 5+ support, 6-7 losers"
    raise_note: "After fit, use LTC: 24 - combined losers = tricks (H-8)"

  2C:
    name: Benji
    type_1: "22-23 bal (2!C-2!D-2NT)"
    type_2: "Strong major, ~5 losers, 5+ suit, 3 top honours (2!C-2!D-2!H/2!S)"
    type_3: "Reserved (see H-6: strong two-suiters 18-21, 5-5+)"
    responses:
      2D: "Waiting (0-7)"
      2H: "Positive relay, balanced, no 5-card suit, 8+"
      2S: "5+ spades, 8+ (GF)"
      2NT: "5+ hearts, 8+ (GF, swapped with 2!S)"
      3C_3D: "5+ minor, GF, slam interest"

  2D:
    name: Strong Game-Force
    ltc: "3-4 losers"
    responses_controls: "A=2, K=1"
    2H: "0-1"
    2S: "2"
    2NT: "3"
    3C: "4"
    3D: "5"
    3H: "6"

  2H_2S:
    name: Weak Two
    hcp: 6-10
    ltc: "8-9 losers"
    suit: 6+ cards, 2+ of top 5 honours
    style: "Disciplined, especially vulnerable"
    avoid: "Void or strong 4-card side suit"
    ogust_2NT_asks:
      3C: "Min, poor suit"
      3D: "Min, good suit"
      3H: "Max, poor suit"
      3S: "Max, good suit"
      3NT: "Solid (AKQxxx+)"
    ogust_continuations:
      3M: "Sign-off"
      new_suit_3: "Forcing"
      3NT: "To play"
      4M: "To play"
      new_suit_4: "Cue-bid, slam try"
    interference_DOPI:
      XX: "= 3!C (min/poor)"
      Pass: "= 3!D (min/good)"
      overcall: "Ogust off, natural"

  2NT:
    hcp: 20-21, balanced
    responses:
      3C: "Puppet Stayman"
      3D: "Transfer to !H"
      3H: "Transfer to !S"
      4NT: "Quantitative (invite 6NT)"

  preempts:
    3x: "7+ cards, ~5-10 HCP, 7-8 losers (fav: 8-9, unfav: 7), destructive"
    3NT: "Gambling (AKQxxxx+ minor, no outside A/K)"
    4H_4S: "To play (distributional or preemptive)"
    4C_4D: "Strong preempt (8+ minor)"
    5C_5D: "Extreme preempt or to play"

# ── Defensive Bidding (when opponents open) ───────

competitive:
  vulnerability_ltc:
    principle: "All defensive actions governed by LTC adjusted for vulnerability"
    favorable: "NV vs Vul — act with 1 more loser than standard"
    equal: "Both Vul or both NV — standard thresholds"
    unfavorable: "Vul vs NV — require 1 fewer loser than standard"

  overcalls:
    simple: "8 losers at equal (9 fav, 7 unfav), 5+ cards, suit quality > HCP"
    jump: "Weak, 9 losers at equal (10 fav, 8 unfav)"
    takeout_X: "All unbid suits, 6 losers at equal (12+ HCP or any 17+)"

  RAPTOR:
    trigger: "1NT overcall of opponent's suit opening"
    shows: "4 in unbid major + 5+ in a minor, 8 losers (9 fav, 7 unfav)"
    vs_major:
      cue_bid: "Asks major"
      2_other_minor: "To play"
      2_unbid_major: "Natural 5+"
      2NT: "Invitational+"
    vs_minor:
      2C_cheapest: "Pass or correct"
      cue_bid: "Asks major"
      2H_2S: "Natural 5+"
      2NT: "Invitational+"

  CRASH:
    name: "CRASH over artificial/strong openings"
    trigger: "Opponents open strong 1!C, 2!C, 2!D, or short club (2+)"
    principle: "Color-Rank-Shape: three bids showing two-suited hands by suit pairing"
    definitions:
      Color: "Two same-color suits (!H+!D reds or !S+!C blacks)"
      Rank: "Two same-rank suits (!H+!S majors or !C+!D minors)"
      Shape: "Two same-shape suits (!S+!D pointed or !H+!C rounded)"
    vs_strong_2C:
      X: "Color"
      2D: "Rank"
      2H_2S: "Natural 5+"
      2NT: "Shape"
    vs_strong_1C:
      X: "Color"
      1D: "Rank"
      1H_1S: "Natural 5+"
      1NT: "Shape"
    vs_strong_2D:
      X: "Color"
      2H: "Rank"
      2S: "Natural 5+"
      2NT: "Shape"
    requirements: "5-4+ shape (5-5+ unfav), LTC: 8 equal / 9 fav / 7 unfav"
    advancer: "Pass/correct — bid better suit in the shorter possible pair"

  defense_vs_1NT:
    name: "CRASH defense to 1NT (differentiated by strength)"
    vs_strong_NT:
      label: "Vs strong NT (15-17)"
      X: "Color"
      2C: "Rank"
      2D: "Shape"
      2H_2S: "Natural 5+"
    vs_weak_NT:
      label: "Vs weak NT (12-14)"
      X: "Penalty (15+)"
      2C: "Color"
      2D: "Rank"
      2H_2S: "Natural 5+"
      2NT: "Shape"
    after_penalty_X: "If opponents run: revert to natural bidding"
    requirements: "5-4+ shape, LTC: 8 equal / 9 fav / 7 unfav. Penalty X: 15+ HCP"

  michaels:
    name: "Michaels Cuebid"
    trigger: "Cuebid of opponent's natural suit opening"
    over_minor: "Both majors (5-5+)"
    over_major: "Other major + unspecified minor (2NT/3!C asks which)"
    range: "Weak (8-9 losers) or strong (5-6 losers); intermediate overcall first"

  unusual_2NT:
    name: "Unusual 2NT"
    trigger: "Jump to 2NT over opponent's 1-level suit opening"
    shows: "Two lowest unbid suits (5-5+)"
    range: "Same as Michaels: weak (8-9 losers) or strong (5-6 losers)"

  lebensohl:
    name: "Lebensohl after double of weak two"
    trigger: "Partner doubles opponent's weak two for takeout"
    2NT: "Relay to 3!C (weak hand, pass or correct)"
    direct_3_level: "Invitational (8-11 HCP)"
    cuebid: "Game-forcing, asks stopper"
    slow_shows_fast_denies: "Via 2NT then 3NT = stopper; direct 3NT = no stopper"

# ── Defensive Carding ─────────────────────────────

carding:
  principle: "Use your head first. Signals are a last resort."

  attitude:
    low: encourage
    high: discourage
    exception: "Ace lead → give count (even/odd)"

  count:
    high: even
    low: odd

  suit_preference:
    name: Italian Style (on discards)
    odd_card: "Interest in discarded suit"
    low_even: "Interest in lower suit"
    high_even: "Interest in higher suit"

  leads:
    from_length: "3rd or 5th highest"
    from_sequences: "Top of sequence (AKx→K, KQx→K, QJx→Q, JTx→J, T9x→T)"
    AK_agreement: "K lead from AK; A asks for count"
    from_xx: "Higher"
    from_xxx: "MUD (middle-up-down)"
    from_xxxx: "Highest safe, then low"
    with_J: "Lead 4th highest (KJ732→3)"
    vs_suits: "Prefer sequences; avoid unsupported honours"
    vs_NT: "Longest suit unless bidding says opponents hold it"
