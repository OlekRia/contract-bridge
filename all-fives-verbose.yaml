# All Fives Bidding System
# Card symbols: !S = spades, !H = hearts, !D = diamonds, !C = clubs
# Card ranks: A K Q J T 9 8 7 6 5 4 3 2 (T = ten)
# A natural, disciplined bidding system built on common sense.

system:
  name: All Fives
  tagline: "A natural, disciplined bidding system built on common sense."
  central_idea: "Every 1-level suit opening promises 5+ cards, with known exceptions."
  exceptions:
    - >
      1!C: 4+ clubs in any seat (not always 5). In 1st/2nd: 4 only with
      15+ balanced 3-3-3-4. In 3rd/4th: 4+ always (12-14 balanced
      without 4+!C opens its 4-card suit instead).
    - >
      1!D: 4+ diamonds in 1st/2nd seat (not always 5). 3+ in 3rd/4th (best minor).
      Balanced hands with no 5-card suit open 1!D when they have 4+ diamonds.
    - >
      1!H: usually 5+, but 4 with 4333 shape when no 4+ minor is
      available. In 1st/2nd: 15+ HCP only. In 3rd/4th: also 12-14
      (can't open 1NT). Rebid 2NT (15-17) or pass 1NT (3rd/4th min).
    - >
      1!S: usually 5+, but 4 with 4-4 majors and no 4+ minor
      (any seat, any strength). Open 1!S, bid 2!H next (not a reverse).
      In 3rd/4th seat with 12-14, this replaces the old prepared 1!C.

philosophy:
  - "No crazy openings. Bids mean what they look like."
  - "Partner is reliable. Trust his bids."
  - "Use the opponents' information."
  - "Stay flexible. This is an experimental system."
  - "Most auctions are competitive. Keep opening principles in mind."

known_problems:
  - id: 1
    problem: >
      3rd/4th seat 1NT is 15-17 HCP (not 12-14), because a weak NT
      blocks us without a chance at game. 12-14 balanced hands open
      their 4-card suit directly (1!C = 4+, 1!D/1!H/1!S as available).
      RESOLVED (AMD-8 + DEC-6): prepared 1!C eliminated. All 3rd/4th
      seat suit openings are real (4+). Forcing 1NT is OFF in 3rd/4th
      seat (responder is a passed hand). 1NT = natural, non-forcing.
  - id: 2
    problem: "The 4441 distribution. Every system struggles with this."
  - id: 3
    problem: >
      1!H and 1!S usually promise 5, but may show only 4: (A) 15+ balanced
      with 4333 or 4-4 majors (any seat), (B) 12-14 balanced in 3rd/4th seat
      (can't open 1NT). Partner must be aware: after opener rebids 2NT (15-17)
      or a convenient minor (12-14), the opening suit may be only 4.
  - id: 4
    problem: >
      New defensive bidding package (UCM, Michaels, Lebensohl) is adopted but
      untested at the table. See H-7 for the effectiveness tracking plan.

# ──────────────────────────────────────────────
# Openings
# ──────────────────────────────────────────────

openings:

  # ── 1NT ────────────────────────────────────
  - bid: 1NT
    seat: "1st/2nd"
    hcp: "12-14"
    shape: ["4333", "4432", "5332"]
    note: "5332 includes a 5-card major."

  - bid: 1NT
    seat: "3rd"
    hcp: "15-17"
    shape: ["4333", "4432", "5332"]
    note: >
      Stronger range in 3rd seat. With a weak 12-14 hand we risk
      blocking ourselves from game when partner passed with 11.
      With 12-14 balanced, open a suit and plan a 1NT rebid (see below).

  - bid: 1NT
    seat: "4th"
    hcp: "15-17"
    shape: ["4333", "4432", "5332"]
    note: >
      Same strong range as 3rd seat. With 12-14 balanced in 4th seat,
      either pass (acceptable — everyone else passed) or open a suit
      planning a 1NT rebid to show 12-14 balanced.

  - bid: 1NT
    section: upgrade_policy
    name: "1NT Upgrade / Downgrade Policy"
    note: >
      Borderline hands may be upgraded or downgraded by 1 HCP for
      1NT purposes. This applies in all seats but matters most in
      3rd/4th seat where the gap between weak (12-14) and strong
      (15-17) NT creates difficult hands at 14-15 HCP.
    upgrade: >
      Add 1 HCP when: all honours are concentrated (working together
      in long suits or honour combinations like KQ10, QJ10, AJ10),
      multiple good intermediates (10s, 9s), or a 5-card suit with
      body. A strong 14 may be opened 1NT (15-17) in 3rd/4th seat.
    downgrade: >
      Subtract 1 HCP when: scattered quacks in short suits (Qx, Jx),
      4333 shape, no intermediates, or honours in opponent's suit
      (after an overcall). A flat 15 with quacks may be opened at
      the 1-level instead of 1NT.

  - bid: 1NT
    section: responses
    note: >
      H-10 Split Stayman replaces Puppet Stayman + transfers. Two asking bids
      (2!C = 4-card ask, 2!D = 5-card ask) plus natural sign-offs (2!H/2!S).
      No transfers — weak major hands bid naturally. Artificial 2!H denial after
      2!D keeps 2NT free for responder's invitation.
    responses:
      - bid: 2!C
        meaning: "Split Stayman — 4-card major ask (inv+)"
        continuations:
          - bid: 2!D
            meaning: "No 4-card major (denial)"
          - bid: 2!H
            meaning: "4+ hearts (may also have 4 spades)"
          - bid: 2!S
            meaning: "4 spades, not 4 hearts"
        after_2d_denial:
          - bid: Pass
            by: responder
            meaning: "Weak, no 4M — drop in 1NT"
          - bid: 2!H
            by: responder
            meaning: "Crawling Stayman — weak 4-4 majors. Opener passes (4!H) or corrects to 2!S (4!S)."
          - bid: 2NT
            by: responder
            meaning: "Invitational, no 4-card major"
          - bid: 3!H
            by: responder
            meaning: "Smolen — 5!S + 4!H, GF. Opener bids 3!S with 3-card support, 3NT without."
          - bid: 3!S
            by: responder
            meaning: "Smolen — 5!H + 4!S, GF. Opener bids 4!H with 3-card support, 3NT without."
          - bid: 3NT
            by: responder
            meaning: "Game values, no 4-card major"
          - note: >
              Crawling Stayman (2!H after denial): responder has weak 4-4 majors,
              wants to play in 2!H or 2!S. Opener passes with 4!H, corrects to 2!S
              with 4!S, or passes with neither (2!H is the safer partscore).
              Smolen (3!H/3!S): shows 5 of the OTHER major + 4 of the bid major, GF.
              This right-sides 5-3 fits — opener declares from the strong side.
      - bid: 2!D
        meaning: "5-card major ask (inv+, 8+ HCP)"
        note: >
          Asks opener for a 5-card major. The artificial 2!H denial (= no 5M) keeps
          bidding one level lower than Puppet's 2NT denial, preserving 2NT for
          responder's invitation bid. This makes 2!D usable for invitational hands
          (not just game-forcing), finding inv-level 5-3 major fits.
        continuations:
          - bid: 2!H
            meaning: "No 5-card major (artificial denial)"
          - bid: 2!S
            meaning: "5 spades"
          - bid: 2NT
            meaning: "5 hearts"
        after_2h_denial:
          - bid: Pass
            by: responder
            meaning: "Weak (rare — usually uses natural 2!H/2!S instead)"
          - bid: 2!S
            by: responder
            meaning: "Natural invite, 5+ spades"
          - bid: 2NT
            by: responder
            meaning: "Invitational, no fit"
          - bid: 3NT
            by: responder
            meaning: "Game values, no fit"
        after_2s_five_spades:
          - bid: 3!S
            by: responder
            meaning: "Invite with spade support"
          - bid: 4!S
            by: responder
            meaning: "Game with spade support"
        after_2nt_five_hearts:
          - bid: 3!H
            by: responder
            meaning: "Invite with heart support"
          - bid: 4!H
            by: responder
            meaning: "Game with heart support"
        interference_after_2D:
          - trigger: "1NT - 2!D - (X)"
            rule: "System ON. Opener bids normally (2!H = no 5M, 2!S = 5!S, 2NT = 5!H). Responder may XX for penalty (strong diamonds)."
          - trigger: "1NT - 2!D - (2!H)"
            rule: "Pass = no 5M (denial). X = 5 hearts. 2!S = 5 spades."
            responder_after_pass: "X = penalty, 2!S = natural, 2NT = invite, 3NT = game."
          - trigger: "1NT - 2!D - (2!S)"
            rule: "Pass = no 5M (denial). X = 5 spades. 2NT = 5 hearts."
            responder_after_pass: "X = penalty, 2NT = invite, 3NT = game."
          - trigger: "1NT - 2!D - (3-level+)"
            rule: "System OFF. Natural bidding. X = penalty-oriented."
        interference_after_2C:
          - trigger: "1NT - 2!C - (X)"
            rule: "System ON. Opener bids normally (2!D = no 4M, 2!H = 4+!H, 2!S = 4!S). Responder may XX for penalty (strong clubs)."
          - trigger: "1NT - 2!C - (2!D)"
            rule: "Pass = no 4M (denial). X = diamonds (opener has length). 2!H = 4+!H. 2!S = 4!S."
          - trigger: "1NT - 2!C - (2!H or 2!S)"
            rule: "Pass = no 4M. X = their suit. Bid = natural."
          - trigger: "1NT - 2!C - (3-level+)"
            rule: "System OFF. Natural bidding. X = penalty-oriented."
          - note: >
              Unified principle: Pass replaces stolen denial. X shows opener's holding
              in opponent's suit. Direct bids are natural. At 3-level+, system OFF.
      - bid: 2!H
        meaning: "Natural, to play — weak hand with 5+ hearts"
      - bid: 2!S
        meaning: "Natural, to play — weak hand with 5+ spades"
      - bid: 2NT
        meaning: "Natural invitation (no 4M, no 5M)"
      - bid: 3!C
        meaning: "5-5 minors, slam interest"
      - bid: 3!D
        meaning: "5-5 majors, GF"
      - bid: 3!H
        meaning: "Splinter — short hearts, 5-4+ minors, slam interest"
      - bid: 3!S
        meaning: "Splinter — short spades, 5-4+ minors, slam interest"

  - bid: 1NT
    section: escape_1ntx
    name: "Helvic Wriggle"
    trigger: "1NT - (X)"
    bids:
      - bid: XX
        meaning: "One-suited hand. Opener bids 2!C, responder passes or corrects."
      - bid: 2!C
        meaning: "!C + !D (touching pairs)"
      - bid: 2!D
        meaning: "!D + !H (touching pairs)"
      - bid: 2!H
        meaning: "!H + !S (touching pairs)"
      - bid: Pass
        meaning: "To play, or will bid later"
    delayed_xx:
      trigger: "Pass - Pass - XX"
      meaning: >
        SOS with non-touching pairs (!C+!H or !D+!S).
        Opener bids 2!C, responder passes or corrects.
    responder_actions:
      - hand: "Weak, shapely"
        action: "Wriggle (escape to a suit fit)"
      - hand: "Weak, balanced"
        action: "Pass (hope for the best)"
      - hand: "Strong (10+ HCP)"
        action: "Pass — penalty. Thank them for doubling."
    note: >
      If opponents doubled, they show 15+ HCP. If responder has 10+,
      our side has 22+ combined — the opponents made a mistake.
      Pass and collect the penalty.

  # ── 1-level suit openings ─────────────────
  #
  # Core principle: every suit opening promises 5+ cards.
  # Exceptions exist for strong balanced hands (15+) that
  # cannot open 1NT (12-14 in 1st/2nd, 15-17 in 3rd/4th).
  #
  # 1st/2nd seat: 12-14 balanced → 1NT. Suit opening = real suit (5+, or 4+ strong bal).
  # 3rd/4th seat: 15-17 balanced → 1NT. 12-14 balanced → best minor (SAYC), 1NT non-forcing.

  # ── 1-Minor Openings ────────────────────
  - bid: "1!C"
    seat: "1st/2nd"
    hcp: "12+"
    promise: "4+ clubs"
    ltc: "7 losers typical (range 5-8)"
    note: >
      Usually 5+, but may be 4 with 15+ balanced and 3-3-3-4 shape.
      A balanced 12-14 hand opens 1NT, so 1!C with 12-14 is always 5+.
      The 4-card exception only applies to strong balanced hands (15+)
      where clubs is the longest suit. Opener rebids 2NT (15-17).
    example:
      hand: "!S:A32 !H:KJ3 !D:Q32 !C:AK54"
      hcp: 16
      action: "Open 1!C (3-3-3-4, 16 HCP). Rebid 2NT after any response."

  - bid: "1!D"
    seat: "1st/2nd"
    hcp: "12+"
    promise: "4+ diamonds"
    ltc: "7 losers typical (range 5-8)"
    note: >
      Usually 5+, but may be 4 with 15+ balanced and no 5-card suit.
      This is the catch-all for strong balanced hands with 4+ diamonds
      and no 5-card major or club suit. Opener rebids 2NT (15-17).
    example:
      hand: "!S:AQ43 !H:KJ7 !D:AQ32 !C:43"
      hcp: 16
      action: "Open 1!D (4-3-4-2, 16 HCP). Rebid 2NT after any response."

  # ── 1-Major Openings ────────────────────
  - bid: "1!H"
    seat: "1st/2nd"
    hcp: "12+"
    promise: "5+ hearts (usually). 4 with 4333 shape and 15+ HCP"
    ltc: "7 losers typical (range 5-8)"
    note: >
      Usually 5+. The only exception: 3-4-3-3 with 15+ HCP. No minor
      has 4+ cards, so 1!H is the only available opening. Rebid 2NT.
    example:
      hand: "!S:Q32 !H:AKJ3 !D:AJ2 !C:432"
      hcp: 15
      action: "Open 1!H (3-4-3-3, 15 HCP). Rebid 2NT — 15-17 balanced."

  - bid: "1!S"
    seat: "1st/2nd"
    hcp: "12+"
    promise: "5+ spades (usually). 4 with 4333 or 4-4 majors, 15+ HCP"
    ltc: "7 losers typical (range 5-8)"
    note: >
      Usually 5+. Two exceptions:
      (A) 4-3-3-3 with 4 spades and 15+ HCP — no other suit to open. Rebid 2NT.
      (B) 4-4 majors, no 4+ minor (any seat) — open 1!S to find hearts cheaply.
    four_four_majors:
      title: "4-4 Majors — the 1!S Solution (any seat)"
      why_1S: >
        With 4!S-4!H and no 4+ minor, open 1!S because after
        1!S-1NT, bidding 2!H is NOT a reverse (below 2!S).
        Opening 1!H instead would require 3!S to show spades —
        too high, forces game. Works in all seats: 1NT is forcing
        in 1st/2nd, natural in 3rd/4th — either way, 2!H is cheap.
      by_strength:
        - strength: "15 HCP"
          rebid: "2!H"
          logic: >
            Show 4 hearts cheaply. Not a reverse. Partner with 4 hearts
            raises. Partscore-range hand (15+6=21, 15+9=24).
          example:
            hand: "!S:AQ43 !H:KJ43 !D:A32 !C:43"
            hcp: 15
            action: "Open 1!S. After 1!S-1NT, bid 2!H."
        - strength: "16-17 HCP"
          rebid: "2NT"
          logic: >
            Show 15-17 balanced. Partner with 4 hearts and inv+ (10+)
            bids 3!H — at 16+10=26, game is on. The 3-level is fine
            because you have the values.
          example:
            hand: "!S:AQ43 !H:KJ43 !D:AK2 !C:43"
            hcp: 17
            action: "Open 1!S. After 1!S-1NT, bid 2NT (game zone)."
      in_3rd_4th: >
        In 3rd/4th seat with 12-14 HCP and 4-4 majors: if you have a 4+
        minor, open it (unchanged). If no 4+ minor (3-3 in minors), open
        1!C (best minor). Bid majors naturally over responder's suit bid.
        If responder bids 1NT (non-forcing — passed hand), pass with
        minimum. The 1!S workaround is no longer needed in 3rd/4th.

  # ── Opening Rules ───────────────────────
  - bid: "1!C / 1!D / 1!H / 1!S"
    section: opening_rules
    rules:
      - "With two 5-card suits, open the higher one."
      - "With 5-4, open the 5-card suit."
      - "With 4-4 majors and a 4+ minor: open the minor, show majors naturally."
      - "With 4-4 majors, no 4+ minor (15 HCP 1st/2nd): open 1!S, rebid 2!H."
      - "With 4-4 majors, no 4+ minor (3rd/4th 12-14): open 1!C (best minor)."
      - "With 4-4 majors, no 4+ minor (1st/2nd 16-17): open 1!S, rebid 2NT."
      - "With 4-4 majors, no 4+ minor (3rd/4th 15-17): open 1NT."
      - "With 4333 and 15+ balanced: open the 4-card suit, rebid 2NT."
      - "A 2NT rebid after any opening confirms balanced (opening suit may be only 4)."

  # ── 3rd/4th Seat Openings ───────────────
  #
  # SAYC-style best minor for balanced 12-14 hands.
  # 1H/1S = strict 5+ in 3rd/4th (no balanced exceptions).
  # Forcing 1NT OFF (responder is a passed hand).
  #
  - bid: "1!C"
    seat: "3rd/4th"
    hcp: "8+"
    promise: "3+ clubs (best minor — may be short with balanced hand)"
    note: >
      SAYC-style best minor: 12-14 balanced hands open the longer minor.
      With 3-3 minors, open 1!C. With 4-4 majors and no 4+ minor, open
      1!C (best minor). 1!C could be as short as 3 cards — responder
      should not jump-raise without 5+ support.
    forcing_1nt: >
      Forcing 1NT is OFF in 3rd/4th seat — responder is a passed hand
      and cannot force. 1NT = natural, non-forcing (6-10). Opener may
      pass. New suit responses show 4+ cards (no "always 5+" rule —
      there is no forcing 1NT route for 4-card hands to use).
    examples:
      - hand: "!S:KJ43 !H:AQ43 !D:J32 !C:43"
        hcp: 12
        action: "Open 1!C (4-4-3-2, best minor is 3-card !C). Bid majors naturally."
      - hand: "!S:Q32 !H:AK43 !D:J32 !C:432"
        hcp: 12
        action: "Open 1!C (3-4-3-3, best minor = !C with 3-3). Rebid 1!H if possible."

  - bid: "1!D"
    seat: "3rd/4th"
    hcp: "8+"
    promise: "3+ diamonds"
    note: >
      Best minor: with longer diamonds than clubs, open 1!D. With 4-4
      in both minors, open 1!D (equal length, prefer diamonds per SAYC).
      With 3-3 minors, open 1!C. 1!D can be as short as 3 (e.g., 4-4-3-2).

  - bid: "1!H / 1!S"
    seat: "3rd/4th"
    hcp: "8+"
    promise: "Strict 5+ cards. No 4-card balanced exceptions."
    note: >
      Unlike 1st/2nd seat, there are NO 4-card exceptions for majors in
      3rd/4th. Balanced 12-14 hands open best minor, not a 4-card major.
      May be lighter HCP (passed-hand opening — tactical, competing for
      partscore and directing the lead).

  # ── Continuations After Suit Openings ───
  - bid: "1!C / 1!D / 1!H / 1!S"
    section: continuations
    raises:
      - sequence: "1x - 2x (single raise)"
        meaning: "6-9 HCP, 3+ card support"
        ltc: "9-10 losers"
        note: "Standard. If opener had only 4, he rebids 2NT."
      - sequence: "1x - 3x (limit raise)"
        meaning: "10-12 HCP, 4+ card support"
        ltc: "7-8 losers"
        note: "Invitational. Opener bids game with 5-6 losers."
      - sequence: "1M - 4M (game raise)"
        meaning: "Distributional, 5+ card support or strong hand"
        ltc: "6-7 losers"
        note: "Based on playing tricks, not just HCP."
    raise_ltc_note: >
      After a fit is found, re-evaluate using LTC: 24 minus combined losers =
      expected tricks. A hand with 10 HCP but 7 losers (e.g. !S:KQxxx !H:x
      !D:Axxx !C:xxx) is a limit raise by LTC, though HCP says only a single
      raise. Trust LTC in suit contracts — see H-8.

    jump_responses_over_1M:
      title: "Jump Responses After 1-Major Opening"
      seat_note: >
        Seat-dependent meanings. In 1st/2nd seat, forcing 1NT routes invitational
        hands through 1NT, freeing 3M for preemptive use. In 3rd/4th seat, forcing
        1NT is OFF — 3M stays as limit raise (traditional).
      first_second_seat:
        - bid: 2NT
          meaning: "LTC weak-suit ask — forcing raise, 4+ trumps, GF (13+ HCP)"
          note: >
            Asks opener to show which side suit has 3 losers (xxx or Qxx — no
            stopper). Responder then evaluates whether their honours fill the
            gap. Only in 1st/2nd seat (unpassed hand). Based on Ron Klinger's
            Modern Losing Trick Count.
          opener_continuations:
            - bid: 3C
              meaning: "3 losers in clubs (xxx or Qxx)"
            - bid: 3D
              meaning: "3 losers in diamonds (xxx or Qxx)"
            - bid: 3M
              meaning: "No side suit with 3 losers — all suits covered"
            - bid: "3 of other major"
              meaning: "3 losers in that major (xxx or Qxx)"
          responder_evaluation: >
            After hearing opener's weak suit, responder checks their own
            holding in that suit. AKx or AQx opposite xxx = honours working,
            slam is likely. xxx opposite xxx = danger, nobody stops the suit.
            Void or singleton opposite xxx = losers get ruffed in suit play.
            If opener bids 3M (no weak suit), responder can count on a solid
            hand and explore slam confidently.
          two_weak_suits: >
            If opener has two side suits with 3 losers, bid the cheaper one.
            This is rare (6+ losers from two suits alone = near-minimum hand).
        - bid: "3 new suit"
          meaning: "Fit jump — good 5+ suit (2+ of top 4 honours) + 3+ support, inv (10-12)"
          note: >
            Two pieces of information in one bid: lead direction AND support.
            Example: 1!S - 3!D = 5+ !D (KQxxx type), 3+ !S, 10-12 HCP.
            Applies in any seat.
        - bid: 3M
          meaning: "Slam try — 4+ trumps, GF, slam interest (13+ HCP)"
          note: >
            Establishes the trump fit and invites slam exploration. Opener
            and responder continue with cue-bids (showing aces/kings/shortness
            up the line). Unlike 2NT (which asks about losers), 3M says 'I want
            to explore slam via controls.' Invitational hands (10-12) route
            through forcing 1NT instead.
          continuations: >
            After 1M - 3M, both hands cue-bid controls up the line:
            - Cheapest new suit = A or K (or shortness) in that suit
            - Skipping a suit = denying control there
            - 4M = sign-off (no more controls to show)
            - 4NT = RKCB (when enough controls confirmed)
        - bid: 4M
          meaning: "Game raise — to play, no slam interest"
          note: >
            Covers both strong balanced game raises and weak distributional
            shutouts. No slam ambition. Opener passes UNLESS holding 3 extra
            covers (aces, kings, or distributional features) above a minimum
            opening, in which case opener may cue-bid to explore slam.
          ltc: "Mixed — from 5-6 losers (sound) to 8+ losers (preemptive)"
      third_fourth_seat:
        - bid: 2NT
          meaning: "Natural invitation, balanced, 11-12 HCP"
          note: "Passed hand cannot have GF values. No Jacoby."
        - bid: "3 new suit"
          meaning: "Fit jump — same as 1st/2nd (good suit + support, inv)"
        - bid: 3M
          meaning: "Limit raise — 10-12 HCP, 4+ support"
          note: "No forcing 1NT to route through, so 3M stays traditional."
        - bid: 4M
          meaning: "To play — distributional"

    jump_responses_over_1m:
      title: "Jump Responses After 1-Minor Opening"
      note: "Same in any seat. No Jacoby (no trump fit implied by minor opening)."
      bids:
        - bid: 2NT
          meaning: "Natural invitation, balanced, 11-12 HCP"
        - bid: 3m
          meaning: "Invitational raise — 5+ support, 10-12 HCP"
        - bid: "Jump in new major (e.g. 1!C-2!H)"
          meaning: "Strong jump shift — 16+ HCP, 5+ suit, GF"
          note: "Rare. Self-sufficient suit. Opener rebids naturally."
        - bid: "Jump in other minor (e.g. 1!C-3!D)"
          meaning: "Invitational, 5+ suit, 10-12 HCP"

    new_suit_at_1_level:
      rule_1st_2nd: >
        In 1st/2nd seat, all new suit responses at the 1-level promise
        5+ cards, regardless of strength. Hands with only 4 cards route
        through forcing 1NT and show it on the second round. Opener may
        raise with 3-card support, knowing it's a real fit.
      exception_1C_1D: >
        EXCEPTION: 1!C - 1!D = 4+ diamonds (1st/2nd seat). With 4
        diamonds and no 5-card major, responder cannot route through
        forcing 1NT to show diamonds later. So 1!D over 1!C retains
        the traditional 4+ promise.
      rule_3rd_4th: >
        In 3rd/4th seat, forcing 1NT is off (passed hand). New suit
        responses at the 1-level = 4+ cards (traditional). No "always
        5+" rule applies.
      note: >
        The "always 5+" rule is a direct benefit of DEC-6 (forcing 1NT)
        and applies only in 1st/2nd seat. See F-SIM-003.

    response_1nt:
      meaning: "6-12 HCP, FORCING one round"
      conditions:
        - "No fit (at most 3 cards in opener's suit)"
        - "No new suit available at the 1-level"
        - "1st/2nd seat only (responder is an unpassed hand)"
        - "OFF in 3rd/4th seat (responder is a passed hand — cannot force)"
      off_in_competition: >
        If opponents bid or double, 1NT is OFF (reverts to natural).
      ltc: "10+ losers typically (no fit found)"
      note: >
        Forcing 1NT acknowledges that after a 5+ card opening, 1NT
        almost never survives as a final contract. Opener was going to
        bid again with 95% of hands anyway. DD simulation proved +1.118
        tricks/deal over non-forcing (F-SIM-001, DEC-6).
      seat_summary: >
        Forcing 1NT is ON after all suit openings in 1st/2nd seat.
        OFF in 3rd/4th seat — responder is a passed hand and cannot
        force. 1NT = natural, non-forcing after 3rd/4th seat openings.

    forcing_1nt_opener_rebids:
      title: "Opener's Rebids After Forcing 1NT"
      principle: >
        Opener MUST bid again. Describe your hand naturally: show a second
        suit, rebid a long suit, or show balanced strength with 2NT.
        With a dead minimum 5-3-3-2 and no 4-card side suit, rebid the
        5-card suit (this is rare — 0.4% of deals are "awkward").
      after_1H_1NT:
        title: "After 1!H - 1NT (forcing)"
        bids:
          - rebid: "2!C"
            meaning: "4+ clubs, any strength"
          - rebid: "2!D"
            meaning: "4+ diamonds, any strength"
          - rebid: "2!H"
            meaning: "6+ hearts, minimum (12-14)"
          - rebid: "2!S"
            meaning: "Reverse — 16+ HCP, 4+ spades (forcing)"
          - rebid: "2NT"
            meaning: "15-17 balanced (confirms 4-card !H opening)"
          - rebid: "3!H"
            meaning: "6+ hearts, invitational (15-17)"
      after_1S_1NT:
        title: "After 1!S - 1NT (forcing)"
        bids:
          - rebid: "2!C"
            meaning: "4+ clubs, any strength"
          - rebid: "2!D"
            meaning: "4+ diamonds, any strength"
          - rebid: "2!H"
            meaning: "4+ hearts, any strength (NOT a reverse — below 2!S)"
          - rebid: "2!S"
            meaning: "6+ spades, minimum (12-14)"
          - rebid: "2NT"
            meaning: "15-17 balanced (confirms 4-card !S opening)"
          - rebid: "3!S"
            meaning: "6+ spades, invitational (15-17)"
      after_1D_1NT:
        title: "After 1!D - 1NT (forcing)"
        bids:
          - rebid: "2!C"
            meaning: "4+ clubs, any strength"
          - rebid: "2!D"
            meaning: "6+ diamonds, minimum (12-14)"
          - rebid: "2!H"
            meaning: "Reverse — 16+ HCP, 4+ hearts (forcing)"
          - rebid: "2!S"
            meaning: "Reverse — 16+ HCP, 4+ spades (forcing)"
          - rebid: "2NT"
            meaning: "15-17 balanced (confirms 4-card !D opening)"
          - rebid: "3!D"
            meaning: "6+ diamonds, invitational (15-17)"
      after_1C_1NT:
        title: "After 1!C - 1NT (forcing) — 1st/2nd seat"
        note: >
          In 1st/2nd seat, 1!C always promises 5+ clubs. A balanced
          12-14 hand opens 1NT, not 1!C. So opener has a real club suit.
          This means a 4-card side major often stays hidden with minimum
          hands (can't reverse with only 12-15 HCP).
        bids:
          - rebid: "2!C"
            meaning: "5-6 clubs, minimum (12-14), no 4-card side suit"
            example: "!S:J43 !H:Q7 !D:K32 !C:AQ432 — rebid your suit"
          - rebid: "2!D"
            meaning: "4+ diamonds, real second suit (not a 'convenient' rebid — opener has 5!C-4!D+)"
          - rebid: "2!H"
            meaning: "Reverse — 16+ HCP, 4+ hearts (forcing)"
          - rebid: "2!S"
            meaning: "Reverse — 16+ HCP, 4+ spades (forcing)"
          - rebid: "2NT"
            meaning: "15-17 balanced (why didn't you open 1NT? Because 5!C-3-3-2 with 15-17 — valid choice)"
          - rebid: "3!C"
            meaning: "6+ clubs, invitational (15-17)"
        hidden_major_example:
          hand: "!S:KJ43 !H:Q7 !D:32 !C:AQ432"
          hcp: 12
          opening: "1!C (5+ clubs, can't open 1NT with 12)"
          after_1NT_forcing: "2!C — can't bid 2!S (reverse = 16+). The 4!S stays hidden."
          why_ok: >
            Partner has 6-12 HCP with no 5-card spade suit (would have bid
            1!S). Even if partner has 4!S, combined max is ~24 HCP — a
            partscore hand. The simulation proves this trade-off is correct.

    forcing_1nt_responder_continuations:
      title: "Responder's Second Bid After Forcing 1NT"
      principle: >
        After hearing opener's rebid, responder places the contract.
        With 6-9 HCP: pass. With 10-12 HCP: bid again (raise, preference,
        or 2NT). With a hidden 4-card major (after 1m): show it now.
      weak_6_9:
        action: "Place the contract — usually pass, but correct with a long suit"
        actions:
          - "Pass opener's rebid (most hands)"
          - "Bid your own 6+ card suit to play there (e.g. 1!S-1NT-2!C-2!H = weak, long hearts)"
          - "Give preference back to opener's first suit with 2-card support"
        note: >
          The goal is to find the best partscore, not just pass blindly.
          With a 6-card suit, playing in your suit beats a 2-level misfit.
          IMPORTANT: a new suit here is TO PLAY (weak), NOT invitational.
          Compare: 1!S - 2!H directly = 2/1 game force (10+ HCP).
          But 1!S - 1NT(f) - 2!C - 2!H = weak with long hearts.
      invitational_10_12:
        actions:
          - "Raise opener's second suit with 4+ support"
          - "Give preference back to opener's first suit"
          - "Bid 2NT with scattered values"
          - "Raise to 3 of opener's rebid suit (invitational)"
        note: "Opener knows you have 10-12 (you bid again after forcing 1NT)."
      hidden_4_card_major:
        trigger: "After 1-suit - 1NT(f) - rebid, responder has 4-card suit with inv+ values"
        action: "Show the suit at the second turn"
        note: >
          This is the structural insight: new suit at 1-level always
          promises 5+ (except 1!C-1!D = 4+), so 4-card hands route
          through forcing 1NT. See F-SIM-003.

    forcing_1nt_decision_tree:
      title: "Responder's Decision Tree After Partner Opens 1-Suit"
      note: >
        This is the practical guide: partner opens a suit, what do you bid?
        Work through the tree top to bottom. First match wins.
      steps:
        - question: "Do you have a fit (3+ cards in partner's suit)?"
          yes: >
            Raise directly. 2x = 6-9 HCP, 3x = 10-12 (limit raise),
            4M = distributional game raise. Forcing 1NT does NOT apply.
          no: "Continue to next question."

        - question: "Do you have a new suit to show at the 1-level?"
          yes: >
            Bid it. In 1st/2nd seat: must be 5+ cards (DEC-6), except
            1!C-1!D = 4+. In 3rd/4th seat: 4+ cards (forcing 1NT is off,
            responder is a passed hand).
          no: "Continue to next question."

        - question: "Do you have 6-12 HCP?"
          yes: >
            In 1st/2nd seat: bid 1NT (forcing). Partner will describe
            their hand. With 6-9: pass whatever partner rebids. With
            10-12: bid again. In 3rd/4th seat: 1NT = natural, non-forcing
            (6-10). Opener may pass.
          no_low: "Pass (0-5 HCP)."
          no_high: "Bid 2/1 game force (13+ HCP)."

      examples:
        - title: "Partner opens 1!H (1st/2nd seat — forcing 1NT ON)"
          hands:
            - hand: "!S:Q43 !H:K76 !D:J432 !C:J32"
              hcp: 7
              bid: "2!H — fit (3 hearts), weak (6-9). Raise directly."
            - hand: "!S:Q43 !H:K76 !D:J432 !C:A32"
              hcp: 10
              bid: "2!H — fit (3 hearts), invitational. Still a single raise
                (not enough for limit raise without 4-card support)."
            - hand: "!S:QJ432 !H:K7 !D:J43 !C:932"
              hcp: 7
              bid: "1!S — 5+ spades, show at 1-level."
            - hand: "!S:Q43 !H:K7 !D:J432 !C:Q932"
              hcp: 8
              bid: "1NT (forcing) — no fit, no 5-card spade suit. Pass
                partner's rebid."
            - hand: "!S:QJ43 !H:K7 !D:A432 !C:932"
              hcp: 10
              bid: "1NT (forcing) — 4 spades but not 5, can't bid 1!S.
                After partner's rebid, bid again to show invitational values."

        - title: "Partner opens 1!C"
          hands:
            - hand: "!S:QJ43 !H:K76 !D:A432 !C:93"
              hcp: 10
              bid: "1NT (forcing) — 4!S but not 5, can't bid 1!S (promises 5+).
                After partner rebids, show spades at the second turn (inv+)."
            - hand: "!S:QJ432 !H:K76 !D:A43 !C:93"
              hcp: 10
              bid: "1!S — 5+ spades, bid at 1-level. This always promises 5+."
            - hand: "!S:K43 !H:QJ43 !D:J432 !C:93"
              hcp: 7
              bid: "1NT (forcing) — 4!H but not 5, no fit for clubs. Pass
                partner's rebid."
            - hand: "!S:K43 !H:Q7 !D:J432 !C:9432"
              hcp: 6
              bid: "1NT (forcing) — no fit (only 4!C is a fit, but that's
                marginal and we have no new suit at the 1-level). Pass rebid."

        - title: "Partner opens 1!S"
          hands:
            - hand: "!S:K7 !H:QJ432 !D:J43 !C:932"
              hcp: 7
              bid: "1NT (forcing) — 5!H but can't bid at 1-level over 1!S.
                This is exactly why forcing 1NT helps over majors. Pass rebid."
            - hand: "!S:K7 !H:QJ43 !D:A432 !C:932"
              hcp: 10
              bid: "1NT (forcing) — can't show hearts at 1-level. After
                partner's rebid, show hearts or bid 2NT (invitational)."
            - hand: "!S:72 !H:KJ8743 !D:Q43 !C:J2"
              hcp: 7
              bid: "1NT (forcing) — 6!H but can't bid 2!H directly (that's
                2/1 GF, 10+ HCP). After partner rebids (say 2!C or 2!D),
                bid 2!H = weak, long hearts, TO PLAY. Not invitational!"

        - title: "Opener's view — hidden 4-card major after minor opening (1st/2nd seat)"
          hands:
            - hand: "!S:KJ43 !H:Q7 !D:32 !C:AQ432"
              hcp: 12
              bid: "Open 1!C. After 1!C - 1NT(f), bid 2!C. Can't bid 2!S
                (reverse = 16+). The 4!S stays hidden — but partner with
                5+ spades would have bid 1!S, so at worst we miss a 4-4 fit
                in a partscore."
            - hand: "!S:AQ43 !H:K7 !D:Q32 !C:AJ43"
              hcp: 16
              bid: "Open 1!C. After 1!C - 1NT(f), bid 2!S (reverse, 16+).
                With 16 HCP you CAN show the 4!S — the reverse is correct."
            - hand: "!S:K7 !H:A543 !D:32 !C:AQ432"
              hcp: 13
              bid: "Open 1!C. After 1!C - 1NT(f), bid 2!C. Can't bid 2!H
                (reverse = 16+). 4!H stays hidden. Same principle — partner
                with 5+ hearts would have bid 1!H."

        - title: "Opener's view — 4-4 majors, no 4+ minor (1st/2nd seat)"
          hands:
            - hand: "!S:AQ43 !H:KJ43 !D:Q32 !C:43"
              hcp: 15
              bid: "Open 1!S (4-4 majors, 15 HCP). After 1!S - 1NT(f),
                bid 2!H — shows 4 hearts cheaply (not a reverse). Partner
                with 4 hearts raises. With 15 HCP this is partscore zone."
            - hand: "!S:AQ43 !H:KJ43 !D:AQ2 !C:43"
              hcp: 17
              bid: "Open 1!S (4-4 majors, 17 HCP). After 1!S - 1NT(f),
                bid 2NT (15-17 balanced). At 17+8=25+ you're in game zone.
                Partner with 4 hearts and inv+ bids 3!H. 3-level is fine
                because you have the values."
            - hand: "!S:AQ43 !H:KJ43 !D:KQ2 !C:43"
              hcp: 16
              bid: "Open 1!S (4-4 majors, 16 HCP). After 1!S - 1NT(f),
                bid 2NT (16-17 balanced). Partner explores at the 3-level
                with inv+ values. With 16+10=26, game is on."

        - title: "3rd/4th seat — 12-14 balanced (no prepared 1!C)"
          hands:
            - hand: "!S:KQ43 !H:A76 !D:QJ32 !C:J3"
              hcp: 13
              bid: "In 3rd seat: open 1!S (4-card suit, 12-14 bal, can't open
                1NT which is 15-17). After 1NT (natural, non-forcing from
                passed hand), rebid 2!D (convenient minor). No forcing 1NT
                — partner is a passed hand."
            - hand: "!S:A76 !H:K43 !D:QJ32 !C:Q32"
              hcp: 12
              bid: "In 3rd seat: open 1!D (4-card suit). After partner's
                response, rebid naturally. 1NT from partner is non-forcing."
            - hand: "!S:AQ43 !H:KJ43 !D:Q32 !C:43"
              hcp: 13
              bid: "In 3rd seat: open 1!S (4-4 majors, no 4+ minor). After
                1NT (natural, non-forcing), rebid 2!H — shows 4 hearts cheaply."
        - title: "3rd/4th seat — responder with 4 spades after 1!H"
          hands:
            - hand: "!S:QJ43 !H:K7 !D:A432 !C:932"
              hcp: 10
              bid: "Partner opens 1!H in 3rd seat. Bid 1!S — 4+ spades is fine
                (forcing 1NT is off, no '5+ always' rule in 3rd/4th seat)."
            - hand: "!S:QJ43 !H:K7 !D:J432 !C:932"
              hcp: 7
              bid: "Partner opens 1!H in 3rd seat. Bid 1!S — same rule, 4+
                spades. In 1st/2nd seat this hand would bid 1NT (forcing)
                because 1!S requires 5+. But here it's natural."

    example_rebids:
      title: "Opener's rebids after 1!C - 1!H (1st/2nd seat)"
      note: >
        1!C = 5+ clubs in 1st/2nd seat (balanced 12-14 opens 1NT).
        Responder's 1!H = 5+ hearts (DEC-6). Opener describes shape.
      bids:
        - rebid: 1!S
          meaning: "4+ spades, any strength (not a reverse — still at the 1-level)"
        - rebid: 1NT
          meaning: "15-17 HCP, balanced (5!C-3-3-2 that chose 1!C over 1NT)"
        - rebid: 2!C
          meaning: "5-6 clubs, minimum (12-14)"
        - rebid: 2!D
          meaning: "Reverse — 16+ HCP, 4+ !D (forcing)"
        - rebid: 2!H
          meaning: "Simple raise — 3+ !H support"
        - rebid: 2!S
          meaning: "Reverse — 16+ HCP, 4+ !S (forcing)"
        - rebid: 2NT
          meaning: "18-19 HCP, balanced"
        - rebid: 3!C
          meaning: "6+ clubs, invitational (15-17)"

    quick_reference:
      - sequence: "1!C - 1!D"
        meaning: "Natural, 4+ diamonds, waiting"
      - sequence: "1!C - 1!H/!S"
        meaning: "Always 5+ (DEC-6). 4-card major inv+ routes through 1NT forcing."

    competitive_revaluation:
      title: "Competitive Re-evaluation with LTC"
      principle: >
        When opponents intervene after our suit opening, both partners must
        re-evaluate using LTC, not just HCP. The auction (1!H) - 2!S - ?
        asks responder: 'How many losers do I have in support of partner's
        suit?' A hand with 10 HCP and 9 losers should pass; a hand with
        9 HCP and 7 losers should compete to 3!H.
      guidelines:
        - action: "Compete to the 2-level"
          combined_ltc: "16+ (8 tricks)"
          note: "Free bid at the 2-level shows values; LTC confirms it's safe."
        - action: "Compete to the 3-level"
          combined_ltc: "15 (9 tricks)"
          note: "Law of Total Tricks applies here — with 9 trumps, bid to 3."
        - action: "Bid game despite interference"
          combined_ltc: "14 or fewer (10+ tricks)"
          note: "Don't let opponents push you out of game."
        - action: "Double (penalty-oriented)"
          note: "Prefer double when you hold 2+ defensive tricks and a misfit."
      sacrifice_guide:
        principle: >
          At favorable vulnerability, sacrifice when your combined LTC
          suggests you are outgunned. Going down 2 doubled non-vulnerable
          (-300) is better than letting them make game (+420/+620).
        guideline: "Sacrifice with 16+ combined losers at favorable; never at unfavorable."

    # ── 2/1 Game Force (13+ HCP, no 4-card fit) ──────────────
    #
    # With forcing 1NT handling 6-12 HCP, any new suit at the 2-level
    # MUST be 13+ HCP — making it game-forcing by logical necessity.
    # Neither player may pass below game after a 2/1 response.
    #
    # The three responses partition ALL hands:
    #   6-12 HCP           → 1NT (forcing)
    #   13+ with 4+ trumps → 2NT LTC ask / 3M slam try / 4M game (over 1M)
    #   13+ without fit    → 2/1 new suit (game-forcing)

    two_over_one_game_force:
      title: "2/1 Game Force — Responder Has 13+ HCP Without 4-Card Fit"
      prerequisite: "1st/2nd seat only. Forcing 1NT ON (DEC-6). Responder is unpassed."
      master_rule: >
        A new suit at the 2-level after partner's 1-suit opening is GAME-FORCING.
        Neither player may pass below game. Both describe shape until the best
        game (3NT, 4M, or 5m) is found.

      why_game_forcing: >
        DEC-6 (forcing 1NT) handles all 6-12 HCP hands without fit. So a 2-level
        response CANNOT be 6-12 — it must be 13+. With opener's 12+ and responder's
        13+, the partnership has 25+ combined HCP. Game is a near-certainty.
        This is not a convention — it's a logical consequence of our system.

      when_to_use:
        - "13+ HCP and no 4-card support for opener's major (2NT/3M/4M = 4+ trumps)"
        - "13+ HCP after 1m opening with a good suit to show"
        - "Any hand too strong for 1NT(f) and without a direct raise"

      available_2_1_bids:
        after_1H:
          - bid: "2!C"
            meaning: "13+ HCP, 4+ clubs, GF"
            note: "May be only 4 clubs when no better bid available"
          - bid: "2!D"
            meaning: "13+ HCP, 5+ diamonds, GF"
        after_1S:
          - bid: "2!C"
            meaning: "13+ HCP, 4+ clubs, GF"
          - bid: "2!D"
            meaning: "13+ HCP, 5+ diamonds, GF"
          - bid: "2!H"
            meaning: "13+ HCP, 5+ hearts, GF"
        after_1D:
          - bid: "2!C"
            meaning: "13+ HCP, 5+ clubs, GF"
            note: "Less common — responder usually has a 1-level bid"
        after_1C:
          note: >
            After 1!C, responder can bid 1!D/1!H/1!S at the 1-level with 4+ cards.
            A 2-level response is rare (strong jump shift = 16+, see jump_responses_over_1m).

      # ── Opener's Rebids After 2/1 ──────────────────────────
      opener_rebids:
        title: "Opener's Rebids After 2/1 GF"
        principle: >
          The auction is game-forcing. Opener describes shape and strength naturally.
          There is no need to jump to show extras — the GF guarantees game.
          Use slow bidding to explore for the BEST game or slam.
        after_1H_2C:
          title: "After 1!H - 2!C (GF)"
          bids:
            - rebid: "2!D"
              meaning: "4+ diamonds, natural (second suit)"
              note: "NOT a reverse in a GF auction — all bids are forcing"
            - rebid: "2!H"
              meaning: "6+ hearts, any strength (does NOT deny extras)"
            - rebid: "2!S"
              meaning: "4+ spades (natural — can now show second suit freely)"
            - rebid: "2NT"
              meaning: "12-14, balanced, no 4-card side suit"
            - rebid: "3!C"
              meaning: "4+ club support (at least Qxxx or xxxx)"
            - rebid: "3!H"
              meaning: "6+ hearts, strong suit (extras implied by jumping)"
            - rebid: "3NT"
              meaning: "15-17, balanced, all suits stopped"
        after_1H_2D:
          title: "After 1!H - 2!D (GF)"
          bids:
            - rebid: "2!H"
              meaning: "6+ hearts, any strength"
            - rebid: "2!S"
              meaning: "4+ spades, natural"
            - rebid: "2NT"
              meaning: "12-14, balanced"
            - rebid: "3!C"
              meaning: "4+ clubs, natural (third suit)"
            - rebid: "3!D"
              meaning: "4+ diamond support"
            - rebid: "3!H"
              meaning: "6+ hearts, extras"
            - rebid: "3NT"
              meaning: "15-17, balanced, all stopped"
        after_1S_2x:
          title: "After 1!S - 2!C/2!D/2!H (GF)"
          note: "Same structure. Opener describes shape naturally."
          bids:
            - rebid: "2!S"
              meaning: "6+ spades, any strength"
            - rebid: "new suit below 3!S"
              meaning: "4+ cards, natural"
            - rebid: "2NT"
              meaning: "12-14, balanced"
            - rebid: "raise responder"
              meaning: "4+ support for responder's suit"
            - rebid: "3!S"
              meaning: "6+ spades, extras"
            - rebid: "3NT"
              meaning: "15-17, balanced, all stopped"

      # ── Responder's Continuations After 2/1 ────────────────
      responder_continuations:
        title: "Responder's Continuations"
        principle: >
          After hearing opener's rebid, responder places the game or explores
          for slam. Since the auction is GF, there is no rush — bid naturally.
        key_actions:
          - action: "Raise opener's major to 3M"
            meaning: "3-card support, forcing (opener chooses 3NT or 4M)"
            when: "You have 3 cards in opener's major"
            note: >
              This is the key safety net that prevents missed major-suit games.
              With 3-card support, 3M says 'I have a fit but only 3 — you decide.'
              Opener with 6+ bids 4M; with 5 and stoppers bids 3NT.
          - action: "Raise opener's major to 4M"
            meaning: "4+ support, game values (discovered fit)"
            when: "Opener showed 6+ and you have 2+, or rebid showed 5 and you have 3+"
          - action: "Bid 3NT"
            meaning: "Balanced, all stopped, no major fit found"
            when: "No 8-card major fit, stoppers in all unbid suits"
          - action: "Bid a new suit"
            meaning: "Natural, 4+ cards, still exploring"
            when: "Shape not yet fully described"
          - action: "Rebid your suit"
            meaning: "6+ cards, good suit"
            when: "Strong single-suited hand, still GF"
          - action: "4NT"
            meaning: "Blackwood — slam interest"
            when: "Fit found, control-checking for slam"

        after_opener_nt:
          title: "After Opener Rebids 2NT or 3NT"
          principle: >
            When opener rebids 2NT (12-14 balanced) or 3NT (15-17 balanced),
            responder places the contract. The GF is already established — no
            further bids are forcing except slam tries.
          actions:
            - action: "Pass 3NT"
              meaning: "Game reached, no slam interest, no major fit"
            - action: "Bid 4M (opener's major)"
              meaning: "3+ support for opener's known 5-card major"
              note: "Opener showed 5M by opening 1M; balanced rebid confirms exactly 5."
            - action: "Bid 4M (responder's major)"
              meaning: "6+ card self-sufficient suit, plays better than NT"
            - action: "Bid 4NT over 3NT"
              meaning: "Quantitative slam invite (not Blackwood — no agreed suit)"
              note: "Opener passes with minimum, bids 6NT with maximum."
            - action: "Bid a new suit over 2NT"
              meaning: "Natural, 5+ cards, still searching for the best game"
              note: >
                Over 2NT there is room to explore. A new suit is forcing (GF
                still applies). Over 3NT, new suits at the 4-level are slam tries.

        fourth_suit_natural:
          title: "Fourth Suit in a GF Auction"
          rule: >
            In a 2/1 GF auction, the fourth suit is NATURAL (4+ cards), not
            conventional. Since the auction is already game-forcing, there is no
            need for an artificial fourth-suit-forcing bid — every bid is forcing
            below game anyway.
          contrast: >
            Compare with non-GF auctions (e.g., after forcing 1NT) where fourth
            suit forcing IS artificial and asks opener to describe further. In
            2/1, fourth suit simply shows a real suit.
          example: "1!S - 2!C; 2!D - 2!H = natural, 4+ hearts (not asking for a stopper)"

      # ── The 3-Card Support Rule ────────────────────────────
      three_card_support:
        title: "The Critical Case: 13+ HCP with Exactly 3-Card Major Support"
        problem: >
          This is the hand type that historically causes missed games. With 4+
          trumps → 2NT (LTC ask), 3M (slam try), or 4M (game). With 0-2
          trumps → 2/1 and explore. But with exactly 3 trumps, responder
          must choose between raising directly (simple raise = only 6-9)
          and bidding 2/1 to show strength.
        solution: >
          Bid 2/1 first (new suit, GF), then show the 3-card support later by
          bidding 3M. This is forcing — opener chooses: 4M with 6+ trumps
          (8-card fit guaranteed), or 3NT with only 5 and stoppers. The 2/1
          route ensures game is reached while still finding the major fit.
        examples:
          - situation: "Partner opens 1!H. You hold: !S:AQ4 !H:K76 !D:A432 !C:932"
            hcp: 14
            wrong: "2!H (only shows 6-9 with 3-card support — stops in partscore)"
            right: >
              2!D (2/1 GF, 5+ diamonds... but you only have 4 diamonds). Problem:
              2!D should show 5+. Better: bid 2!C (may be only 4 clubs in a GF
              auction — acceptable when no 5-card suit is available). After opener
              rebids, raise to 3!H to show delayed 3-card support. Opener with 6+
              hearts bids 4!H; with 5 bids 3NT.
          - situation: "Partner opens 1!S. You hold: !S:K73 !H:AQ54 !D:KJ3 !C:642"
            hcp: 14
            wrong: "2!S (only shows 6-9)"
            right: >
              2!H (2/1 GF, 5+ hearts... you have only 4. Acceptable? Yes — 2!H after
              1!S promises 5+ in standard, but with this strength you MUST create a
              GF. Better: 2!C with only 3 clubs? Ugly but acceptable in a GF auction).
              The key: after opener rebids, bid 3!S to show delayed 3-card support.
            note: >
              With exactly 3-card support and 13-15 HCP, the 2/1 route is the ONLY
              way to reach game. A simple raise (2M) stops at partscore. This is the
              gap that H-22 closes.
          - situation: "Partner opens 1!H. You hold: !S:K43 !H:A76 !D:QJ43 !C:K32"
            hcp: 14
            right: >
              2!D (4+ diamonds is acceptable here since you have a real 4-card suit).
              After opener rebids (say 2!H), bid 3!H (delayed 3-card support, GF).
              Opener with AKxxx of hearts + your A76 → 4!H. With KQxxx + balanced →
              3NT. Either way, game is reached.

      # ── What is NOT 2/1 GF ─────────────────────────────────
      exceptions:
        title: "What is NOT 2/1 Game Force"
        list:
          - exception: "3rd/4th seat — forcing 1NT is OFF"
            why: >
              Responder is a passed hand. 2-level responses are natural but NOT
              game-forcing — they show 8-11 HCP (passed hand can't have 13+).
              Opener may pass.
          - exception: "After interference (opponent bids/doubles)"
            why: >
              When opponents intervene, 1NT is no longer forcing — it reverts to
              natural. So a 2-level bid no longer implies 13+. Standard competitive
              bidding applies instead.
          - exception: "1!C - 1!D"
            why: "This is a 1-level response (4+ diamonds, any strength). Not 2/1."

      # ── Competitive Interference in 2/1 GF ─────────────────
      competitive_interference:
        title: "When Opponents Interfere During a 2/1 Auction"
        principle: >
          Once a 2/1 GF is established (e.g., 1!H - 2!D), the game force
          SURVIVES opponent interference. Neither partner may pass below game
          unless doubling for penalties.
        rules:
          - rule: "Pass is forcing"
            meaning: >
              After a 2/1 GF is established and an opponent bids, pass says
              'I have nothing useful to say about their suit, but we are still
              game-forcing — you MUST bid.' This is NOT a sign-off.
            example: "1!H - 2!C; (3!D) - Pass = forcing. Opener must act."
          - rule: "Double is penalty-oriented"
            meaning: >
              In a GF auction, we don't need a takeout double — we're already
              committed to game. Double says 'I think we can beat them here.'
              Partner may pull with extreme shape.
          - rule: "New suit is natural and forcing"
            meaning: "Still game-forcing, still describing shape."
          - rule: "Cuebid of opponent's suit"
            meaning: "Strong hand, no clear direction — asks partner to describe further."
          - rule: "3NT, 4M, 5m"
            meaning: "Natural — placing the contract despite interference."

      # ── Cue-Bid Slam Exploration ────────────────────────────
      cuebid_slam:
        title: "Slam Exploration After 2/1 GF"
        principle: >
          Once a trump fit is agreed in a GF auction (e.g., 1!H - 2!D; 3!D or
          1!S - 2!C; 3!S), bids beyond 3NT are slam tries. The primary tool is
          control cuebids — bidding suits where you hold first-round control
          (Ace or void).
        method:
          - step: "Agree a trump suit below game"
            note: >
              E.g., raise partner's suit: 1!H - 2!C; 2!H - 3!H (agreed hearts).
              Or: 1!S - 2!D; 3!D (agreed diamonds).
          - step: "Cuebid first-round controls up the line"
            note: >
              Bid the cheapest suit where you hold the Ace (or void). Bypass =
              denial. E.g., after hearts agreed at 3!H: 3!S = !S control, denies
              !D control (bypassed). 4!C = !C control.
          - step: "4NT = Blackwood (RKCB)"
            note: >
              Once controls are confirmed, 4NT asks for keycards. Standard 1430
              responses: 5!C = 1/4, 5!D = 0/3, 5!H = 2 without queen,
              5!S = 2 with queen.
          - step: "Sign off at game if controls are missing"
            note: >
              If partner bypasses your void suit (showing no control there),
              sign off at 4M or 5m. Don't explore slam with two fast losers.

      # ── 5m vs 3NT Decision ─────────────────────────────────
      five_minor_vs_3nt:
        title: "5-of-a-Minor vs 3NT"
        principle: >
          In a GF auction with a minor-suit fit, prefer 3NT unless there is a
          clear reason not to. 3NT requires 9 tricks; 5m requires 11. The bar
          for bypassing 3NT is high.
        criteria:
          - criterion: "Bid 3NT (default)"
            when: "Stoppers in all unbid suits, no singleton/void, 25-32 HCP combined"
          - criterion: "Bid 5m instead"
            when: >
              Unstoppable suit (no stopper in opponent's suit or a known side-suit
              weakness), OR extreme shape (6-5+, singleton), OR 33+ HCP (slam
              territory — consider 6m/6NT instead of stopping at 5m).
          - criterion: "Bid 6m or 6NT"
            when: "33+ HCP, or controls confirmed via cuebids + RKCB"
        guideline: >
          'When in doubt, bid 3NT.' The scoring advantage of 3NT (9 tricks for
          game) vs 5m (11 tricks for game) means 3NT is right more often than
          it feels. Only bail to 5m with a clear stopper problem.

      # ── Quick Decision Tree for 13+ HCP ────────────────────
      decision_tree:
        title: "Responder's Decision Tree: 13+ HCP After Partner Opens 1-Suit"
        steps:
          - question: "4+ cards in opener's major?"
            yes: "2NT (LTC ask), 3M (slam try), or 4M (game raise)"
            no: "Continue"
          - question: "5+ card suit to bid at the 2-level?"
            yes: "Bid it (2/1 GF). Later show 3-card major support if applicable."
            no: "Continue"
          - question: "4+ clubs?"
            yes: "Bid 2!C (2/1 GF). 4 clubs is acceptable in a GF auction."
            no: "Continue"
          - question: "Strong jump shift hand (16+ HCP, self-sufficient suit)?"
            yes: "Jump shift (e.g., 1!H - 3!D = 16+ GF, 5+ diamonds)"
            no: >
              With 13-15 and no suit to bid, bid 2!C as a 'catch-all' GF.
              This is the most flexible 2/1 bid — it creates the force while
              leaving maximum room to describe shape later.

  # ── 2!C Semi-Strong (Benji) ───────────────
  - bid: 2!C
    name: "Semi-Strong (Benji)"
    types:
      - type: 1
        name: "Balanced"
        hcp: "22-23"
        sequence: "2!C - 2!D - 2NT"
      - type: 2
        name: "Strong Major (Acol-style)"
        sequence: "2!C - 2!D - 2!H/!S"
        requirements:
          - "About 5 losers"
          - "At least 5 cards in the suit (usually 6+)"
          - "At least 3 top honours (A, K, Q)"
          - "Partner needs roughly 2 fillers to make game"
      - type: 3
        name: "Strong Two-Suiter"
        ltc: "~4 losers (≤3 losers → UCM opening instead)"
        shape: "5-5+ in two suits (or 4M+6m for 3!S/3NT types)"
        sequence: "2!C - 2!D - 3!C/3!D/3!H/3!S/3NT"
        note: >
          After 2!C-2!D (waiting), opener's 3-level rebid shows a strong two-suiter.
          Five rebids cover all suit combinations: 3!C = clubs + any suit,
          3!D = diamonds + a major, 3!H = both majors (known), 3!S = 4!S +
          6+ minor (4-6 shape), 3NT = 4!H + 6+ minor (4-6 shape).
          Responder continues with: suit = natural (pass/correct), NT = ask.
        continuations:
          after_3C:
            meaning: "Clubs + any other suit (5-5+)"
            natural: "Suit bid = pass/correct (3!D natural, opener passes or corrects)"
            pass_correct:
              - bid: 3!D
                by: responder
                meaning: "Natural — I can play diamonds"
              - bid: pass
                by: opener
                meaning: "Clubs + diamonds (agree diamonds)"
              - bid: 3!H
                by: opener
                meaning: "Clubs + hearts (correct)"
              - bid: 3!S
                by: opener
                meaning: "Clubs + spades (correct)"
            ask: "3NT asks which suit"
            ask_responses:
              - bid: 4!C
                meaning: "Clubs + diamonds"
              - bid: 4!D
                meaning: "Clubs + hearts"
              - bid: 4!H
                meaning: "Clubs + spades"
          after_3D:
            meaning: "Diamonds + a major (5-5+)"
            natural: "Suit bid = pass/correct (3!H natural, opener passes or corrects)"
            pass_correct:
              - bid: 3!H
                by: responder
                meaning: "Natural — I can play hearts"
              - bid: pass
                by: opener
                meaning: "Diamonds + hearts (agree hearts)"
              - bid: 3!S
                by: opener
                meaning: "Diamonds + spades (correct)"
            ask: "3NT asks which major"
            ask_responses:
              - bid: 4!C
                meaning: "Diamonds + hearts"
              - bid: 4!D
                meaning: "Diamonds + spades"
          after_3H:
            meaning: "Both majors — hearts + spades (5-5+)"
            note: "No ask needed — suits are known."
            responder:
              - bid: 3!S
                meaning: "Preference for spades"
              - bid: 3NT
                meaning: "To play"
              - bid: 4!H
                meaning: "Game in hearts"
              - bid: 4!S
                meaning: "Game in spades"
          after_3S:
            meaning: "4 spades + 6+ minor"
            natural: "4!C = pass/correct (opener passes or corrects to 4!D)"
            pass_correct:
              - bid: 4!C
                by: responder
                meaning: "Natural — I can play clubs"
              - bid: pass
                by: opener
                meaning: "Spades + clubs (agree clubs)"
              - bid: 4!D
                by: opener
                meaning: "Spades + diamonds (correct)"
            ask: "3NT asks which minor"
            ask_responses:
              - bid: 4!C
                meaning: "Spades + clubs"
              - bid: 4!D
                meaning: "Spades + diamonds"
          after_3NT:
            meaning: "4 hearts + 6+ minor"
            note: "No NT ask available — use pass/correct only."
            pass_correct:
              - bid: 4!C
                by: responder
                meaning: "Natural — I can play clubs"
              - bid: pass
                by: opener
                meaning: "Hearts + clubs (agree clubs)"
              - bid: 4!D
                by: opener
                meaning: "Hearts + diamonds (correct)"
          general_continuations: >
            After suits are identified: raise = support, cheapest NT = sign off,
            game in a major = to play, new suit = cue-bid (slam interest).

    responses:
      - bid: 2!D
        meaning: "Relay (always) — opener describes hand with rebid"
    note: >
      2!D is the only response to 2!C. Responder always relays;
      opener's rebid shows the hand type (2NT = balanced, 2!H/!S =
      strong major, 3-level = two-suiter).

  # ── 2!D Strong Game-Force ─────────────────
  - bid: 2!D
    name: "Strong Game-Force"
    ltc: "3-4 losers (game in hand or near it)"
    response_method: "Controls (Ace = 2, King = 1)"
    responses:
      - bid: 2!H
        controls: "0-1"
      - bid: 2!S
        controls: "2"
      - bid: 2NT
        controls: "3"
      - bid: 3!C
        controls: "4"
      - bid: 3!D
        controls: "5"
      - bid: 3!H
        controls: "6"
    note: >
      Excellent for slam exploration. Opener immediately knows the
      combined control count and can place the contract or ask further.
    interference_after_2D:
      principle: >
        DOPI/ROPI: preserve control-step responses when opponents interfere.
        Double (or Redouble) = first step, Pass = second step, then bids
        continue in order. At 4+ level, fall back to DEPO (Double = Even,
        Pass = Odd). Extends existing DOPI used for Ogust interference.
      penalty_mechanism: >
        2!D is game-forcing — ALL passes are forcing. DOPI shows controls on
        the first round; penalties come on the SECOND round. After responder's
        DOPI call, opener doubles opponent's suit = PENALTY (has their suit).
        After opener's rebid, responder doubles any subsequent opponent bid =
        PENALTY. Either player can penalize on any subsequent round. The
        forcing-pass auction guarantees another chance to double.
      rules:
        - trigger: "2!D - (X)"
          name: "ROPI (Redouble = 0, Pass = 1)"
          rule: "XX = 0-1 controls. Pass = 2. 2!H = 3. 2!S = 4. 2NT = 5. 3!C = 6."
          note: "Double doesn't steal space — all steps preserved plus XX as extra step."
        - trigger: "2!D - (2!H)"
          name: "DOPI (Double = 0, Pass = 1)"
          rule: "X = 0-1 controls. Pass = 2. 2!S = 3. 2NT = 4. 3!C = 5. 3!D = 6."
          penalty: >
            After Pass (2 controls): opener X = PENALTY (heart stack).
            After X (0-1 controls): opener passes, penalizes on next round.
            Responder with heart stack + 2 controls: Pass now, X later = penalty.
        - trigger: "2!D - (2!S)"
          name: "DOPI"
          rule: "X = 0-1 controls. Pass = 2. 2NT = 3. 3!C = 4. 3!D = 5. 3!H = 6."
          penalty: "Same principle: opener X after Pass = penalty. Subsequent X by either = penalty."
        - trigger: "2!D - (2NT)"
          name: "DOPI"
          rule: "X = 0-1 controls. Pass = 2. 3!C = 3. 3!D = 4. 3!H = 5. 3!S = 6."
          penalty: "Same principle: opener X after Pass = penalty. Subsequent X by either = penalty."
        - trigger: "2!D - (3-level)"
          name: "DOPI (compressed)"
          rule: "X = 0-1 controls. Pass = 2. Cheapest bid = 3. Next = 4. Steps continue upward."
          penalty: "Same principle. At this level, penalties are often the best score."
        - trigger: "2!D - (4-level+)"
          name: "DEPO (Double = Even, Pass = Odd)"
          rule: "X = even controls (0, 2, 4, 6). Pass = odd controls (1, 3, 5)."
          penalty: >
            After DEPO exchange, opener knows even/odd controls. Any subsequent
            double = PENALTY. At the 4-level, penalizing opponents is often
            more profitable than bidding slam.
          note: >
            At this level, exact count is impossible — DEPO gives binary
            information. Opener infers the likely count from hand strength.
        - trigger: "2!D - (5-level+)"
          name: "Forcing pass"
          rule: "Pass forces opener to act. Pull of opener's double = slam values. Direct bid = to play."
          penalty: "Opener doubles = penalty suggestion. Responder passes = agrees. Responder bids = overrules (slam)."

  # ── 2!H / 2!S Weak Two ───────────────────
  - bid: "2!H / 2!S"
    name: "Weak Two"
    hcp: "6-10"
    ltc: "8-9 losers"
    suit_length: "6+"
    style: "Disciplined, especially when vulnerable"
    suit_quality: "At least 2 of the top 5 honours (A, K, Q, J, T)"
    requirements:
      - "6+ cards in the bid major"
      - "6-10 HCP (not less, not more)"
      - "Decent suit quality — partner may raise pre-emptively or try for game"
      - "Avoid opening a weak two with a void or a strong 4-card side suit"
    enquiry:
      convention: "Ogust (2NT asks)"
      responses:
        - bid: 3!C
          meaning: "Minimum (6-7 HCP), poor suit (0-1 top honours)"
        - bid: 3!D
          meaning: "Minimum (6-7 HCP), good suit (2+ top honours)"
        - bid: 3!H
          meaning: "Maximum (8-10 HCP), poor suit"
        - bid: 3!S
          meaning: "Maximum (8-10 HCP), good suit"
        - bid: 3NT
          meaning: "Solid suit (AKQxxx+) — to play"
      continuations:
        - bid: 3M
          meaning: "Sign-off"
        - bid: "new suit at 3-level"
          meaning: "Forcing (slam exploration)"
        - bid: 3NT
          meaning: "To play"
        - bid: 4M
          meaning: "To play"
        - bid: "new suit at 4-level"
          meaning: "Cue-bid, slam try"
      interference:
        name: "DOPI (Double = step 1, Pass = step 2)"
        trigger: "Opponents interfere over the 2NT enquiry"
        bids:
          - bid: X
            meaning: "= 3!C response (minimum, poor suit)"
          - bid: Pass
            meaning: "= 3!D response (minimum, good suit)"
          - bid: "Any bid"
            meaning: "Ogust off, natural bidding"

  # ── 2NT ────────────────────────────────────
  - bid: 2NT
    hcp: "20-21"
    shape: ["4333", "4432", "5332"]
    responses:
      - bid: 3!C
        meaning: "Puppet Stayman — asks for 5-card major"
        continuations:
          - bid: 3!D
            meaning: "Denies 5-card major, then check for 4-card fits"
          - bid: 3!H
            meaning: "5 hearts"
          - bid: 3!S
            meaning: "5 spades"
      - bid: 3!D
        meaning: "Transfer to !H"
      - bid: 3!H
        meaning: "Transfer to !S"
      - bid: 4NT
        meaning: "Quantitative (inviting 6NT)"
    note: >
      Puppet Stayman fits better over 2NT than 1NT: the auction is
      already at the 3-level, so information leakage matters less,
      and finding the right major-suit game matters more.

  # ── 3-level and above ─────────────────────
  - bid: "3!C / 3!D / 3!H / 3!S"
    name: "Preemptive"
    suit_length: "7+"
    hcp: "~5-10"
    ltc: "7-8 losers (favorable: 8-9; unfavorable: 7)"
    meaning: "Destructive block. Sound at unfavourable vulnerability."

  - bid: 3NT
    name: "UCM Shape"
    meaning: "Two same-shape suits (♠♦ pointed or ♥♣ rounded), 5-5+, ≤3 losers"
    relay: "4!C asks which pair"
    responses:
      - bid: 4!D
        meaning: "Pointed (♠+♦)"
      - bid: 4!H
        meaning: "Rounded (♥+♣)"
    then: "Partner cuebids honors in opener's suits; RKCB available"

  - bid: 4!C
    name: "UCM Color"
    meaning: "Two same-color suits (♥♦ red or ♠♣ black), 5-5+, ≤3 losers"
    relay: "4!D asks which pair"
    responses:
      - bid: 4!H
        meaning: "Red (♥+♦)"
      - bid: 4!S
        meaning: "Black (♠+♣)"
    then: "Partner cuebids honors; RKCB available"

  - bid: 4!D
    name: "UCM Rank"
    meaning: "Two same-rank suits (♠♥ majors or ♣♦ minors), 5-5+, ≤3 losers"
    relay: "4!H asks which pair"
    responses:
      - bid: 4!S
        meaning: "Majors (♠+♥)"
      - bid: 4NT
        meaning: "Minors (♣+♦)"
    then: "Partner cuebids honors; RKCB available"
    note: >
      UCM encoding: U=Shape (same shape), C=Color (same color), M=Rank (majors/minors).
      Three openings cover all 6 possible suit pairs. After relay resolves the
      pair, partner cuebids honors in opener's long suits for slam exploration.
      Replaces Gambling 3NT and 4!C/4!D strong preempts (AMD-24).

  - bid: "4!H / 4!S"
    meaning: "To play — strong distributional hand or preemptive"

  - bid: 4NT
    name: "Specific Ace Ask (Acol 4NT)"
    meaning: >
      Monster hand that needs only specific ace locations to place the contract.
      Too distributional for 2!D control-step responses (which show count, not
      location). Typically 1-2 suited with extreme shape and voids.
    responses:
      - bid: 5!C
        meaning: "No aces"
      - bid: 5!D
        meaning: "Ace of diamonds"
      - bid: 5!H
        meaning: "Ace of hearts"
      - bid: 5!S
        meaning: "Ace of spades"
      - bid: 5NT
        meaning: "Ace of clubs"
      - bid: 6!C
        meaning: "Two aces"
    opener_continuation: >
      Natural — bid slam in your suit if the right ace is held, sign off at
      the 5-level if not, bid grand slam with two aces. Partner's ace
      identity tells you whether your losers are covered.
    examples:
      - hand: "!SAKQJ976 !HAKQxx !D- !Cx"
        action: "4NT. !HA response → 7!S. !DA → 6!S. No ace → 5!S."
      - hand: "!SAKxxxx !HAKxxxx !D- !C-"
        action: "4NT. Any ace → 6M. Two aces → 7M. No ace → 5!H."
      - hand: "!S- !HAKQJTxxx !DAKQx !Cx"
        action: "4NT. !DA → 7!H. Any other ace → 6!H. No ace → 5!H."
    note: >
      Do NOT confuse with defensive 4NT (two-suited takeout over opponents'
      4!H/4!S). Opening 4NT = ace ask. Overcalling 4NT = two-suited.
      If in doubt: did WE open? → ace ask. Did THEY open? → takeout.

  - bid: "5!C / 5!D"
    meaning: "Extreme preempt or to play"

# ──────────────────────────────────────────────
# Defensive Bidding (when opponents open)
# ──────────────────────────────────────────────

competitive:

  # ── Vulnerability and LTC Framework ─────────
  vulnerability_framework:
    name: "Vulnerability-Adjusted Losing Trick Count"
    principle: >
      All defensive bidding actions are governed by Losing Trick Count (LTC)
      adjusted for vulnerability. HCP gives a rough guide, but LTC measures
      offensive potential — the number of tricks your hand can contribute.
      Vulnerability determines how aggressive you can afford to be: cheap
      penalties at favorable allow lighter action; expensive penalties at
      unfavorable demand discipline.
    definitions:
      favorable: "We are Not Vulnerable, they are Vulnerable (NV vs Vul)"
      equal: "Both Vulnerable or both Not Vulnerable"
      unfavorable: "We are Vulnerable, they are Not Vulnerable (Vul vs NV)"
    ltc_adjustment: >
      At favorable vulnerability, act with 1 more loser than standard
      (the penalty for going down is cheap: 50/trick undoubled).
      At unfavorable vulnerability, require 1 fewer loser than standard
      (the penalty is expensive: 100/trick undoubled, 200+ doubled).
      At equal vulnerability, use standard thresholds.
    reference_table:
      - action: "Simple overcall"
        favorable: "9 losers"
        equal: "8 losers"
        unfavorable: "7 losers"
      - action: "Jump overcall (weak)"
        favorable: "10 losers"
        equal: "9 losers"
        unfavorable: "8 losers"
      - action: "Takeout double"
        favorable: "7 losers"
        equal: "6 losers"
        unfavorable: "5 losers"
      - action: "UCM / UCM vs 1NT"
        favorable: "9 losers, 5-4+ shape"
        equal: "8 losers, 5-4+ shape"
        unfavorable: "7 losers, 5-5+ shape"
      - action: "Michaels / Unusual 2NT"
        favorable: "9 losers (weak side)"
        equal: "8 losers (weak side)"
        unfavorable: "7 losers or 16+ HCP (strong side only)"
      - action: "RAPTOR 1NT overcall"
        favorable: "9 losers"
        equal: "8 losers"
        unfavorable: "7 losers"
      - action: "Natural overcall at 2-level"
        favorable: "8 losers"
        equal: "7 losers"
        unfavorable: "6 losers"

  # ── Overcalls (general) ────────────────────
  overcalls:
    simple:
      hcp: "8-16"
      suit_length: "5+"
      ltc: "8 losers at equal; 9 at favorable; 7 at unfavorable"
      note: >
        Suit quality matters more than HCP. A 5-card suit headed by two honours
        with 8 losers is a sound overcall. Assess tricks, not points.
    jump_overcall:
      meaning: "Weak — same as a weak two/three opening at the appropriate level"
      ltc: "9 losers at equal; 10 at favorable; 8 at unfavorable"
    takeout_double:
      meaning: "Support for all unbid suits, typically 12+ HCP or any 17+"
      ltc: "6 losers at equal (shape compensates for fewer HCP with good support)"

  # ── RAPTOR ─────────────────────────────────
  raptor:
    name: "RAPTOR Convention"
    trigger: "Overcall of 1NT over opponent's suit opening"
    hcp: "10-16"
    ltc: "8 losers at equal; 9 at favorable; 7 at unfavorable"
    shows:
      - "4 cards in the unbid major"
      - "5+ cards in a minor"
    principle: "Minimax — aiming to sign off, tolerate a suit."
    note: >
      Comes up more frequently than a natural 1NT (15-17) overcall.
      The HCP range is 10-16 because lighter hands pass and stronger
      hands start with a takeout double. LTC is more accurate than HCP
      here because the 4-5+ two-suited shape generates tricks.

    after_opponent_opens_major:
      trigger: "Opponent opens 1!H or 1!S, we overcall 1NT"
      shows: "4 in unbid major + 5+ in a minor"
      responses:
        - bid: "Cue bid (opponent's suit)"
          meaning: "Asks for the major"
        - bid: "2 of other minor"
          meaning: "To play"
        - bid: "2 of unbid major"
          meaning: "Natural, 5+ cards, willing to play"
        - bid: 2NT
          meaning: "Invitational+, asks overcaller's shape"

    after_opponent_opens_minor:
      trigger: "Opponent opens 1!C or 1!D, we overcall 1NT"
      shows: "5+ in other minor + 4 in an unknown major"
      responses:
        - bid: "2!C (cheapest minor)"
          meaning: "Pass or correct to overcaller's minor"
        - bid: "Cue bid (opponent's suit)"
          meaning: "Asks for the major"
        - bid: "2!H / 2!S"
          meaning: "Natural, 5+ cards"
        - bid: 2NT
          meaning: "Invitational+, asks overcaller's shape"

  # ── UCM over artificial/strong openings ────
  ucm:
    name: "UCM Convention (Untouched-Color-MinorMajor)"
    trigger: "Opponents open artificial/strong bid or short/garbage suit (strong 1!C, 2!C, 2!D, short !C 2+, garbage 1!D). NOT against Multi 2!D — use natural bidding instead."
    principle: >
      When opponents open an artificial/strong bid that does not promise a specific
      suit, all four suits are 'unbid'. UCM provides three two-suited bids organized
      by suit-pairing property: Untouched, Color, MinorMajor. The same applies to
      garbage/short openings where the bid does not promise length in the suit.
    definitions:
      Untouched: "Two non-adjacent suits (!S+!D pointed, or !H+!C rounded)"
      Color: "Two same-color suits (!H+!D reds, or !S+!C blacks)"
      MinorMajor: "Two same-rank suits (!H+!S majors, or !C+!D minors)"
    requirements:
      - "5-4+ shape (5-5+ required at unfavorable vulnerability)"
      - "LTC: 8 losers at equal, 9 at favorable, 7 at unfavorable"
      - "At unfavorable: only act with 5-5+ shape and 7 or fewer losers"
      - "At favorable: 5-4 shape with 9 losers is acceptable — disruption value is high"
    vs_strong_2C:
      trigger: "(2!C) - ?"
      bids:
        - bid: X
          meaning: "Color (reds or blacks)"
        - bid: 2!D
          meaning: "MinorMajor (majors or minors)"
        - bid: 2!H
          meaning: "Natural, 5+ hearts"
        - bid: 2!S
          meaning: "Natural, 5+ spades"
        - bid: 2NT
          meaning: "Untouched (pointed or rounded)"
    vs_strong_1C:
      trigger: "(1!C) - ?"
      bids:
        - bid: X
          meaning: "Color (reds or blacks)"
        - bid: 1!D
          meaning: "MinorMajor (majors or minors)"
        - bid: 1!H
          meaning: "Natural, 5+ hearts"
        - bid: 1!S
          meaning: "Natural, 5+ spades"
        - bid: 1NT
          meaning: "Untouched (pointed or rounded)"
    vs_strong_2D:
      trigger: "(2!D) - ? [strong or garbage 2!D only — NOT Multi 2!D]"
      note: >
        UCM is excluded against Multi 2!D (weak two in either major). Simulation
        evidence: 40,000 deals show 46.9% MP and 0.8:1 gain/loss ratio — the only
        negative-expectation UCM scenario. Multi is a preemptive opening; the opener
        is weak (5-10 HCP) with a known 6-card major, reducing UCM's disruption value.
        Use natural bidding (double/overcall) until a dedicated defense is developed.
      bids:
        - bid: X
          meaning: "Color (reds or blacks)"
        - bid: 2!H
          meaning: "MinorMajor (majors or minors)"
        - bid: 2!S
          meaning: "Natural, 5+ spades"
        - bid: 2NT
          meaning: "Untouched (pointed or rounded)"
    vs_garbage_1D:
      trigger: "(1!D) - ? [garbage/short !D, does not promise length]"
      bids:
        - bid: X
          meaning: "Color (reds or blacks)"
        - bid: 1!H
          meaning: "MinorMajor (majors or minors)"
        - bid: 1!S
          meaning: "Natural, 5+ spades"
        - bid: 1NT
          meaning: "Untouched (pointed or rounded)"
    advancer_actions:
      title: "Advancer (partner of UCM bidder)"
      principle: >
        Advancer uses pass/correct to find the right suit. Bid your better suit
        in the shorter possible pair. If you hold equal preference, bid the cheaper suit.
      examples:
        - scenario: "Partner bids Color (reds or blacks), you hold !H:Kxxx !D:xx !S:Jxx !C:xxxx"
          action: "Bid hearts (your better red suit). If partner has blacks, he corrects to !S."
        - scenario: "Partner bids MinorMajor (majors or minors), you hold !H:xx !S:Qxxx !C:Kxxxx !D:x"
          action: "Bid !S (your better major). If partner has minors, he corrects to his minor."

  # ── Defense to opponents' 1NT ────────────────
  defense_vs_1nt:
    name: "UCM Defense to 1NT (differentiated by strength)"
    principle: >
      Unified UCM framework extends to 1NT defense. Against weak NT, a penalty
      double is too valuable to sacrifice (opponents are minimum, conversion is
      frequent). Against strong NT, disruption via UCM is more productive than
      penalty. After a penalty double, if opponents run, revert to natural bidding.

    vs_strong_nt:
      trigger: "(1NT: 15-17) - ?"
      label: "Vs Strong NT (15-17)"
      bids:
        - bid: X
          meaning: "Color (reds or blacks)"
        - bid: 2!C
          meaning: "MinorMajor (majors or minors)"
        - bid: 2!D
          meaning: "Untouched (pointed or rounded)"
        - bid: 2!H
          meaning: "Natural, 5+ hearts"
        - bid: 2!S
          meaning: "Natural, 5+ spades"
      note: >
        Pure UCM. No penalty double — against 15-17, we are unlikely to have
        a big penalty. Disruption and lead direction are more valuable.

    vs_weak_nt:
      trigger: "(1NT: 12-14) - ?"
      label: "Vs Weak NT (12-14)"
      bids:
        - bid: X
          meaning: "Penalty (15+ HCP)"
        - bid: 2!C
          meaning: "Color (reds or blacks)"
        - bid: 2!D
          meaning: "MinorMajor (majors or minors)"
        - bid: 2!H
          meaning: "Natural, 5+ hearts"
        - bid: 2!S
          meaning: "Natural, 5+ spades"
        - bid: 2NT
          meaning: "Untouched (pointed or rounded)"
      note: >
        UCM shifts one step up to make room for penalty double. Untouched moves
        to 2NT. Against 12-14, the penalty double is high-frequency and lucrative —
        opponents are minimum and unlikely to make 1NT doubled.

    after_penalty_double:
      trigger: "(1NT) - X - Run by opponents"
      principle: "Natural bidding resumes. No UCM, no special meanings."

    requirements:
      - "5-4+ shape (5-5+ at unfavorable)"
      - "LTC: 8 losers at equal, 9 at favorable, 7 at unfavorable"
      - "Penalty double vs weak NT: 15+ HCP regardless of vulnerability (trick-based, not LTC)"

  # ── Michaels Cuebid ──────────────────────────
  michaels:
    name: "Michaels Cuebid"
    trigger: "Direct cuebid of opponent's natural suit opening"
    requirements:
      - "5-5+ in the two suits shown"
      - "Weak side: 8-9 losers at equal, 9-10 at favorable, 7-8 at unfavorable"
      - "Strong side: 5-6 losers (16+ HCP equivalent)"
      - "Intermediate hands (11-15, 7 losers): overcall first, bid second suit later"
      - "At unfavorable vulnerability, only use weak Michaels with 5-5+ and max 8 losers"
    over_minor:
      trigger: "(1!C) - 2!C or (1!D) - 2!D"
      shows: "Both majors (5-5+)"
      responses:
        - bid: "2!H / 2!S"
          meaning: "To play (preference)"
        - bid: 2NT
          meaning: "Asks for minor; game interest"
        - bid: "3!H / 3!S"
          meaning: "Invitational (4+ card support)"
        - bid: "4!H / 4!S"
          meaning: "To play"
    over_major:
      trigger: "(1!H) - 2!H or (1!S) - 2!S"
      shows: "Other major + unspecified minor (5-5+)"
      responses:
        - bid: "2!S (or 2!H)"
          meaning: "To play in the other major"
        - bid: 2NT
          meaning: "Asks which minor (3!C = clubs, 3!D = diamonds)"
        - bid: "3!C"
          meaning: "Pass or correct (to play in overcaller's minor)"
        - bid: "3 of other major"
          meaning: "Invitational"
        - bid: "4 of other major"
          meaning: "To play"

  # ── Unusual 2NT ──────────────────────────────
  unusual_2nt:
    name: "Unusual 2NT"
    trigger: "Jump to 2NT over opponent's 1-level suit opening"
    shows: "Two lowest unbid suits (5-5+)"
    range: "Same as Michaels: weak (8-9 losers) or strong (5-6 losers)"
    vulnerability_note: >
      Same LTC thresholds as Michaels. At favorable, 9-10 losers acceptable
      (you are bidding at the 2-level with a known fit). At unfavorable,
      only strong Unusual 2NT (5-6 losers) — weak side is too dangerous.
    examples:
      - auction: "(1!C) - 2NT"
        shows: "!D + !H (two lowest unbid)"
      - auction: "(1!D) - 2NT"
        shows: "!C + !H (two lowest unbid)"
      - auction: "(1!H) - 2NT"
        shows: "!C + !D (two lowest unbid = minors)"
      - auction: "(1!S) - 2NT"
        shows: "!C + !D (two lowest unbid = minors)"
    responses:
      - bid: "3 of a minor"
        meaning: "To play (preference)"
      - bid: "4 of a minor"
        meaning: "Invitational or preemptive"
      - bid: 3NT
        meaning: "To play (rare — good stoppers in their suit)"

  # ── Lebensohl after double of weak two ───────
  lebensohl:
    name: "Lebensohl"
    trigger: "Partner doubles opponent's weak two (2!H or 2!S) for takeout"
    principle: >
      Without Lebensohl, advancer cannot distinguish weak (0-7), invitational
      (8-11), and game-forcing (12+) hands. The 2NT relay creates a weak
      channel; direct bids become constructive. Slow Shows, Fast Denies
      resolves the 3NT stopper question.
    advancer_ltc:
      - range: "Weak (0-7 HCP, 10+ losers)"
        action: "Bid 2NT relay → pass or correct at 3-level"
      - range: "Invitational (8-11 HCP, 8-9 losers)"
        action: "Bid directly at 3-level (natural, non-forcing)"
      - range: "Game-forcing (12+ HCP, 7 or fewer losers)"
        action: "Cuebid or direct 3NT"
      - range: "Penalty (any HCP, 5+ strong trumps in opponent's suit)"
        action: "Pass (penalty conversion). Partner leads a trump."
    responses:
      - bid: 2NT
        meaning: "Relay to 3!C (weak hand, 0-7 HCP, 10+ losers)"
        continuations:
          - bid: 3!C
            by: doubler
            meaning: "Forced relay"
          - bid: "Pass / 3!D / 3!H"
            by: advancer
            meaning: "Pass or correct to play in advancer's suit"
      - bid: "direct 3-level suit"
        meaning: "Invitational (8-11 HCP), natural, non-forcing"
      - bid: "cuebid (3 of their suit)"
        meaning: "Game-forcing, asks for stopper in opponent's suit"
      - bid: "direct 3NT"
        meaning: "To play, denies stopper in their suit (Fast Denies)"
      - bid: "2NT then 3NT (after relay)"
        meaning: "To play, shows stopper in their suit (Slow Shows)"
      - bid: Pass
        meaning: "Penalty conversion — 5+ strong trumps (2+ of AKQ) in opponent's suit. Partner leads a trump."
    note: >
      'Slow Shows, Fast Denies' — going through the 2NT relay before bidding 3NT
      shows a stopper (you took the slow route). Bidding 3NT directly denies a
      stopper (fast route). This lets partner judge whether 3NT or a suit game
      is better.

  # ── Defense to Multi 2D (Fighters style) ────
  defense_vs_multi_2D:
    name: "Defense to Multi 2!D (Fighters style)"
    trigger: "(2!D) - ? [Multi 2!D — weak two in either major, 5-10 HCP, 6-card major]"
    principle: >
      Multi 2!D is PREEMPTIVE, not artificial/strong. UCM is explicitly excluded
      (simulation: 46.9% MP, 0.8:1 gain/loss across 40,000 deals). The key problem
      is ambiguity — which major do they have? The Fighters defense acts minimally
      in direct seat, then uses pass-then-act to compete once the suit is revealed.
    exclusion_note: >
      UCM was falsified against Multi 2!D by DD simulation. The opener is weak
      (5-10 HCP) with a known 6-card major, so UCM's suit-pairing disruption adds
      no value. Our side typically holds 20-25 HCP — the goal is to reach the right
      contract, not to disrupt. See contract-bridge/simulation/crash.md.
    direct_seat:
      title: "Direct Seat Actions (immediately over 2!D)"
      bids:
        - bid: X
          meaning: "Fighters double: 12-15 HCP balanced, OR any 19+ HCP"
          continuations:
            - situation: "Doubler has 12-15 balanced"
              advancer: >
                Place the contract: pass (penalty, rare), 2!H/2!S natural to play,
                2NT invitational, 3-level natural.
            - situation: "Doubler has 19+"
              advancer: >
                Doubler bids again strongly: double of their suit = takeout,
                cuebid = game force, jump = natural strong.
        - bid: 2!H
          meaning: "Natural, 5+ hearts, 10+ HCP, good suit"
        - bid: 2!S
          meaning: "Natural, 5+ spades, 10+ HCP, good suit"
        - bid: 2NT
          meaning: "16-18 HCP balanced (systems on — Puppet Stayman, transfers)"
        - bid: 3!C
          meaning: "Natural, good 6+ suit, constructive (opening values)"
        - bid: 3!D
          meaning: "Natural, good 6+ suit, constructive (opening values)"
        - bid: 3!H
          meaning: "Natural, good 6+ suit, constructive (opening values)"
        - bid: 3!S
          meaning: "Natural, good 6+ suit, constructive (opening values)"
        - bid: Pass
          meaning: "Default — most hands. Wait for suit to be revealed."
    phase_2:
      title: "Phase 2 — After Opponent's Suit Is Revealed"
      trigger: "(2!D) - Pass - 2!H/2!S (pass or correct) - ?"
      principle: >
        Once the suit is known, treat exactly as defense to a standard weak two.
        Lebensohl applies (R-BID-021, F-SYS-018). This is the primary advantage
        of pass-then-act: no new convention needed, existing Lebensohl covers it.
      bids:
        - bid: X
          meaning: "Takeout of the revealed major"
        - bid: 2NT
          meaning: "Lebensohl relay to 3!C (weak hand, pass or correct)"
        - bid: "direct 3-level suit"
          meaning: "Invitational (8-11 HCP), natural, non-forcing"
        - bid: "cuebid (3 of their suit)"
          meaning: "Game-forcing, asks stopper"
        - bid: "direct 3NT"
          meaning: "To play (Fast Denies stopper)"
        - bid: "2NT then 3NT"
          meaning: "To play (Slow Shows stopper)"
    examples:
      - scenario: "Multi 2!D, you hold !S:AQ43 !H:K52 !D:J76 !C:A32 (14 HCP balanced)"
        action: "Double (12-15 balanced). Partner places contract."
      - scenario: "Multi 2!D, you hold !S:AKQ2 !H:AK4 !D:KJ6 !C:Q32 (22 HCP)"
        action: "Double (19+). You will bid again strongly after partner's response."
      - scenario: "Multi 2!D, you hold !S:KQJ84 !H:A3 !D:72 !C:KJ54 (14 HCP)"
        action: "2!S natural (5+ spades, 10+ HCP). Lead-directing and constructive."
      - scenario: "Multi 2!D - Pass - 2!H, you hold !S:AK32 !H:52 !D:KJ76 !C:A32"
        action: "Double (takeout of hearts). Lebensohl applies — partner bids naturally."

  # ── Defense to 5-5 Openings ─────────────────
  defense_vs_55_openings:
    name: "Defense to 5-5 Openings"
    trigger: "(2!H) = 5!H + 5-card minor, or (2!S) = 5!S + 5-card minor"
    principle: >
      The bid major is known — treat as a weak two in that major. Standard weak-two
      defense applies: double = takeout, Lebensohl structures responses. The only
      additional awareness: opener has a 5-card minor, so bid minors cautiously
      (prefer the longer minor when advancer has a choice between two).
    bids:
      - bid: X
        meaning: "Takeout of the bid major. Lebensohl applies."
      - bid: 2NT
        meaning: "16-18 HCP balanced (systems on — Puppet Stayman, transfers)"
      - bid: "new suit"
        meaning: "Natural, constructive (opening values)"
      - bid: "cuebid (3!H over 2!H, 3!S over 2!S)"
        meaning: "Game-forcing, stopper ask"
      - bid: 3NT
        meaning: "To play, with stopper(s)"
    minor_caution: >
      Opener has a 5-card minor. If advancer is choosing between clubs and diamonds,
      prefer the longer one. If equal length, prefer the one less likely to be
      opener's second suit (often unknowable — just bid your longer/stronger minor).
    examples:
      - scenario: "(2!H = 5!H + 5m), you hold !S:KQ43 !H:52 !D:AJ76 !C:K32"
        action: "Double (takeout of hearts). Lebensohl applies if needed."
      - scenario: "(2!S = 5!S + 5m), you hold !S:72 !H:AKJ84 !D:Q3 !C:KJ54"
        action: "3!H natural, constructive (good 5-card suit, opening values)."

  # ── Defense to 3-Level Preempts ──────────────
  defense_vs_3_level_preempts:
    name: "Defense to 3-Level Preempts"
    trigger: "Opponent opens 3!C / 3!D / 3!H / 3!S"
    principle: >
      At the 3-level, double is takeout/cooperative — partner should bid with shape
      and pass with flat defence. New suits at the 3-level are forcing. Lebensohl
      does NOT apply (already at the 3-level, no 2NT relay available).
    bids:
      - bid: X
        meaning: "Takeout/cooperative — asks partner to bid with shape, pass with flat defence"
      - bid: 3NT
        meaning: "To play (requires stopper in their suit)"
      - bid: "new suit at 3-level"
        meaning: "Forcing, natural, good suit"
      - bid: "new suit at 4-level"
        meaning: "To play (not forcing)"
      - bid: 4NT
        meaning: "Unusual — two lowest unbid suits"
    note: >
      Against major preempts, the cooperative double is the key tool — "do something
      intelligent." Against minor preempts, there is more room to bid naturally.
    examples:
      - scenario: "(3!H), you hold !S:AQ43 !H:52 !D:KJ76 !C:A32 (14 HCP, short hearts)"
        action: "Double (takeout). Partner bids best suit."
      - scenario: "(3!D), you hold !S:KQ2 !H:AJ4 !D:QJ76 !C:K32 (16 HCP, diamond stopper)"
        action: "3NT to play."
      - scenario: "(3!C), you hold !S:72 !H:AKJ843 !D:KQ3 !C:54 (13 HCP, good suit)"
        action: "3!H forcing — natural, good suit."

  # ── Defense to 4-Level Preempts ──────────────
  defense_vs_4_level_preempts:
    name: "Defense to 4-Level Preempts"
    trigger: "Opponent opens 4!C / 4!D / 4!H / 4!S"
    principle: >
      The key rule: double of a major preempt at game level = penalty-oriented
      (partner passes unless very distributional). Double of a minor preempt
      below game = takeout (room to find a major fit).
    bids:
      - bid: "X of 4!H / 4!S"
        meaning: "Penalty-oriented (partner passes unless very distributional)"
      - bid: "X of 4!C / 4!D"
        meaning: "Takeout (room to find major fit below game)"
      - bid: "4NT over 4!H / 4!S"
        meaning: "Two-suited takeout (both minors, or any 5-5+)"
      - bid: "5-level"
        meaning: "To play"
    examples:
      - scenario: "(4!S), you hold !S:KJ4 !H:AQ7 !D:K983 !C:A52 (17 HCP, balanced)"
        action: "Double (penalty). Expect to defeat 4!S."
      - scenario: "(4!D), you hold !S:AQ43 !H:KJ76 !D:2 !C:AJ32 (15 HCP, short diamonds)"
        action: "Double (takeout). Partner bids best major."
      - scenario: "(4!H), you hold !S:32 !H:— !D:KQJ876 !C:AQJ54 (extreme shape)"
        action: "4NT (two-suited takeout). Both minors."

  # ── Balancing / Protection ───────────────────
  balancing:
    name: "Balancing (Protection)"
    trigger: "Opponent's bidding dies at a low level — (1x) - P - P - ? or (1x) - P - (2x) - P - P - ?"
    principle: >
      When opponents stop low, partner's pass may trap values behind the opener
      ("borrowing a king from partner"). Act with ~3 HCP less than a direct action.
      Critical at matchpoints — letting opponents play undisturbed at the 1-2 level
      is often a bottom board.
    adjustments:
      - action: "Balancing 1NT"
        range: "~11-14 HCP (not 15-18 like direct seat)"
      - action: "Balancing takeout double"
        range: "10+ HCP (not 12+ like direct seat)"
      - action: "Balancing overcall"
        range: "8+ HCP, reasonable suit"
      - action: "Balancing jump overcall"
        range: "Intermediate (not weak — partner already passed)"
    partner_adjustment: >
      Partner must downgrade by ~3 HCP when responding to a balancing action
      ("return the borrowed king"). Do not jump to game when partner balances
      unless your hand justifies it independently.
    examples:
      - scenario: "(1!S) - Pass - Pass - ?, you hold !S:52 !H:KJ43 !D:A76 !C:Q832 (10 HCP)"
        action: "Double (balancing takeout). Would pass in direct seat (too weak for direct X)."
      - scenario: "(1!H) - Pass - Pass - ?, you hold !S:KQ4 !H:J76 !D:AJ32 !C:Q54 (13 HCP)"
        action: "1NT (balancing, shows ~11-14). Not strong enough for direct 1NT (15-18)."
      - scenario: "(1!D) - Pass - (2!D) - Pass - Pass - ?, you hold !S:AJ84 !H:K43 !D:72 !C:Q832"
        action: "Double (balancing). Partner's pass trapped values."

  # ── Advancing Partner's Overcall ─────────────
  advancing_overcall:
    name: "Advancing Partner's Overcall"
    trigger: "(1x) - 1y/2y [partner overcalls] - Pass/Bid - ?"
    principle: >
      Key insight: cuebid = good raise, jump raise = weak. This reverses what many
      club players assume. Simple raise is competitive (Law of Total Tricks), not
      invitational. New suits are non-forcing.
    bids:
      - bid: "simple raise"
        meaning: "Competitive, 6-9 HCP, 3+ support (Law of Total Tricks, not invitational)"
      - bid: "cuebid of opponent's suit"
        meaning: "Limit raise or better (10+ HCP, 3+ support)"
      - bid: "jump raise"
        meaning: "Preemptive (weak, 4+ support — NOT invitational)"
      - bid: 2NT
        meaning: "Sound constructive raise (9-11 HCP, 3+ support, balanced)"
      - bid: "new suit"
        meaning: "Non-forcing (constructive, but may be passed)"
      - bid: "jump in new suit"
        meaning: "Fit-showing (good suit + support for partner, invitational)"
    examples:
      - scenario: "(1!H) - 1!S - Pass - ?, you hold !S:Q43 !H:72 !D:KJ76 !C:8432 (6 HCP)"
        action: "2!S (simple raise, competitive — not invitational)."
      - scenario: "(1!H) - 1!S - Pass - ?, you hold !S:K43 !H:72 !D:AJ76 !C:K432 (11 HCP)"
        action: "2!H (cuebid = limit raise+). Shows 10+ with spade support."
      - scenario: "(1!H) - 1!S - Pass - ?, you hold !S:QJ43 !H:2 !D:J9763 !C:843 (4 HCP)"
        action: "3!S (jump raise = preemptive, 4 trumps, weak)."
      - scenario: "(1!D) - 1!S - Pass - ?, you hold !S:K3 !H:AQ984 !D:76 !C:J543 (10 HCP)"
        action: "2!H (new suit, non-forcing). Constructive but partner may pass."

  # ── Advancing Partner's Takeout Double ───────
  advancing_takeout_double:
    name: "Advancing Partner's Takeout Double (of 1-Level)"
    trigger: "(1x) - X - Pass - ?"
    principle: >
      The most common use of a takeout double. Partner has asked you to bid —
      you MUST bid unless you want to convert to penalty. Lebensohl covers
      responses to doubles of weak twos (see Lebensohl section). This section
      covers responses to doubles of 1-level openings.
    bids:
      - bid: "cheapest 4-card suit"
        meaning: "Minimum (0-8 HCP) — forced, even with nothing"
      - bid: "jump in a suit"
        meaning: "Invitational (9-11 HCP), shows real values and 4+ cards"
      - bid: "cuebid of opener's suit"
        meaning: "Game force (12+ HCP), no clear direction — asks doubler to describe"
      - bid: 1NT
        meaning: "6-10 HCP with stopper in opener's suit"
      - bid: 2NT
        meaning: "11-12 HCP with stopper in opener's suit (invitational)"
      - bid: Pass
        meaning: "Penalty conversion (rare — requires 5+ strong trumps in opener's suit)"
    pass_conversion_note: >
      The penalty pass is a powerful but rare weapon. Requirements: 5+ cards in
      opener's suit with good honours (e.g., KQJ9x). Partner must lead a trump.
      Do NOT pass just because you have nothing — bid your cheapest suit instead.
    examples:
      - scenario: "(1!H) - X - Pass - ?, you hold !S:J743 !H:852 !D:964 !C:932 (1 HCP)"
        action: "1!S (cheapest 4-card suit). Forced — even with nothing."
      - scenario: "(1!H) - X - Pass - ?, you hold !S:KQ43 !H:52 !D:A76 !C:J832 (10 HCP)"
        action: "2!S (jump = invitational, shows 9-11 and 4+ spades)."
      - scenario: "(1!D) - X - Pass - ?, you hold !S:A43 !H:KJ6 !D:Q74 !C:K832 (13 HCP)"
        action: "2!D (cuebid = game force). Asks partner to describe further."
      - scenario: "(1!H) - X - Pass - ?, you hold !S:43 !H:KQJ97 !D:864 !C:Q32 (8 HCP)"
        action: "Pass (penalty conversion). Strong trumps; partner leads a trump."

  # ── Lead-Directing Doubles ───────────────────
  lead_directing_doubles:
    name: "Lead-Directing Doubles of Artificial Bids"
    trigger: "Opponents make an artificial bid (Stayman, transfer, cuebid, slam)"
    principle: >
      One principle covers all cases: double of an artificial bid always requests
      a lead of that suit. This is free information at zero memory cost.
    bids:
      - bid: "X of Stayman (2!C)"
        meaning: "Lead clubs"
      - bid: "X of transfer (2!D over 1NT)"
        meaning: "Lead diamonds (the suit doubled, not the target major)"
      - bid: "X of transfer (2!H over 1NT)"
        meaning: "Lead hearts (the suit doubled, not the target major)"
      - bid: "X of any cuebid"
        meaning: "Lead the cuebid suit"
      - bid: "X of voluntarily-bid slam"
        meaning: "Lightner double — unusual lead request (NOT your normal lead)"
    lightner_note: >
      Lightner double requests the most unusual lead: typically dummy's first-bid
      suit, or a suit where you can ruff. It explicitly says "do NOT lead the
      normal suit (our suit, or the unbid suit)."
    examples:
      - scenario: "(1NT) - Pass - (2!C Stayman) - X"
        action: "Lead clubs. You hold !C:KQJ84 or similar."
      - scenario: "(1NT) - Pass - (2!D transfer) - X"
        action: "Lead diamonds. You hold !D:AKJ or good diamonds."
      - scenario: "Opponents bid 6!S voluntarily, you double (Lightner)"
        action: "Partner leads dummy's first-bid suit (or the most unusual suit)."

  # ── Defense to Opponents' Transfers over 1NT ─
  defense_vs_transfers:
    name: "Defense to Opponents' Transfers over Their 1NT"
    trigger: "(1NT) - Pass - (2!D/2!H transfer) - ?"
    principle: >
      Extends the lead-directing double principle. Generally be conservative —
      opponents have announced combined 20+ HCP. Only compete with shape or
      strength.
    bids:
      - bid: "X of transfer"
        meaning: "Lead-directing — shows the suit being doubled (not the target major)"
      - bid: "bid of transfer suit"
        meaning: "Natural — you hold that suit (e.g., 2!D over 2!D shows diamonds)"
      - bid: "bid of target suit"
        meaning: "Takeout/lead-directing (showing the other suits)"
    examples:
      - scenario: "(1NT) - Pass - (2!D = transfer to !H) - X"
        action: "Shows diamonds (lead-directing). Bid 2!H if you have hearts (natural)."
      - scenario: "(1NT) - Pass - (2!H = transfer to !S) - 2!S"
        action: "Takeout of spades (the target suit). Showing the other suits."

  # ── Sandwich Position ────────────────────────
  sandwich_position:
    name: "Sandwich Position"
    trigger: "(1x) - Pass - (1y) - ? [sitting between two bidding opponents]"
    principle: >
      Acting between two bidding opponents is dangerous — both have values. Be
      cautious. The key agreement: 1NT in the sandwich position is UNUSUAL
      (showing the two lower unbid suits), NOT natural. Only act with real
      shape or real strength.
    bids:
      - bid: X
        meaning: "Both unbid suits, moderate values (at least opening count)"
      - bid: 1NT
        meaning: "Unusual — two lower unbid suits (NOT natural)"
      - bid: "overcall"
        meaning: "Natural, good suit required (sandwiched between two bidders)"
    caution: >
      The sandwich position is the most dangerous position at the table. Both
      opponents have values, and partner is broke. Only act with extreme shape
      (5-5+) or genuine strength. Light actions here produce catastrophic results.
    examples:
      - scenario: "(1!C) - Pass - (1!H) - ?, you hold !S:KQ43 !H:2 !D:AQJ76 !C:843"
        action: "1NT (unusual — shows diamonds + spades, the two lower unbid)."
      - scenario: "(1!D) - Pass - (1!S) - ?, you hold !S:72 !H:AKJ84 !D:Q3 !C:KJ54"
        action: "2!H (overcall, good suit). Dangerous position but suit quality justifies."

# ──────────────────────────────────────────────
# Defensive Carding
# ──────────────────────────────────────────────

defensive_carding:
  # ══════════════════════════════════════════════════════════════
  # MASTER RULE: Low = Encourage / Positive / Like. EVERYWHERE.
  # This applies to attitude, Reverse Smith, and discards.
  # The ONLY exception is parity count (even spot = even count, odd spot = odd count).
  # If you remember nothing else, remember: LOW = GOOD.
  # ══════════════════════════════════════════════════════════════

  principle: >
    Use your head first, not partner's signals. In most situations,
    the bidding and dummy tell you everything. Signals are a last resort.

  master_direction: >
    LOW = ENCOURAGE / POSITIVE / LIKE. Always. In every signal type except count.
    This is our single unifying principle — memorise it and everything else follows.

  # ── Quick Reference Card ────────────────────────────────────
  # Use this table at the table. Everything below expands on it.
  #
  #  SIGNAL TYPE      │ LOW CARD          │ HIGH CARD
  # ──────────────────┼───────────────────┼──────────────────
  #  Attitude         │ Encourage (like)  │ Discourage (switch)
  #  Obvious Shift    │ Continue led suit │ Shift to obvious suit
  #  Reverse Smith    │ Like led suit     │ Don't like led suit
  #  Parity Count     │ Odd spot = odd #  │ Even spot = even #
  #   (truth check)   │ Hi→Lo = true      │ Lo→Hi same = false
  #  TSP (trumps)     │ Lower side suit   │ Higher side suit
  #  Italian discard  │ (see parity rule) │ (see parity rule)
  # ──────────────────┴───────────────────┴──────────────────

  quick_reference:
    - signal: "Attitude"
      low: "Encourage — continue this suit"
      high: "Discourage — please switch"
      when: "Default signal. Partner's lead, trick 1+"
    - signal: "Obvious Shift (trick 1)"
      low: "Continue the led suit (no shift tolerance)"
      high: "Shift to the obvious suit from dummy"
      when: "Trick 1 only, when dummy reveals an obvious shift suit"
    - signal: "Reverse Smith Echo"
      low: "Like the opening lead suit (continue)"
      high: "Don't like the opening lead suit (switch)"
      when: "vs NT only, trick 2+, following to declarer's suit"
    - signal: "Parity Count"
      even_spot: "Highest even card = even number of cards"
      odd_spot: "Highest odd card = odd number of cards"
      truth_check: "High→low same parity = TRUE, low→high same parity = FALSE"
      when: "When partner needs to know your length (Ace lead, hold-up, dummy threatens)"
    - signal: "Trump Suit Preference"
      low_high: "Low-high = prefer lower side suit"
      high_low: "High-low = prefer higher side suit"
      when: "Following in trumps (suit contracts only)"
    - signal: "Italian Discards"
      odd: "Interest in the suit being discarded"
      low_even: "Interest in the lower remaining suit"
      high_even: "Interest in the higher remaining suit"
      when: "First discard (when you must throw a card)"

  # ── Step 1: WHAT signal to give ─────────────────────────────

  signal_selection:
    name: "Three-Axis Signal Protocol"
    description: >
      After dummy appears, choose signal type using three axes. This is mechanical,
      not creative. Declarer reads your signals too — factor in adversarial cost.

    step_1_what_signal:
      name: "Axis 1 — What does partner need? (Dummy-dependent)"
      rule: >
        Walk down this list. First match wins. Do not think creatively —
        follow the checklist mechanically.
      decision_tree:
        - condition: "Partner leads the Ace"
          signal: "COUNT — always"
          why: "Partner needs to know your length to plan continuation"
          example: >
            4♠. Partner leads ♦A. Dummy: ♦KJ74. You hold ♦83.
            → Play ♦8 (high = even = doubleton). Partner cashes ♦K, then gives you a ruff.
        - condition: "Dummy has a threatening long suit (5+ cards) with limited entries"
          signal: "COUNT — tells partner when to win their stopper"
          why: "If partner ducks too long, dummy's suit runs. If partner wins too early, declarer re-establishes."
          example: >
            3NT. Partner leads ♠6. Dummy: ♠Q74, ♦AKQ873 (no side entry). You hold ♠J92.
            → Play ♠9 (high = even count). Partner knows you have 2-4 spades, ducks once,
            wins the 2nd round. Dummy's diamonds are stranded — no entry.
        - condition: "The defensive question is which suit to shift to"
          signal: "SUIT PREFERENCE — high for higher suit, low for lower"
          why: "Partner can see they need to switch but doesn't know where."
          example: >
            4♥. Partner leads ♠A (you raised spades). Dummy: ♠63, ♣K2. You hold ♠K72, ♣A85.
            → Play ♠7 (high = prefer higher remaining suit = continue spades, not shift to clubs).
            If you held ♣A instead of ♠K: play ♠2 (low = prefer clubs).
        - condition: "None of the above applies"
          signal: "ATTITUDE — default. Low = encourage, high = discourage"
          why: "Partner wants to know: is this suit working for us?"
          example: >
            3NT. Partner leads ♥4. Dummy: ♥Q73. You hold ♥KJ92.
            → Play ♥2 (low = encouraging — you have ♥KJ behind dummy's Queen).
        - condition: "Following in trumps (suit contract)"
          signal: "TRUMP SUIT PREFERENCE — high-low = higher suit, low-high = lower"
          why: "Ruff desire is obvious from dummy. What partner needs is: which suit to lead next."
          example: >
            4♠. Declarer draws trumps. You hold ♠84, ♥A63, ♦752, ♣J984.
            → Follow ♠8 then ♠4 (high-low = prefer hearts, the higher side suit).

    step_2_card_cost:
      name: "Axis 2 — Signal Freedom Score (SFS)"
      master_rule: >
        NEVER signal with a card that could win a trick. Use the cheapest FREE card.
        Your Signal Freedom Score determines how much information you can transmit.

      # ── What is Signal Freedom Score? ──────────
      signal_freedom_score:
        definition: >
          SFS = the number of cards in your holding that are FREE for signaling —
          meaning playing them cannot cost a trick in any plausible layout.
          Potential trick cards (A, K, Q, J, 10, and intermediates in touching sequences)
          are excluded. Cards 8 and below are generally free.
        the_paradox: >
          Holdings with the most defensive value (AKQ, KQJ) have the LEAST signaling
          capacity. Holdings with maximum signaling capacity (xxxxx) have the LEAST
          defensive value. The correlation is negative and strong.

        table:
          - holding: "AKQxx"
            tricks: "A, K, Q"
            free: "xx"
            sfs: 2
            capacity: "1 bit (binary: high/low)"
          - holding: "KQxxx"
            tricks: "K, Q"
            free: "xxx"
            sfs: 3
            capacity: "~1.6 bits"
          - holding: "Kxxxx"
            tricks: "K"
            free: "xxxx"
            sfs: 4
            capacity: "2 bits"
          - holding: "xxxxx"
            tricks: "none"
            free: "xxxxx"
            sfs: 5
            capacity: "~2.3 bits (maximum)"
          - holding: "AKx"
            tricks: "A, K"
            free: "x"
            sfs: 1
            capacity: "0 bits (forced play)"
          - holding: "Kxx"
            tricks: "K"
            free: "xx"
            sfs: 2
            capacity: "1 bit"
          - holding: "Qxx"
            tricks: "Q"
            free: "xx"
            sfs: 2
            capacity: "1 bit"
          - holding: "xxx"
            tricks: "none"
            free: "xxx"
            sfs: 3
            capacity: "~1.6 bits"
          - holding: "Kx"
            tricks: "K"
            free: "x"
            sfs: 1
            capacity: "0 bits (forced play)"
          - holding: "xx"
            tricks: "none"
            free: "xx"
            sfs: 2
            capacity: "1 bit"

      # ── SFS Capacity Levels ───────────────────
      capacity_levels:
        - sfs: "0"
          bits: "0"
          meaning: "Cannot signal at all. You have no cards (void or all tricks)."
          example: "Holding AKQ tight — every card is a winner."
        - sfs: "1"
          bits: "0"
          meaning: "Forced play — only one free card, must play it. No choice = no information for partner."
          example: "Holding K4 — the 4 is your only free card. Partner sees it, but can't distinguish encourage from discourage."
        - sfs: "2"
          bits: "1.0"
          meaning: "BINARY signal only. High or low — one signal type, one bit."
          example: "Holding Q74 — can play 7 (discourage) or 4 (encourage). One bit. Choose the most valuable signal."
        - sfs: "3"
          bits: "~1.6"
          meaning: "Good capacity. High/mid/low or two signals over two tricks (high-then-low = even count + attitude)."
          example: "Holding K853 — can play 8, 5, or 3. Attitude on first trick, count refinement later."
        - sfs: "4+"
          bits: "2.0+"
          meaning: "Full signaling. Can give attitude AND count over two tricks. Luxury."
          example: "Holding 97542 — complete freedom. Give any signal type partner needs."

      # ── Priority When Scarce (SFS = 2) ────────
      priority_under_scarcity:
        rule: >
          When you have only 1 bit (SFS = 2), you must choose the single most
          valuable signal type. The choice depends on what partner needs (Axis 1).
        table:
          - situation: "Partner leads Ace"
            priority: "COUNT"
            why: "Partner deciding whether to cash K or switch. Count answers this."
          - situation: "Partner leads from sequence"
            priority: "ATTITUDE"
            why: "Continue or switch? Binary question = perfect 1-bit match."
          - situation: "Trick 1 following suit"
            priority: "ATTITUDE (or Obvious Shift)"
            why: "The fundamental trick-1 question: like or switch?"
          - situation: "First discard"
            priority: "SUIT PREFERENCE (Italian)"
            why: "Which suit do you want? Italian discards encode suit identity."
          - situation: "Trump play"
            priority: "TSP"
            why: "Higher or lower side suit? Binary match."
          - situation: "Declarer's suit vs NT"
            priority: "SMITH ECHO"
            why: "Continue lead? Binary match."
          - situation: "Running threat in dummy"
            priority: "COUNT"
            why: "Partner needs hold-up timing, not attitude."
          - situation: "Flat dummy, no threats"
            priority: "ATTITUDE"
            why: "Simple like/dislike."

      # ── The Silence Inference Rule ─────────────
      silence_inference:
        rule: >
          When SFS = 0 or 1, you CANNOT signal. But your silence is itself information.
          Partner should infer: "Defender played a forced card → they hold honours in this suit."
          The inability to signal IS the signal.
        for_partner: >
          If defender plays a card and you can't read a clear signal, consider:
          do they have any free cards? If their holding is likely AKx or Kx,
          their play is forced — they HAVE values there.
        adversarial_cost: >
          WARNING: Declarer can also see the forced play. If declarer notices
          you always play small from honour holdings and varied from junk,
          your silence reveals your hand. Play in tempo. Don't hesitate.
        example:
          situation: "4♠. Partner leads ♥A. You hold ♥K3."
          play: "♥3 (forced — only free card)"
          partner_reads: "Partner sees the 3. Looks like odd count (3 hearts). But you actually have K3 (SFS = 1). Partner should consider: could you have Kx?"
          key_point: "Partner's counting ability fills the gap. 40 minus visible HCP narrows your holding."

      # ── Examples ───────────────────────────────
      examples:
        - situation: "4♠. You hold ♥KJ2. Partner leads ♥A."
          sfs: "2 (free cards: 2)"
          bad: "Play ♥J to 'encourage' — wastes the Jack, a potential trick"
          good: "Play ♥2 (low = encourage per priority table: count under Ace). Shows odd count AND preserves the Jack."
          result: "Partner cashes ♥K (your ♥J drops), then plays a third heart. Your ♥J would have been a trick."

        - situation: "3NT. You hold ♦Q74. Partner leads ♦K."
          sfs: "2 (free cards: 7, 4)"
          play: "Play ♦4 (low = encourage, continue diamonds)"
          why: "♦Q is a potential trick — never signal with it. Use the cheapest free card."

        - situation: "4♥. You hold ♠AK3. Following to declarer's ♠Q."
          sfs: "1 (only free card: 3)"
          play: "♠3 (forced play — no choice)"
          silence: "Partner infers from your forced play + HCP count that you hold ♠AK."

        - situation: "3NT. You hold ♣87432. Discarding."
          sfs: "5 (all cards free)"
          play: "♣8 (high = Italian even = interest in clubs)"
          luxury: "Maximum signal freedom. Can afford high card for clear signal AND keep small cards for count later."

    step_3_adversarial_cost:
      name: "Axis 3 — Is this signal FREE or COSTLY?"
      rule: >
        Declarer sees your signals too. Before signaling, ask: does declarer already
        know this information? If yes, the signal is FREE. If no, it is COSTLY.
        Prefer FREE signals. Give COSTLY signals only when the defensive gain clearly
        outweighs the declarer's gain.

      free_signals:
        description: "Declarer already knows this — signal freely"
        list:
          - signal: "Count in declarer's bid suit"
            why: "Declarer knows their own length + sees dummy → already knows the split"
            example: >
              3NT. Declarer bid 1♥-1♠-2NT-3NT. Partner leads ♣5. You follow in ♥.
              → Give count in hearts freely. Declarer already knows their heart length.

          - signal: "Attitude about partner's overcalled suit"
            why: "Everyone at the table heard the overcall — declarer knows it's your suit"
            example: >
              4♠. Partner overcalled 2♥. Declarer draws trumps. You discard from ♥.
              → Give attitude freely. Declarer already knows hearts is your side's suit.

          - signal: "Suit preference when the obvious shift is clear from dummy"
            why: "Dummy is face-up — all four players see it. No new information for declarer."

          - signal: "Count late in the hand"
            why: "By trick 8-9, declarer has already worked out the distribution from previous plays."

      costly_signals:
        description: "Declarer doesn't know this — signal with extreme caution"
        list:
          - signal: "Count in an unbid suit"
            why: "Declarer gains split information they couldn't otherwise deduce"

          - signal: "Attitude in an ambiguous suit"
            why: "Reveals your holding in a suit declarer is guessing about"

          - signal: "Any signal where declarer has a critical finesse or placement guess"
            why: "Your signal resolves declarer's guess — you're doing their work for them"
            example: >
              3NT. No suit was bid. Declarer leads toward dummy's ♦AQ. You hold ♦K742.
              → Play ♦2 smoothly. Do NOT give count — it reveals the ♦K position.
              Declarer should have to guess the finesse, not read your signal.

  # ── Step 2: HOW to signal ───────────────────────────────────
  # Each signal type below. Remember: LOW = ENCOURAGE in all of them
  # (except count, which uses parity: high = even, low = odd).

  attitude:
    name: "Attitude (Encourage / Discourage)"
    info_content: "1.0 bit per card (2 messages)"
    master_rule: "LOW = ENCOURAGE. HIGH = DISCOURAGE."
    signals:
      - signal: "Low card (2, 3, 4)"
        meaning: "Encouraging — I have values here, continue this suit"
      - signal: "High card (7, 8, 9)"
        meaning: "Discouraging — I have nothing here, please switch"
    when_to_use: >
      Default signal — used whenever count and suit preference are not called for.
      Most common at trick 1 when partner leads.
    examples:
      - situation: "4♠. Partner leads ♥K. Dummy: ♥J53"
        you_hold: "♥A72"
        action: "Play ♥2 (LOW = encouraging — you have the Ace)"
        result: "Partner continues ♥A, then a third heart. You win or get a ruff."

      - situation: "4♠. Partner leads ♥K. Dummy: ♥J53"
        you_hold: "♥864"
        action: "Play ♥8 (HIGH = discouraging — nothing useful in hearts)"
        result: "Partner switches to a more productive suit."

      - situation: "3NT. Partner leads ♦6. Dummy: ♦Q93"
        you_hold: "♦KJ2"
        action: "Play ♦2 (LOW = encouraging). Declarer tries ♦Q from dummy."
        result: "You duck ♦Q. Partner continues ♦ and you collect ♦KJ."

      - situation: "4♠. Partner leads ♣K. Dummy: ♣Q74"
        you_hold: "♣A63"
        action: "Play ♣3 (LOW = encouraging — you have the Ace behind dummy's Queen)"
        result: "Partner continues clubs. You win ♣A on the second round."

  obvious_shift:
    name: "Obvious Shift (Granovetter) — Trick 1 Refinement of Attitude"
    master_rule: "LOW = CONTINUE (no shift tolerance). HIGH = SHIFT to the obvious suit."
    description: >
      At trick 1 ONLY. Standard attitude tells partner "I like/dislike this suit"
      but if you discourage, partner still doesn't know WHICH suit to shift to.
      Obvious Shift solves this: your attitude signal refers to a specific "obvious
      shift suit" that both defenders identify from dummy. This makes "discourage"
      actionable — it means "shift to THAT suit."
    how_it_works:
      step_1: "Dummy goes down. Both defenders identify the obvious shift suit."
      step_2: "Low card at trick 1 = 'Continue the led suit, I have no tolerance for the obvious shift.'"
      step_3: "High card at trick 1 = 'Shift to the obvious suit — I have values there.'"
    identifying_obvious_shift:
      vs_suits:
        rule: >
          Dummy's shortest side suit with at most one honor.
          Exclude: trump suit, the led suit, declarer's bid suits.
          If two suits tie in length, pick the one with fewer honors.
        example_1: >
          Dummy: ♠754 ♥Q862 ♦KJ3 ♣A95. Trump = ♥, led suit = ♠.
          Side suits: ♦KJ3 (3 cards, 2 honors), ♣A95 (3 cards, 1 honor).
          Obvious shift = ♣ (fewer honors in tied length).
        example_2: >
          Dummy: ♠Q83 ♥J10764 ♦K5 ♣972. Trump = ♥, led suit = ♠.
          Side suits: ♦K5 (2 cards, 1 honor), ♣972 (3 cards, 0 honors).
          Obvious shift = ♣ (shortest side suit with ≤1 honor — but ♦ is shorter.
          ♦K5 has 1 honor + only 2 cards. ♣972 has 0 honors + 3 cards. Choose ♦ — shorter wins.)
      vs_nt:
        rule: "Dummy's shortest suit."
        example: >
          Dummy: ♠A1074 ♥93 ♦KQ85 ♣J62. Shortest = ♥ (2 cards). Obvious shift = ♥.
      priority: "If the opening leader bid a suit, that suit is ALWAYS the obvious shift."
    adversarial_cost: "FREE — dummy is visible to all four players"
    examples:
      - situation: "Partner leads ♠K vs 4♥. Dummy: ♠754 ♥Q862 ♦KJ3 ♣A95"
        obvious_shift: "♣ (3 cards, 1 honor — fewer honors than ♦KJ3)"
        you_hold: "♠82 ♥J3 ♦A764 ♣Q1083"
        action: "Play ♠8 (HIGH = discourage = 'shift to the obvious suit, clubs')"
        why: "You have ♣Q1083 behind dummy's ♣A — you WANT the club shift."

      - situation: "Partner leads ♠K vs 4♥. Dummy: ♠754 ♥Q862 ♦KJ3 ♣A95"
        obvious_shift: "♣"
        you_hold: "♠82 ♥J3 ♦Q764 ♣7632"
        action: "Play ♠2 (LOW = encourage = 'continue spades, I have no club values')"
        why: "♣7632 is worthless. You'd rather partner continues spades."

      - situation: "Partner leads ♦K vs 4♠. Dummy: ♠J1083 ♥K74 ♦Q65 ♣A92"
        obvious_shift: "♥ (3 cards, 1 honor, vs ♣A92 which has 1 honor but ♥ is weaker)"
        you_hold: "♠72 ♥AJ6 ♦943 ♣J8753"
        action: "Play ♦9 (HIGH = shift to hearts). You hold ♥AJ behind dummy's ♥K."

  count:
    name: "Parity Count (Even-Odd with Truth Check)"
    info_content: "1.0 bit first card + 1.0 bit second card (truth confirmation)"
    master_rule: >
      FIRST CARD: highest even spot = even count, highest odd spot = odd count.
      SECOND CARD: high→low (descending, same parity) = TRUE signal.
      Low→high (ascending, same parity) = FALSE signal (deception).
    note: >
      Count uses card PARITY (odd/even rank), not high/low preference.
      The two-card sequence adds a built-in truth check: partner reads
      the order to know if the count is honest or deceptive.
      Declarer sees two cards of the same parity and assumes a count —
      but only partner knows whether descending = true or ascending = false.
    when_to_use: >
      When partner needs your length: (1) partner leads the Ace, (2) dummy has
      a threatening long suit, (3) partner is doing a hold-up in NT.
    first_card:
      - signal: "Highest even spot card (8, 6, 4, 2, 10)"
        meaning: "Even number of cards (2 or 4)"
      - signal: "Highest odd spot card (9, 7, 5, 3)"
        meaning: "Odd number of cards (3 or 5)"
    second_card_truth_check:
      - sequence: "High→low, same parity (e.g. 8 then 4, or 7 then 3)"
        meaning: "TRUE — the first card count was honest"
      - sequence: "Low→high, same parity (e.g. 4 then 8, or 3 then 7)"
        meaning: "FALSE — the first card count was deceptive (actual count is opposite)"
    why_this_works: >
      Declarer sees two even cards and thinks "even count" regardless of order.
      But partner tracks the ORDER: descending = honest, ascending = lying.
      This gives the defence a private channel for deception that declarer
      cannot decode without knowing who played which card first.
    examples:
      - situation: "3NT. Declarer leads ♦Q. Dummy: ♦AKJ84 (no outside entry)"
        you_hold: "♦753"
        action: "Play ♦3 (odd spot = odd count = 3 cards)"
        result: >
          Partner holds ♦96. Knows declarer has ♦Q10x (3 cards). Partner ducks
          the ♦Q and the ♦K. Wins the third round with ♦9. Dummy's remaining
          ♦J84 are stranded — no entry.

      - situation: "4♠. Partner leads ♣A. Dummy: ♣J74"
        you_hold: "♣82"
        action: "Play ♣8 (even spot = even count = doubleton)"
        result: "Partner cashes ♣K, then leads low. You ruff the third round."

      - situation: "4♥. Declarer draws trumps. You follow ♥8 then ♥4"
        you_hold: "Started with ♥8432"
        action: "♥8 then ♥4 (high→low, both even = TRUE even count = 4 trumps)"
        result: "Partner deduces declarer started with 4 trumps (13 - dummy - yours - partner)."

      - situation: "4♥. You want to DECEIVE declarer about your trump length"
        you_hold: "Started with ♥753"
        action: "♥3 then ♥7 (low→high, both odd = FALSE signal — looks like odd but actually even... wait, you DO have odd). Alternatively: ♥5 then ♥3 (high→low, both odd = TRUE odd count)"
        note: >
          Use false signals when declarer is reading your count to plan the play.
          Partner reads the order and knows the truth. Declarer doesn't track order.

      - situation: "3NT. Partner leads ♠K. You hold ♠A8642"
        you_hold: "♠A8642"
        action: "Play ♠8 (even spot = even count — showing even, which is true: 5 cards is odd... play ♠9? No, use highest EVEN for even signal)"
        note: >
          With 5 cards (odd), play highest ODD spot: e.g. ♠9 if available.
          With ♠A8642, no odd spot above 2-level is available, so play ♠8
          and partner reads context (♠A unplayed + known length from auction).

  smith_echo:
    name: "Reverse Smith Echo (vs NT only)"
    info_content: "1.0 bit of delayed cross-suit attitude"
    adversarial_cost: "FREE — signal in declarer's suit about the led suit"
    master_rule: "LOW = LIKE the opening lead suit. HIGH = DON'T LIKE it."
    consistency: >
      Reverse Smith matches our attitude convention (low = encourage, high = discourage).
      Standard Smith (used by many experts) is the opposite — high = like.
      We invert for consistency: LOW = GOOD in ALL our signals.
    when_to_use: >
      ONLY vs NT contracts. At trick 2 or later, when following to DECLARER'S suit
      (not partner's suit, not dummy's suit — the suit declarer leads).
      Your card in declarer's suit sends a message about the OPENING LEAD suit.
    signals:
      - signal: "Low card in declarer's suit"
        meaning: "I LIKE the opening lead suit — continue it when you get in"
      - signal: "High card in declarer's suit"
        meaning: "I DON'T LIKE the opening lead suit — switch when you get in"
    exception: >
      When dummy has an entryless long suit threatening to run, count overrides
      Smith Echo. Partner needs to know WHEN to win, not WHETHER to continue.
    examples:
      - situation: "Partner led ♠5 vs 3NT. Declarer won ♠A. Declarer now leads ♥Q."
        you_hold: "♠KJ83, ♥764"
        action: "Play ♥4 (LOW = like spades — you have ♠KJ83)"
        result: "When partner wins a trick, they continue ♠. You run the spade suit."

      - situation: "Partner led ♠5 vs 3NT. Declarer won ♠A. Declarer now leads ♥Q."
        you_hold: "♠92, ♥764"
        action: "Play ♥7 (HIGH = don't like spades — you have only ♠92)"
        result: "Partner switches to a better suit when they get in."

      - situation: "Partner led ♦7 vs 3NT. Declarer won ♦A. Declarer leads ♣K."
        you_hold: "♦QJ4, ♣862"
        action: "Play ♣2 (LOW = like diamonds — you have ♦QJ sitting behind declarer's ♦A)"
        result: "When partner wins ♣A, they continue ♦. You cash ♦QJ."

      - situation: "Partner led ♥4 vs 3NT. Dummy: ♥3, ♦AKQJ73 (no side entry)."
        you_hold: "♥KJ62, ♦85"
        action: "DO NOT play Smith. Give COUNT instead (♦8 = even). Partner needs to know when to win the diamond stopper, not whether to continue hearts."
        result: "Count overrides Smith when dummy threatens to run a suit."

    note: "Reverse Smith (low = like). Matches our attitude convention. Near-mandatory at expert level."

  trump_signals:
    name: "Trump Suit Preference (TSP)"
    info_content: "1.0 bit of suit preference (replaces Trump Peter count)"
    master_rule: "HIGH-LOW = prefer HIGHER side suit. LOW-HIGH = prefer LOWER side suit."
    when_to_use: >
      In suit contracts, when following to trumps. You are telling partner
      which SIDE SUIT to lead — not whether you want to ruff (partner can
      usually see that from dummy).
    signals:
      - signal: "High-low in trumps (e.g., ♠8 then ♠4)"
        meaning: "I want the HIGHER-ranking side suit led"
      - signal: "Low-high in trumps (e.g., ♠4 then ♠8)"
        meaning: "I want the LOWER-ranking side suit led"
    caution: >
      NEVER signal with potential trump tricks. If you hold Qxx or Jxx of
      trumps, just follow low — keep your honor guarded. The signal MUST NOT
      cost a trick. Safety first, information second.
    examples:
      - situation: "4♠. Declarer draws trumps. Side suits: ♥ (higher), ♦ (middle), ♣ (lower)."
        you_hold: "♠84, ♥A63, ♦752, ♣J984"
        action: "Follow ♠8 then ♠4 (HIGH-LOW = prefer hearts, the highest side suit)"
        result: "When partner gets in, they lead ♥. You cash ♥A."

      - situation: "4♠. Declarer draws trumps."
        you_hold: "♠84, ♥752, ♦A63, ♣J984"
        action: "Follow ♠4 then ♠8 (LOW-HIGH = prefer a lower side suit — diamonds)"
        result: "Partner leads ♦ when in. You win ♦A."

      - situation: "4♥. Declarer draws trumps."
        you_hold: "♥Q53"
        action: "Do NOT signal! Follow ♥3 only. Keep ♥Q guarded."
        result: "♥Q53 is a potential trump trick. Signaling would waste the Queen."

  suit_preference:
    name: "Suit Preference on Discards (Italian Style)"
    info_content: "1.58 bits per card (3 messages), ~1.34 effective"
    master_rule: >
      ODD card = want THAT suit. EVEN card = DON'T want that suit
      (low even = want lower remaining suit, high even = want higher remaining suit).
    when_to_use: >
      When you must DISCARD (you have no cards in the led suit). Your first
      discard is the most important — it tells partner where your values are.
    signals:
      - discard: "Odd card (3, 5, 7, 9)"
        meaning: "I WANT this suit led — I have values here"
      - discard: "Low even card (2, 4)"
        meaning: "I DON'T want this suit. Lead the LOWER remaining suit."
      - discard: "High even card (6, 8)"
        meaning: "I DON'T want this suit. Lead the HIGHER remaining suit."
    how_to_remember: >
      Three messages in one card: (1) Odd = positive for this suit. (2) Even + low =
      redirect to lower suit. (3) Even + high = redirect to higher suit. Partner gets
      both "what you don't want" (the discarded suit) and "what you do want" (from
      the rank of even cards).
    elimination:
      description: >
        When you discard twice in the same suit, the sequence eliminates possibilities.
        These confirm or clarify the first signal.
      sequences:
        - sequence: "4 then 2"
          meaning: "Two low even → strongly wants the lower remaining suit"
        - sequence: "9 then 3"
          meaning: "Odd then odd in same suit → strongly wants that suit (unusual, usually one discard suffices)"
        - sequence: "8 then 6"
          meaning: "Two high even → strongly wants the higher remaining suit"
    note: "The higher the discard, the less reliable (you might need that card). The second discard confirms."
    examples:
      - situation: "3NT. Declarer runs a long suit. You must discard. You want ♦ led."
        you_hold: "♦KJ73, ♣964"
        action: "Discard ♦3 (ODD = want diamonds)"
        result: "Partner leads ♦ when they get in. You cash ♦KJ."

      - situation: "4♠. You must discard. You don't want ♥. You want ♣ (lower remaining suit)."
        you_hold: "♥J742, ♣AQ5"
        action: "Discard ♥2 (EVEN + LOW = want the lower remaining suit = clubs)"
        result: "Partner leads ♣. You win ♣A and cash ♣Q."

      - situation: "4♠. You must discard. You don't want ♦. You want ♥ (higher remaining suit)."
        you_hold: "♦8643, ♥KQ5"
        action: "Discard ♦8 (EVEN + HIGH = want the higher remaining suit = hearts)"
        result: "Partner leads ♥. You cash ♥KQ."

      - situation: "What if you can't get the right parity?"
        you_hold: "♦K642. You want diamonds but have no odd diamond."
        action: "Discard from ANOTHER suit you don't want, using even + pointing to diamonds."
        result: "If diamonds is the higher remaining suit, discard a high even from the unwanted suit."

      - situation: "3NT. Confirming your first signal with a second discard."
        you_hold: "First discarded ♦9 (odd = want diamonds). Now you discard again."
        action: "Discard ♦3. Two odd in the same suit = strong diamond preference."

  discard_discipline:
    name: "Discard Discipline — Four Iron Rules"
    rules:
      - rule: "NEVER signal with a card that could win a trick"
        example: "From ♦KJ73, discard ♦3 not ♦K. The ♦3 says the same thing."
      - rule: "Use the CHEAPEST card that conveys the message"
        example: "To encourage ♥, play ♥2 not ♥4. Both are low, but ♥4 might be needed later."
      - rule: "NEVER bare an honour or unguard a critical holding"
        example: "From ♣Q4, do not discard ♣4 — it bares ♣Q. Find another suit to discard from."
      - rule: "Preserve cards partner might need for communication"
        example: "If partner might need to lead through dummy's ♠AQ, keep your low spades for partner to lead to."

  # ── Step 4: READING Partner's Signal — DECODE → DEDUCE → ACT ──
  #
  # You've learned WHAT to signal and HOW. Now: how to READ partner's signal
  # and convert it into a concrete defensive action. This is the receiving
  # side — the part most defenders skip. A signal without a reader is wasted.
  #
  # Three steps, every time partner signals:
  #   1. DECODE — What message did partner send?
  #   2. DEDUCE — Combine with your hand + dummy + auction → what does declarer hold?
  #   3. ACT   — Execute the play the deduction implies.

  signal_reading_protocol:
    name: "Signal Reading Protocol — DECODE → DEDUCE → ACT"
    description: >
      Most defensive errors come not from wrong signals but from failure to ACT on
      correct signals. This protocol converts passive observation ("partner played
      low") into active reasoning and a concrete play. Apply it every time partner
      plays a card that carries signal meaning.
    master_rule: >
      Never just register a signal — complete the chain. If you decoded but didn't
      deduce, the signal was wasted. If you deduced but didn't act, you defended
      on auto-pilot instead of on information.

    # ── Chain 1: Attitude ──────────────────────────────────────
    reading_attitude:
      name: "Reading Attitude"
      decode:
        low: "Partner LIKES this suit — has values, wants continuation"
        high: "Partner DISLIKES this suit — wants a switch"
        ambiguous: >
          Middle cards (5, 6) can be ambiguous. Use context: with which cards
          is partner signalling? If partner's remaining cards are higher, it's
          encouraging. If lower, discouraging. When truly ambiguous, consider
          what makes sense from the auction and dummy.
      deduce:
        encouraging: >
          Partner has a useful honour in this suit (Ace, King, or Queen sitting
          over dummy). Count your side's winners: your tricks + partner's
          implied tricks. Can you defeat the contract by continuing?
        discouraging: >
          Partner has nothing useful here. You need to SWITCH — but to which
          suit? Look at dummy: which suit is dummy weakest in? Which suit did
          the auction suggest? If using Obvious Shift (trick 1), the target
          suit is already identified.
      act:
        on_encourage:
          - action: "CONTINUE the suit"
            when: "You have more cards to lead in this suit"
          - action: "CASH your winner then continue"
            when: "You hold the Ace — take it, then play partner's encouraged suit"
          - action: "DUCK to maintain communication"
            when: "Holding Ace, but need to preserve entry to partner's hand"
        on_discourage:
          - action: "SWITCH to the obvious shift suit"
            when: "Trick 1 with Obvious Shift in force"
          - action: "SWITCH to the unbid suit"
            when: "One remaining suit is clearly weakest in dummy"
          - action: "SWITCH to dummy's short suit"
            when: "Two remaining suits — pick the one dummy is shorter in"
      examples:
        - situation: "You lead ♠K vs 4♥. Dummy: ♠754. Partner plays ♠2."
          decode: "LOW = encouraging"
          deduce: "Partner has ♠A or ♠Q. Two spade winners for our side."
          act: "Continue ♠A. Partner wins or we establish a third-round winner."

        - situation: "You lead ♠K vs 4♥. Dummy: ♠754. Partner plays ♠9."
          decode: "HIGH = discouraging"
          deduce: "Partner has nothing in spades. Declarer has ♠AQx or ♠AJx. Continuing spades sets up declarer's honour."
          act: "Switch. Obvious shift from dummy identifies the target suit."

        - situation: "You lead ♣K vs 3NT. Dummy: ♣J74. Partner plays ♣2."
          decode: "LOW = encouraging"
          deduce: "Partner has ♣A or ♣Q behind dummy's ♣J. Continue clubs to establish the suit."
          act: "Continue ♣. Even if declarer ducks, persist — you need to clear the suit before declarer runs tricks elsewhere."

    # ── Chain 2: Obvious Shift ─────────────────────────────────
    reading_obvious_shift:
      name: "Reading Obvious Shift (Trick 1 Only)"
      prerequisite: >
        Before reading, both defenders must have identified the SAME obvious shift
        suit from dummy. If you're unsure which suit it is, the signal is unreliable.
      decode:
        low: "Partner wants CONTINUATION of the led suit (no tolerance for the obvious shift suit)"
        high: "Partner wants you to SHIFT to the obvious shift suit (has values there)"
      deduce:
        on_shift_request: >
          Partner has values in the obvious shift suit — typically an honour sitting
          behind dummy or a source of tricks. Your job: switch to that suit NOW,
          before declarer draws trumps or establishes discards.
        on_continue_request: >
          Partner has nothing in the obvious shift suit. Continuing the led suit is
          productive — partner holds values there (Ace, Queen, or wants a ruff).
      act:
        on_shift:
          - action: "SWITCH to the obvious shift suit immediately"
            when: "Standard case — partner has shown values there"
          - action: "Cash one winner first, THEN switch"
            when: "You can cash a sure trick without losing tempo"
        on_continue:
          - action: "Continue the led suit"
            when: "You have more cards to lead"
          - action: "Lead a different card in the led suit for suit preference"
            when: "Continuing — you can use WHICH card you continue with to show suit preference between the remaining two suits"
      examples:
        - situation: "You lead ♠K vs 4♥. Dummy: ♠754 ♥Q862 ♦KJ3 ♣A95. Obvious shift = ♣. Partner plays ♠8."
          decode: "HIGH = shift to clubs"
          deduce: "Partner has club values (♣Q or ♣K) behind dummy's ♣A. Clubs is where our tricks are."
          act: "Switch to ♣. Lead low to partner's honour. If partner has ♣Q10xx, the switch through dummy's ♣A is devastating."

        - situation: "You lead ♠K vs 4♥. Dummy: ♠754 ♥Q862 ♦KJ3 ♣A95. Obvious shift = ♣. Partner plays ♠2."
          decode: "LOW = continue spades, no club values"
          deduce: "Partner has ♠A or wants a ruff. Clubs is a dead end for our side."
          act: "Continue ♠A. If partner started with ♠Ax, they win the second round and can return through dummy's weakness."

    # ── Chain 3: Count ─────────────────────────────────────────
    reading_count:
      name: "Reading Parity Count"
      decode:
        even_spot: "Partner has an EVEN number of cards (2 or 4)"
        odd_spot: "Partner has an ODD number of cards (3 or 5)"
      truth_check: >
        When partner plays a SECOND card in the same suit, read the order:
        HIGH→LOW (descending, same parity) = count was TRUE.
        LOW→HIGH (ascending, same parity) = count was FALSE (deception).
        Declarer cannot distinguish — only you know the play order.
      deduce:
        method: >
          The power of count is ARITHMETIC. You see dummy's length, you know your
          length, partner tells you their length → declarer's length = 13 minus
          (dummy + yours + partner's). This tells you WHEN to win and when to duck.
          With the truth check, you also know if partner is deceiving declarer.
        formula: "Declarer's length = 13 − (dummy's length + your length + partner's signalled length)"
        key_deductions:
          - if: "Declarer has 2 cards in the suit"
            then: "Win the second round. Ducking further lets declarer win cheaply."
          - if: "Declarer has 3 cards in the suit"
            then: "Duck twice, win the third round. This exhausts declarer AND cuts dummy's communication."
          - if: "Declarer has 1 card (singleton)"
            then: "Win immediately — declarer can ruff the next round."
          - if: "Dummy's suit is blocked (no entry)"
            then: "Duck until declarer runs out. Dummy's remaining winners are stranded."
      act:
        - action: "DUCK until declarer plays their last card, then win"
          when: "Dummy has a long suit with no outside entry — the classic hold-up"
        - action: "WIN immediately"
          when: "Declarer is short (singleton or doubleton) — ducking gifts a cheap trick"
        - action: "CASH from your end"
          when: "You know declarer is out — your remaining cards are all winners"
        - action: "Trust the truth check on the second card"
          when: "Partner played two cards of same parity — read direction (descending = true)"
      examples:
        - situation: "3NT. Declarer leads ♦K toward dummy's ♦AQJ84 (no side entry). You hold ♦1096. Partner plays ♦3."
          decode: "Odd spot = odd count = 3 diamonds (partner has ♦xxx)"
          deduce: "Dummy 5 + yours 3 + partner 3 = 11. Declarer has 2 diamonds. Duck twice, win the third."
          act: "Duck ♦K. Duck the next diamond. Win the third round. Dummy's ♦J84 are stranded — no entry."

        - situation: "3NT. Declarer leads ♦K toward dummy's ♦AQJ84 (no side entry). You hold ♦1096. Partner plays ♦8."
          decode: "Even spot = even count = 2 diamonds (partner has ♦8x)"
          deduce: "Dummy 5 + yours 3 + partner 2 = 10. Declarer has 3 diamonds. Duck only once, win the second."
          act: "Duck ♦K. Win the next diamond. Declarer still has one diamond — but you've limited them to 3 diamond tricks instead of 5."

        - situation: "4♠. You lead ♣A. Dummy: ♣J74. Partner plays ♣8."
          decode: "Even spot = even count = doubleton (♣8x)"
          deduce: "Partner has 2 clubs. Cash ♣K, then lead a third club — partner ruffs."
          act: "Cash ♣K, then lead ♣ low for partner's ruff."

        - situation: "4♥. Declarer draws trumps. Partner follows ♥8 then ♥4."
          decode: "8→4 = high→low, both even = TRUE even count"
          deduce: "Partner has 4 hearts (even, confirmed true). Declarer started with 13 - dummy - yours - 4."
          act: "Plan defence knowing declarer's exact trump length."

        - situation: "4♥. Declarer draws trumps. Partner follows ♥4 then ♥8."
          decode: "4→8 = low→high, both even = FALSE signal — partner actually has ODD hearts"
          deduce: "Partner is deceiving declarer (showing even to confuse). Real count is odd (3 or 5). You know the truth."
          act: "Use the true (odd) count for your defensive calculations."

    # ── Chain 4: Reverse Smith Echo ────────────────────────────
    reading_smith:
      name: "Reading Reverse Smith Echo (vs NT)"
      context: >
        Smith operates in DECLARER'S suit but sends a message about the OPENING
        LEAD suit. You're reading a cross-suit signal. This only applies vs NT.
      decode:
        low: "Partner LIKES the opening lead suit — continue it when you regain the lead"
        high: "Partner DISLIKES the opening lead suit — switch to something better"
      deduce:
        on_like: >
          Partner has values in the opening lead suit — honours sitting behind
          declarer, or length to run the suit. Plan to continue the opening lead
          suit when you regain the lead. Preserve your entries to reach partner.
        on_dislike: >
          Partner's opening lead hit nothing — declarer has that suit stopped.
          When you regain the lead, switch to an unbid suit or the suit where
          your own values lie. Don't stubbornly continue a dead suit.
      act:
        on_like:
          - action: "Continue the opening lead suit when you regain the lead"
            when: "Standard — partner has shown values there"
          - action: "Duck declarer's tricks to preserve communication"
            when: "You need to keep partner's hand connected for the suit to run"
        on_dislike:
          - action: "Switch to an unbid suit"
            when: "There's a clearly unbid suit to try"
          - action: "Switch to YOUR best suit"
            when: "All suits were bid — try your own longest/strongest"
          - action: "Lead through dummy's weakness"
            when: "Dummy has a tenace position you can attack"
      override: >
        When dummy has a running long suit without side entry, COUNT overrides
        Smith. Partner needs to know WHEN to win, not WHETHER to continue.
        If you're in a count-required position, ignore the Smith signal.
      examples:
        - situation: "You led ♠5 vs 3NT. Declarer won ♠K. Declarer leads ♥Q. Partner plays ♥3."
          decode: "LOW in hearts = LIKES spades (Reverse Smith)"
          deduce: "Partner has spade values — ♠A or ♠QJ. When I regain the lead, continue spades."
          act: "Win when you can. Return ♠. Partner runs the spade suit."

        - situation: "You led ♠5 vs 3NT. Declarer won ♠K. Declarer leads ♥Q. Partner plays ♥8."
          decode: "HIGH in hearts = DISLIKES spades"
          deduce: "Partner has nothing useful in spades. Declarer has spades well stopped. Switch."
          act: "When you win, DON'T continue spades. Switch to your secondary suit or lead through dummy's weakness."

        - situation: "You led ♦7 vs 3NT. Dummy: ♦3, ♣AKQJ73 (no side entry). Partner plays ♣5."
          decode: "STOP — count overrides Smith here. ♣5 is partner's COUNT in clubs, not Smith."
          deduce: "Partner is showing length in clubs to help you time the hold-up in ♣. Read as count, not Smith."
          act: "Count partner's clubs, calculate declarer's length, duck accordingly."

    # ── Chain 5: Trump Suit Preference ─────────────────────────
    reading_trump_sp:
      name: "Reading Trump Suit Preference"
      decode:
        high_low: "Partner prefers the HIGHER-ranking side suit"
        low_high: "Partner prefers the LOWER-ranking side suit"
        no_signal: >
          If partner just follows low once (can't give high-low), they either
          have a trump honour to protect or don't have enough trumps to signal.
          No inference available — use auction and dummy instead.
      deduce:
        method: >
          Partner is telling you WHERE their entry or values are. When you next
          gain the lead (or when deciding what to lead after winning a trump
          trick), you know which suit to play.
        key_question: "Which suit does partner want me to lead?"
      act:
        - action: "Lead the indicated side suit when you next gain the lead"
          when: "Standard — partner has shown values in that suit"
        - action: "Give partner a ruff in the indicated suit"
          when: "Partner is short in the indicated suit and you have an entry to give the ruff"
        - action: "Lead the indicated suit to give partner a ruff, THEN they return through declarer"
          when: "The indicated suit sets up a ruff-and-return play"
      examples:
        - situation: "4♠. Partner follows ♥8 then ♥3 in trumps. Side suits: ♦ (higher), ♣ (lower)."
          decode: "HIGH-LOW = prefer diamonds (higher side suit)"
          deduce: "Partner has ♦A or ♦KQ — their entry is in diamonds."
          act: "When you gain the lead, play ♦. Partner wins and can return through declarer."

        - situation: "4♠. Partner follows ♥3 then ♥8 in trumps. Side suits: ♦ (higher), ♣ (lower)."
          decode: "LOW-HIGH = prefer clubs (lower side suit)"
          deduce: "Partner's values are in clubs. Maybe ♣A or ♣KQ."
          act: "Lead ♣ when you gain the lead."

    # ── Chain 6: Italian Discards ──────────────────────────────
    reading_italian_discards:
      name: "Reading Italian Discards"
      decode:
        odd_card: "Partner WANTS this suit — has values here"
        low_even: "Partner DOESN'T want this suit. Wants the LOWER remaining suit."
        high_even: "Partner DOESN'T want this suit. Wants the HIGHER remaining suit."
      deduce:
        on_positive: >
          Partner has honour strength in the discarded suit. Plan to lead that
          suit when you gain the lead. If partner discards an odd card from a
          suit where dummy is strong, partner has a specific holding behind
          dummy (e.g., partner discards ♦5 when dummy has ♦AQ — partner likely
          has ♦K sitting behind the Ace).
        on_redirect: >
          Partner is pointing AWAY from the discarded suit toward another suit.
          Low even = lower remaining suit. High even = higher remaining suit.
          Rank the three remaining suits (excluding the one partner discarded
          and trumps) from low to high and pick the indicated one.
      act:
        - action: "Lead the indicated suit when you gain the lead"
          when: "Partner has shown values — lead toward them"
        - action: "Protect the indicated suit in your own hand"
          when: "You might be squeezed — know which suit partner is guarding"
        - action: "Combine with count: two discards in the same suit confirm"
          when: "Second discard from the same suit intensifies the first message"
      ranking_reminder: >
        To identify "lower" and "higher" remaining suits, mentally rank the
        non-trump suits excluding the discarded suit from low (♣) to high (♠).
        Low even → lowest of the remaining. High even → highest of the remaining.
      examples:
        - situation: "3NT. Declarer runs diamonds. Partner discards ♣3 (odd)."
          decode: "ODD = wants clubs"
          deduce: "Partner has club values — ♣A or ♣KQ. When I get in, lead clubs."
          act: "Lead ♣ when you win a trick. Partner's club holding provides tricks."

        - situation: "4♠. Declarer draws trumps. Partner discards ♥4 (low even). Remaining suits (non-trump): ♦ (lower), ♣ (higher)."
          decode: "LOW EVEN = doesn't want hearts, wants the LOWER remaining suit = diamonds"
          deduce: "Partner has diamond values. Hearts is a dead suit for partner."
          act: "Lead ♦ when you get in."

        - situation: "3NT. Declarer runs hearts. Partner discards ♦8 (high even). Remaining suits: ♣ (lower), ♠ (higher)."
          decode: "HIGH EVEN = doesn't want diamonds, wants the HIGHER remaining suit = spades"
          deduce: "Partner has spade values. Lead spades when you gain the lead."
          act: "Switch to ♠ when you win a trick."

    # ── Common Reading Errors ──────────────────────────────────
    common_errors:
      - error: "Registering the signal but not deducing"
        description: "You notice partner played low (encouraging) but don't calculate what that means for declarer's hand."
        fix: "Always complete step 2. Ask: 'What does declarer have?'"
      - error: "Confusing count and attitude"
        description: "Partner gives count (high = even) and you read it as attitude (high = discourage)."
        fix: "Context tells you which signal is in force. Count is given when dummy threatens or on Ace leads. Attitude is the default."
      - error: "Ignoring Smith because it's in a different suit"
        description: "Partner plays high in declarer's suit (dislike the lead suit) but you don't notice because you're focused on the suit being played."
        fix: "Vs NT, trick 2+: always check whether partner's card in declarer's suit is a Smith signal."
      - error: "Reading a forced card as a signal"
        description: "Partner plays their only card in the suit and you treat it as informative."
        fix: "Apply the Silence Inference Rule (F-DEF-018). When SFS = 0-1, partner's play is forced. The absence of choice IS the information — infer their honours from what they couldn't signal."
      - error: "Seeing the signal but freezing — not acting"
        description: "You correctly decode and deduce but then play passively, failing to execute the switch or duck."
        fix: "Step 3 is mandatory. Name the action to yourself before playing: 'I am switching to clubs because...' Articulation prevents autopilot."

  opening_leads:
    # ── The Most Important Defensive Card ──────────
    #
    # The opening lead is the only card played with ZERO information from the play.
    # It is also the single most informative card for partner — it reveals your
    # longest/strongest suit, your holding type (sequence vs length), and your count.
    # A good lead gains more IMPs over a session than any signal.
    #
    # DECISION ORDER:
    # 1. WHICH SUIT? (bidding analysis + hand evaluation)
    # 2. WHICH CARD? (sequence rule → 3rd/5th rule → Jack exception)

    master_rule: "3rd or 5th highest from length. Top of touching honours. Jack in the suit → lead 4th best."

    # ── Step 1: Which Suit to Lead ─────────────────

    suit_selection:
      vs_suits:
        priorities:
          - priority: 1
            rule: "Partner's bid suit"
            why: "Partner has shown values here. Trust the bidding."
            example:
              auction: "1♥-1♠-2♥-4♥"
              your_hand: "♠953 ♥64 ♦KJ82 ♣Q1074"
              lead: "♠9 (partner's suit)"
              why: "Partner bid spades. Lead their suit even though your diamonds look better."
          - priority: 2
            rule: "Top of a sequence (KQ, QJ, J10, 109)"
            why: "Safe and informative. Never costs a trick."
            example:
              auction: "1♠-2♠-4♠"
              your_hand: "♠83 ♥QJ104 ♦K73 ♣J962"
              lead: "♥Q (top of QJ10)"
              why: "Three touching honours. Safe lead that establishes tricks without giving anything away."
          - priority: 3
            rule: "A singleton (vs suit contracts)"
            why: "Sets up a ruff. Best when you have trump entries or short trumps."
            example:
              auction: "1♠-2♣-2♠-4♠"
              your_hand: "♠752 ♥A93 ♦8 ♣J87642"
              lead: "♦8 (singleton)"
              why: "Singleton diamond. You hold ♥A as an entry — win it later, get a diamond ruff."
          - priority: 4
            rule: "Your longest suit (if no sequence available)"
            why: "Length = tricks. Even without honours, length can establish winners."
            example:
              auction: "1♠-4♠"
              your_hand: "♠62 ♥A94 ♦87643 ♣K52"
              lead: "♦6 (3rd from 5)"
              why: "No sequence, no singleton, partner didn't bid. Lead longest suit."
        avoid:
          - "Leading from unsupported honours into declarer's known strength (e.g., Kxx into opener's suit)"
          - "Leading a suit bid and rebid by declarer"
          - "Underleading an Ace vs suit contracts (high risk of losing a trick)"
          - "Leading from Qxx or Jxx — very likely to give declarer a free finesse"

      vs_nt:
        priorities:
          - priority: 1
            rule: "Your longest suit"
            why: "Establishing length tricks is the primary weapon against NT."
            example:
              auction: "1NT-3NT"
              your_hand: "♠KJ742 ♥Q63 ♦95 ♣Q84"
              lead: "♠4 (4th best — Jack in the suit)"
              why: "5-card suit. Lead 4th best because you have the Jack."
          - priority: 2
            rule: "Partner's bid suit"
            why: "Partner has entries and length there."
            example:
              auction: "(1♦)-1♥-(1NT)-P-(3NT)"
              your_hand: "♠J83 ♥1072 ♦Q64 ♣K952"
              lead: "♥10 (top of interior sequence in partner's suit)"
              why: "Partner overcalled hearts. Lead their suit. Top of doubleton honour."
          - priority: 3
            rule: "Unbid suit (especially a major)"
            why: "If they didn't bid it, partner might have it."
            example:
              auction: "1♦-1♠-1NT-3NT"
              your_hand: "♠64 ♥QJ1082 ♦74 ♣K953"
              lead: "♥Q (top of sequence in unbid suit)"
              why: "Hearts are unbid. You have sequence + length."
        avoid:
          - "Leading declarer's bid suit"
          - "Leading dummy's bid suit"
          - "Short-suit leads (seeking a ruff doesn't work in NT — there are no trumps)"

    # ── Step 2: Which Card from the Chosen Suit ────

    card_selection:
      # ─ Honours: Top of Touching ──────────────────
      from_sequences:
        rule: "Lead the top of touching honours. Two+ touching = a sequence."
        table:
          - holding: "AKx(x)"
            lead: "K"
            note: "K from AK. If you lead the A instead, partner gives COUNT (Ace asks for count)."
          - holding: "AKQx(x)"
            lead: "A"
            note: "A then K — shows the solid sequence."
          - holding: "KQx(x)"
            lead: "K"
            note: "Standard top of sequence."
          - holding: "KQJx(x)"
            lead: "K"
            note: "K then Q — shows the 3-card+ sequence."
          - holding: "QJx(x)"
            lead: "Q"
            note: "Top of sequence."
          - holding: "QJ10x(x)"
            lead: "Q"
            note: "Q then J — shows the deep sequence."
          - holding: "JTx(x)"
            lead: "J"
            note: "Top of sequence."
          - holding: "J109x(x)"
            lead: "J"
            note: "J then 10 — deep sequence."
          - holding: "T9x(x)"
            lead: "10"
            note: "Top of sequence."
        interior_sequences:
          rule: "When you have an honour backed by a non-touching honour + touching, lead the top of the interior."
          examples:
            - holding: "KJ10x(x)"
              lead: "J"
              note: "Interior sequence under the King."
            - holding: "AQJ10x"
              lead: "Q"
              note: "Interior sequence under the Ace."
            - holding: "AJ109x"
              lead: "J"
              note: "Interior sequence under the Ace (J-10-9)."
            - holding: "KJ10x"
              lead: "J"
              note: "Interior sequence — J backed by 10."
            - holding: "Q109x"
              lead: "10"
              note: "Interior sequence — 10 backed by 9."

      # ─ Length: 3rd or 5th ────────────────────────
      from_length:
        rule: >
          3rd highest from 3 or 4 cards. 5th highest from 5+ cards.
          This tells partner your length immediately: 3rd/5th encodes parity.
          From 3 cards: 3rd = lowest. From 4 cards: 3rd = second lowest.
          From 5 cards: 5th = lowest. From 6 cards: 5th = second lowest.
        why_not_mud: >
          MUD (Middle-Up-Down from xxx) provides only ~0.4 bits because the middle
          card is ambiguous with top-of-doubleton. Leading low from xxx (3rd highest)
          immediately distinguishes from a doubleton — ~1.0 bit of information.
          We gain ~0.6 bits per lead by playing 3rd/5th instead of MUD.
        table:
          - holding: "9 5 3"
            lead: "3 (3rd = lowest)"
            partner_reads: "3+ cards (not a doubleton)"
          - holding: "9 7 5 3"
            lead: "5 (3rd = second lowest)"
            partner_reads: "4+ cards (the 3 will come next)"
          - holding: "K 9 7 5 3"
            lead: "3 (5th = lowest)"
            partner_reads: "5+ cards"
          - holding: "K 9 7 5 3 2"
            lead: "3 (5th = second lowest)"
            partner_reads: "6+ cards (the 2 will come next)"
        examples:
          - holding: "K 9 5"
            lead: "5"
            rule: "3rd highest from 3"
          - holding: "K 9 5 2"
            lead: "5"
            rule: "3rd highest from 4"
          - holding: "K Q 7 5 2"
            lead: "2"
            rule: "5th highest from 5 (but with KQ, consider leading the K instead — sequence takes priority)"

      # ─ The Jack Exception ───────────────────────
      jack_exception:
        rule: "If your suit contains the Jack, lead 4th highest instead of 3rd/5th."
        why: >
          The Jack is a card that matters — it can take tricks. Leading 3rd highest
          from Jxxx would mean leading the Jack itself (wasting it) or leading too
          close to it. 4th best protects the Jack while still showing length.
        table:
          - holding: "J 8 5 3"
            normal_3rd: "5 (but this is fine — J is 1st, not 3rd)"
            actual_lead: "3 (4th best)"
            why: "4th best protects the Jack."
          - holding: "K J 7 3 2"
            normal_5th: "2"
            actual_lead: "3 (4th best)"
            why: "The 2 would be 5th. Lead the 3 (4th) to protect the J."
          - holding: "A J 8 6 3"
            normal_5th: "3"
            actual_lead: "6 (4th best)"
            why: "4th best. Partner can apply Rule of 11 more accurately."
          - holding: "Q J 10 x(x)"
            actual_lead: "Q"
            why: "QJ10 is a SEQUENCE — lead top of sequence, not 4th best. Sequence always takes priority."
        key_point: >
          The Jack exception does NOT apply when you have a sequence involving the Jack
          (QJx, J10x). Sequence leads always take priority over the 4th-best rule.

      # ─ Short Holdings ───────────────────────────
      from_short_holdings:
        parity_principle: >
          Opening leads from spot cards integrate with the parity count system:
          the PARITY (odd/even) of the led card itself signals your count.
          Even card led = even number of cards. Odd card led = odd number.
          This is consistent with follow-up parity count signals.
        table:
          - holding: "x x (doubleton, even)"
            lead: "Higher card"
            parity_note: "Lead the higher card — prefer even-ranked if choice exists (e.g. from 86, lead 8 = even spot confirms even count)"
            note: "Partner sees high card then low card next round = doubleton confirmed."
          - holding: "x x x (3 cards, odd)"
            lead: "Lowest (3rd highest)"
            parity_note: "Lead the lowest — prefer odd-ranked if choice exists (e.g. from 975, lead 5 = odd spot confirms odd count)"
            note: "NOT MUD. Low from three immediately tells partner this isn't a doubleton."
          - holding: "x x x x (4 cards, even, no honour)"
            lead: "2nd highest, then lowest"
            parity_note: "Lead an even-ranked card if available (e.g. from 8643, lead 6 = even spot confirms even count, then 3 next)"
            note: "From 8643, lead the 6 then the 3. Partner sees the count via parity + sequence."
          - holding: "Singleton"
            lead: "The card (only option)"
            note: "Vs suits only. Sets up a ruff if you can regain the lead."
        parity_examples:
          - holding: "8 6 (doubleton)"
            lead: "8 (even spot = even count = doubleton)"
            confirm: "Next play: 6 (high→low, both even = TRUE even)"
          - holding: "7 5 (doubleton)"
            lead: "7 (odd — wrong parity for even count, but only option)"
            note: "Partner infers doubleton from high card + context. Parity imperfect here."
          - holding: "9 7 3 (3 cards)"
            lead: "3 (odd spot = odd count = 3 cards)"
          - holding: "8 5 3 (3 cards)"
            lead: "3 (odd spot = odd count)"
            note: "Even though 8 is available, lead 3rd highest per standard rule — happens to be odd."
          - holding: "9 6 4 2 (4 cards)"
            lead: "4 (even spot = even count = 4 cards)"
            confirm: "Partner sees even lead from length = 4 cards."

      # ─ Ace Leads and Count Request ──────────────
      ace_king_agreement:
        rule: "K from AK. A asks partner for PARITY COUNT."
        detail: >
          When partner leads the ACE (not from AKQ), they are asking you for COUNT —
          not attitude. Give parity count: highest even spot = even, highest odd spot = odd.
          Second card same parity: high→low = TRUE, low→high = FALSE.
          This helps leader decide whether to cash the King or switch.
        examples:
          - scenario: "Partner leads ♥A vs 4♠. You hold ♥863."
            signal: "♥3 (odd spot = odd count = 3 hearts)"
            result: "Partner knows you have 3 hearts. If dummy has 2, declarer has 4 — don't cash King."
          - scenario: "Partner leads ♥A vs 4♠. You hold ♥82."
            signal: "♥8 (even spot = even count = doubleton)"
            result: "Partner knows you have 2 hearts. Cash King, then give you a ruff on the third round."
            confirm: "Next round you play ♥2 (high→low, both even = TRUE even count)."
          - scenario: "Partner leads ♥K vs 4♠. You hold ♥Q73."
            signal: "♥Q (unblock!)"
            result: "Drop the Queen under the King. Partner continues with Ace, you play ♥3 (odd) to show 3."

    # ── When NOT to Lead Your Suit ─────────────────

    lead_avoidance:
      principle: "Some leads are too dangerous. Recognise when to avoid your natural lead."
      situations:
        - situation: "Declarer bid your suit"
          action: "Switch to unbid suit or partner's suit"
          example:
            auction: "1♠-2♦-2♠-4♠"
            your_hand: "♠J4 ♥K73 ♦QJ1063 ♣952"
            lead: "♥K? No — ♣9 (passive, unbid suit)"
            why: "Declarer bid and raised spades, dummy bid diamonds (your suit). Leading diamonds gives declarer a free finesse. Lead passively."
        - situation: "Both opponents bid NT naturally"
          action: "Consider a passive lead — they have everything covered"
          example:
            auction: "1NT-2♣-2♥-3NT"
            your_hand: "♠J742 ♥854 ♦K1063 ♣92"
            lead: "♠2 (4th best, passive)"
            why: "Declarer has hearts, dummy asked for them. Your diamonds are behind declarer's strength. Spades is the least-known suit."
        - situation: "Underlead an Ace vs suits"
          action: "Almost never do this. The Ace may never take a trick."
          example:
            auction: "1♥-4♥"
            your_hand: "♠J73 ♥42 ♦A9643 ♣K85"
            lead: "♣K? No — ♠J (top of sequence)"
            why: "Never underlead the ♦A vs a suit contract. If declarer has ♦K, your Ace never scores. Lead a safe ♠J instead."

    # ── Suit vs NT Lead Differences ────────────────

    suit_vs_nt:
      principle: "The lead strategy is fundamentally different vs suits and vs NT."
      differences:
        - aspect: "Goal"
          vs_suits: "Set up ruffs, cash winners quickly, cut dummy's entries"
          vs_nt: "Establish your long suit to run it later"
        - aspect: "Singleton leads"
          vs_suits: "Excellent — sets up a ruff"
          vs_nt: "Terrible — you're helping declarer. No trumps to ruff with."
        - aspect: "Leading from length"
          vs_suits: "Good but secondary to sequences"
          vs_nt: "Primary strategy — length = tricks"
        - aspect: "Passive leads"
          vs_suits: "OK when declarer seems to have everything"
          vs_nt: "Risky — letting declarer play first often lets them set up 9 tricks"
        - aspect: "Ace leads"
          vs_suits: "A from AK is standard. Asks count."
          vs_nt: "Avoid leading unsupported Aces — you give declarer a free trick"

    # ── Complete Examples ──────────────────────────

    examples:
      # ─ vs Suit Contracts ─────────────────────────
      - auction: "1♥-2♥-4♥"
        your_hand: "♠KQ3 ♥85 ♦J7643 ♣952"
        lead: "♠K (top of KQ sequence)"
        why: "Two touching honours in spades — safe, informative lead. Never costs a trick."

      - auction: "1♠-2♠-4♠"
        your_hand: "♠73 ♥K9642 ♦A8 ♣J753"
        lead: "♥4 (3rd from 5)"
        why: "No sequence. Lead your longest suit. 3rd from odd length (3rd/5th). Partner knows 5 hearts."

      - auction: "1♠-2♠-4♠"
        your_hand: "♠954 ♥AK83 ♦J72 ♣Q63"
        lead: "♥K (K from AK)"
        why: "K from AK. Partner gives count. If doubleton, cash Ace and give partner a ruff."

      - auction: "1♠-4♠"
        your_hand: "♠62 ♥A94 ♦87543 ♣K52"
        lead: "♦5 (3rd from 5)"
        why: "Low from xxx — NOT MUD. 3rd highest immediately tells partner this isn't a doubleton."

      - auction: "1♠-2♣-3♣-5♣"
        your_hand: "♠AQ83 ♥K4 ♦J1095 ♣72"
        lead: "♦J (top of interior sequence J-10-9)"
        why: "Solid interior sequence. Safe lead that doesn't sacrifice a trick."

      - auction: "1♥-3♥-4♥"
        your_hand: "♠85 ♥72 ♦6 ♣KQJ10943"
        lead: "♣K (top of solid sequence)"
        why: "KQJ is a running sequence. Cash what you can before declarer draws trumps."

      - auction: "1♦-1♠-2♠-4♠"
        your_hand: "♠1063 ♥AJ742 ♦9 ♣J853"
        lead: "♦9 (singleton)"
        why: "Singleton diamond. Dummy bid diamonds. Win the ♥A later, get a diamond ruff."

      - auction: "1♥-2♥-4♥"
        your_hand: "♠J842 ♥53 ♦A963 ♣K74"
        lead: "♠2 (4th best — Jack in the suit)"
        why: "Jack exception: with J in the suit, lead 4th best, not 3rd. Protects the Jack."

      # ─ vs NT ─────────────────────────────────────
      - auction: "1NT-3NT"
        your_hand: "♠KJ742 ♥Q63 ♦95 ♣Q84"
        lead: "♠4 (4th best — Jack in the suit)"
        why: "Longest suit vs NT. Lead 4th best (not 5th) because you have the Jack. Rule of 11: 11−4=7 higher cards in other hands."

      - auction: "1NT-3NT"
        your_hand: "♠Q10843 ♥K72 ♦J63 ♣95"
        lead: "♠3 (5th highest from 5)"
        why: "Longest suit. No Jack, no sequence — standard 3rd/5th applies. 5 cards → lead 5th highest = lowest card."

      - auction: "1♦-1♠-1NT-3NT"
        your_hand: "♠J6 ♥QJ1082 ♦74 ♣K953"
        lead: "♥Q (top of interior sequence QJ10)"
        why: "Don't lead declarer's spade suit. Lead your own length + sequence in unbid hearts."

      - auction: "1♣-1♦-1NT-3NT"
        your_hand: "♠AJ953 ♥Q84 ♦72 ♣J63"
        lead: "♠5 (4th best — Jack in the suit)"
        why: "Longest suit, unbid. Jack exception applies: 4th best, not 5th."

      - auction: "(1♣)-1♠-(2NT)-(3NT)"
        your_hand: "♠83 ♥J742 ♦K963 ♣1084"
        lead: "♠8 (top of doubleton in partner's suit)"
        why: "Partner overcalled spades. Lead their suit. Top of doubleton."

    # ── Quick Decision Flowchart ───────────────────

    decision_flowchart:
      step_1: "Did partner bid a suit? → Lead it (top of doubleton, low from 3+, or sequence if you have one)"
      step_2: "Do you have a sequence (2+ touching honours)? → Lead top of sequence in that suit"
      step_3: "Do you have a singleton vs suits? → Lead it (if you have trump entries)"
      step_4: "Lead your longest suit. Apply card selection rules (sequence > Jack exception > 3rd/5th)"
      step_5: "If nothing stands out → lead passively (unbid suit, low from 3 small)"

# ──────────────────────────────────────────────
# Dummy Analysis — Systematic Defense from Trick 1
# ──────────────────────────────────────────────

dummy_analysis:
  # ── The Moment Dummy Appears ─────────────────
  #
  # When dummy hits the table, you have 10-15 seconds before trick 1.
  # This is the most information-dense moment of the entire hand.
  # You see 26 cards (your hand + dummy). Combined with the auction,
  # you can reconstruct declarer's hand to within 2-3 possible patterns.
  #
  # USE THIS TIME. Don't play automatically. Classify dummy, reconstruct
  # declarer, count tricks, choose a plan. THEN play.

  master_principle: >
    Every defensive decision flows from two questions:
    (1) How many tricks can declarer take if I do nothing?
    (2) Can I do something about it?
    If declarer has enough tricks → ACTIVE defence (race to cash, attack, switch).
    If declarer is short → PASSIVE defence (don't help, make declarer work).
    The dummy taxonomy and bidding reconstruction ANSWER these questions.

  # ── Step 1: Classify Dummy's Suits ──────────

  dummy_taxonomy:
    principle: >
      Every suit in dummy falls into one of five categories. Classify all four suits
      before playing to trick 1. The classification drives your entire defence plan.

    categories:
      - category: "RUNNING THREAT"
        icon: "!!!"
        definition: "5+ cards with 3+ honours or solid sequence"
        examples: ["AKQxx", "KQJ9x", "AQJ10x", "KQJ74"]
        what_it_means: >
          This suit can generate immediate tricks for declarer WITHOUT losing the lead.
          If declarer can reach it, it will run. This is the most dangerous dummy feature.
        defensive_response: >
          RACE or CUT. Either cash your winners before this suit runs (active),
          or attack entries so declarer can never reach it (entry attack).
        example_hand:
          dummy: "♠754 ♥Q862 ♦KQJ93 ♣5"
          assessment: "Diamonds are a RUNNING THREAT (5 cards, KQJ). If declarer has ♦A, that's 5 tricks. Race to cash or cut diamond entries."

      - category: "ESTABLISHABLE SOURCE"
        icon: "!!"
        definition: "4+ cards with 1-2 honours — needs development"
        examples: ["KJ84", "Q10753", "A8642", "K9743"]
        what_it_means: >
          Declarer needs to lose 1-2 tricks in this suit before it runs.
          It's dangerous but you have TIME — declarer must give up the lead first.
        defensive_response: >
          HOLD UP or ATTACK ENTRIES. Duck the first round to exhaust declarer's
          communication. If dummy has limited side entries, the suit dies on the vine.
        example_hand:
          dummy: "♠Q4 ♥K63 ♦J10742 ♣852"
          assessment: "Diamonds are an ESTABLISHABLE SOURCE (5 cards, J-10 combo). Declarer needs to knock out ♦A and ♦K. Hold up to strand the suit."

      - category: "ATTACK TARGET"
        icon: "→"
        definition: "≤3 cards or long without honours — safe for defenders to lead"
        examples: ["73", "xxx", "8642", "9754"]
        what_it_means: >
          Defenders can lead this suit without giving away a trick.
          It's a natural switch destination and often the obvious shift suit.
        defensive_response: >
          LEAD IT. When you need to switch, go here. This is your safe suit.
          Also the likely obvious shift suit for Granovetter signaling.
        example_hand:
          dummy: "♠KJ95 ♥Q862 ♦A3 ♣742"
          assessment: "Clubs (742) are an ATTACK TARGET. No honours, 3 small. Switch here freely."

      - category: "ENTRY SUIT"
        icon: "E"
        definition: "Contains A or K as a side entry to reach another suit"
        examples: ["A3", "Kx", "AJ5", "KQ4"]
        what_it_means: >
          This suit provides ACCESS to dummy. A running threat without entries is harmless.
          A running threat WITH entries is lethal. Count entries carefully.
        defensive_response: >
          ATTACK ENTRIES when dummy has a running/establishable suit elsewhere.
          Lead this suit to force out the entry prematurely. If you can remove all
          entries, the long suit is stranded.
        example_hand:
          dummy: "♠74 ♥AKJ93 ♦853 ♣Q64"
          assessment: "Hearts are a RUNNING THREAT. But how does declarer reach them? ♥A and ♥K ARE the entries. If you force declarer to use hearts as entries (by ducking), the suit doesn't fully run."

      - category: "TRUMP HOLDING"
        icon: "T"
        definition: "Dummy's trump length and shape — determines ruffing potential"
        assessment_rules:
          - rule: "3+ trumps + side singleton/void = RUFFING VALUE"
            response: "Lead trumps. Every trump lead cuts one ruff."
          - rule: "3+ trumps + balanced side suits = NO RUFFING VALUE"
            response: "Don't lead trumps — you're helping declarer draw yours."
          - rule: "2 trumps = LIMITED RUFFING VALUE"
            response: "One ruff at most. Usually not worth a trump lead."
          - rule: "4+ trumps = DECLARER MAY CROSSRUFF"
            response: "Cash winners fast. Crossruff hands are hard to stop."
        example_hand:
          dummy: "♠Q83 ♥6 ♦KJ742 ♣A963"
          assessment: "3 trumps + singleton heart = RUFFING VALUE. Lead trumps to cut heart ruffs. Diamonds are an ESTABLISHABLE SOURCE but secondary concern."

    # ── Putting It Together: The Dummy Profile ───

    dummy_profile:
      rule: "After classifying all 4 suits, write a one-sentence DUMMY PROFILE."
      examples:
        - dummy: "♠754 ♥KQJ93 ♦A5 ♣842"
          profile: "Running threat in hearts, entry in diamonds (♦A), attack target in clubs, 3 trumps no ruffing value."
          plan: "ACTIVE — hearts will run. Cash or attack the ♦A entry."
        - dummy: "♠Q83 ♥942 ♦K63 ♣J1075"
          profile: "No threat suits, no entries worth attacking, flat dummy."
          plan: "PASSIVE — declarer has no source of tricks in dummy. Don't break new suits."
        - dummy: "♠6 ♥K1074 ♦QJ953 ♣A82"
          profile: "Singleton spade (ruffing value), establishable source in diamonds, entry in clubs (♣A)."
          plan: "ACTIVE — lead trumps to cut spade ruffs. Secondary: hold up in diamonds if possible."
        - dummy: "♠AJ5 ♥73 ♦Q108742 ♣95"
          profile: "Establishable source in diamonds (6 cards!), entry in spades (♠A), attack targets in hearts and clubs."
          plan: "ACTIVE — diamonds WILL run if declarer gets in. Attack the ♠A entry. If you lead spades, the entry is gone before diamonds are set up."

  # ── Step 2: Reconstruct Declarer's Hand ──────

  bidding_reconstruction:
    principle: >
      The auction is a conversation. Every bid tells you something about
      declarer's hand. Every PASS tells you something too. Before dummy
      appears, you should have a shape skeleton and HCP range. After dummy
      appears, refine it to near-certainty.

    phase_1_pre_dummy:
      title: "During the auction — before dummy appears"
      steps:
        - step: "HCP RANGE"
          method: >
            Opening bid constrains range: 1NT = 12-14, 1-suit = 12+, 2C = 22+.
            Each rebid narrows it: 1♥-2NT = 15-17 bal, 1♥-1♠-2♥ = 12-14 with 6 hearts,
            1♥-1♠-3♥ = 15-17 with 6 hearts.
          examples:
            - auction: "1NT-3NT"
              inference: "Declarer: 12-14, balanced. Dummy: 11-13 (invited or blasted)."
            - auction: "1♥-2♥-4♥"
              inference: "Declarer: 15-17 (jumped to game over single raise). Dummy: 6-9."
            - auction: "1♠-2♣-2♠"
              inference: "Declarer: 12-14, 5+ spades, clubs not rebiddable. Minimum."
            - auction: "1♦-1♠-2NT"
              inference: "Declarer: 15-17, balanced, 4+ diamonds, denies 4 hearts or 4 spades."
        - step: "SHAPE SKELETON"
          method: >
            Bids show suits: 1♠ then 2♥ = 5+ spades, 4+ hearts. 1NT = balanced (no singleton, no 6-card suit).
            NEGATIVE INFERENCES (Reese's 'dog that didn't bark'):
            No Stayman = no 4-card major. No transfer = no 5-card major.
            Raised immediately = minimum for the raise, no side suit to show.
            Didn't rebid the suit = probably only 5 (not 6).
          examples:
            - auction: "1♠-2♣-2♠"
              inference: "5-6 spades (rebid without jump = no extra values, just length). ≤3 hearts (didn't bid them). Clubs not rebiddable (probably 3). So roughly 5-2-3-3 or 6-2-3-2."
            - auction: "1♥-1♠-2♦-2NT-3NT"
              inference: "Opener: 4+ hearts, 4+ diamonds, 12-14 (didn't jump). Probably 1-4-4-4 or 2-4-4-3."
            - auction: "(1♣)-1♠-(2♣)-(3♣)-3♠"
              inference: "Overcaller: 5+ spades (overcall), minimum (didn't jump). Competitive, probably 5-3-3-2 or 5-4 somewhere."
        - step: "TRICK ESTIMATE"
          method: "Contract level = tricks needed. 3NT = 9, 4♥ = 10, 5♦ = 11. Count your sure tricks against this."

    phase_2_post_dummy:
      title: "Dummy appears — refine the picture"
      steps:
        - step: "HCP PINPOINT"
          method: >
            40 - your HCP - dummy's HCP = declarer + partner combined.
            Bidding narrows declarer's range → partner's range follows.
          example:
            you_hold: "♠J83 ♥K72 ♦Q964 ♣1053 (6 HCP)"
            dummy_shows: "♠Q74 ♥AJ93 ♦K5 ♣Q842 (11 HCP)"
            calculation: "40 - 6 - 11 = 23 between declarer and partner. Auction was 1NT(12-14)-3NT → declarer has 12-14. Partner has 23 - (12 to 14) = 9-11 HCP."
            result: "Partner has an Ace and a King at minimum. You know roughly where the honours are."
        - step: "SHAPE REFINEMENT"
          method: >
            Dummy's shape is visible. Subtract from 13 to constrain declarer.
            Combined with the shape skeleton from the auction → near-complete picture.
          example:
            auction: "1♥-2♥-4♥"
            dummy: "♠742 ♥K83 ♦QJ5 ♣J1064"
            calculation: "Dummy: 3-3-3-4. Declarer opened 1♥ → 5+ hearts. Jumped to 4♥ over 2♥ → extras (15-17). With 5 hearts and extras: likely 5-3-3-2 or 5-4-2-2."
        - step: "TRICK RECOUNT"
          method: >
            Count dummy's sure tricks. Add declarer's expected tricks. Compare to contract.
            This is Kelsey's trick count — the most actionable of the three counts.
          example:
            contract: "4♠"
            dummy: "♠Q74 ♥A5 ♦KQJ93 ♣84"
            assessment: >
              Dummy tricks: ♥A (1), ♦KQJ (3 if set up) = 4 potential.
              Declarer has AKxxx in trumps = 5 tricks. Plus ♥A = 6. Plus ♦KQJ = 9. One more somewhere.
              Declarer has 10 tricks IF diamonds run. ACTIVE defence — race to cash 4 tricks or cut diamond entries.

    # ── Common Auction Patterns ────────────────

    auction_patterns:
      - pattern: "1NT — 3NT"
        declarer_profile: "12-14 balanced, no 5-card major (didn't transfer), no 4-card major on responder's side (didn't Stayman)"
        defence_approach: "Lead your longest suit. Passive after that — declarer has no long suit to run. It's a race between your long suit and their scattered tricks."

      - pattern: "1M — 2M — 4M"
        declarer_profile: "15-17 with 5+ major, extras warranting game opposite minimum raise"
        defence_approach: "Dummy is weak (6-9). Look at dummy shape — singleton = lead trumps. Flat = passive, make declarer find tricks."

      - pattern: "1M — 3M — 4M"
        declarer_profile: "Slam try declined — opener signing off at game (1st/2nd seat: 3M = slam try; 3rd/4th seat: 3M = limit raise accepted)"
        defence_approach: "Both hands are strong (GF in 1st/2nd, inv in 3rd/4th). Dummy has 4+ trumps. Active defence needed — dummy can help declarer."

      - pattern: "1m — 1M — 1NT — 3NT"
        declarer_profile: "12-14 balanced, 3-4 in responder's major, 4+ in opened minor"
        defence_approach: "Don't lead the minor (declarer's suit). Don't lead responder's major (dummy's suit). Find the unbid suit."

      - pattern: "1♠ — 2♣ — 2♠ — 4♠"
        declarer_profile: "5+ spades, not strong enough to reverse, minimum"
        defence_approach: "Dummy has clubs. Avoid leading clubs. Spades are 5+ but not 6 (didn't jump). Look for the soft spot in dummy."

      - pattern: "1♠ — 2♦ — 2NT — 3NT"
        declarer_profile: "15-17 balanced, 4+ spades (may be only 4), denies 4 hearts"
        defence_approach: "Dummy has diamonds (bid 2♦). Declarer is balanced, strong. Lead your best unbid suit."

      - pattern: "2♥/2♠ — 4♥/4♠"
        declarer_profile: "Weak two: 6+ cards, 6-10 HCP, decent suit quality"
        defence_approach: "Declarer has shape but no tricks outside trumps. Cash your tricks fast — declarer can ruff everything else. Active defence."

      - pattern: "Competitive (overcall/double)"
        declarer_profile: "Shape is well-defined by competitive actions"
        defence_approach: "The more competitive the auction, the better you know the shapes. Use it. Count every suit."

  # ── Step 3: Choose Your Defence Plan ─────────

  defence_plan:
    principle: >
      Dummy taxonomy + bidding reconstruction → one of five defence lines.
      Choose your line BEFORE playing to trick 1. Then execute consistently.

    five_lines:
      - line: 1
        name: "RACE TO CASH"
        when: "Running threat in dummy + entries available. Declarer has enough tricks."
        action: "Cash your winners NOW. Don't try to establish — declarer will run before you."
        example:
          dummy: "♠74 ♥Q862 ♦AKQ93 ♣85"
          contract: "4♠"
          you_hold: "♠J3 ♥AK94 ♦72 ♣J10643"
          plan: "Diamonds are a running threat with internal entries. Cash ♥AK immediately. Hope partner has a trick somewhere."

      - line: 2
        name: "ATTACK ENTRIES"
        when: "Establishable source in dummy + limited entries. Suit needs development."
        action: "Lead the entry suit to remove access BEFORE the long suit is established."
        example:
          dummy: "♠653 ♥A4 ♦QJ10742 ♣83"
          contract: "3NT"
          you_hold: "♠KQ1082 ♥J73 ♦A5 ♣K64"
          plan: "Diamonds are establishable (need ♦A knocked out). ♥A is the only entry. Win ♦A, then attack hearts (lead ♥J). If ♥A is gone before diamonds are set up, declarer can't reach them."

      - line: 3
        name: "PASSIVE DEFENCE"
        when: "Flat dummy, no threat suits, declarer is short of tricks."
        action: "Don't break new suits. Make declarer do the work. Return partner's lead or lead safe suits."
        example:
          dummy: "♠Q83 ♥J74 ♦K63 ♣J1075"
          contract: "3NT"
          you_hold: "♠J654 ♥K82 ♦Q94 ♣K63"
          plan: "Dummy is completely flat — no running suit, no entries worth attacking. Declarer has to find 9 tricks from nowhere. Lead passively, don't give free finesses. Every suit you break potentially gives declarer a trick they couldn't get alone."

      - line: 4
        name: "CUT THE RUFFS"
        when: "Dummy has trumps + singleton/void. Declarer plans to ruff losers."
        action: "Lead trumps at every opportunity. Each trump lead cuts one ruff."
        example:
          dummy: "♠Q83 ♥5 ♦KJ742 ♣A963"
          contract: "4♠"
          you_hold: "♠64 ♥AKJ3 ♦Q85 ♣K1072"
          plan: "Singleton heart + 3 trumps = ruffing value. Lead a trump. Win hearts later, lead another trump. Cut as many ruffs as possible."

      - line: 5
        name: "FORCE DECLARER"
        when: "You have 4+ trumps. Declarer has a two-suited hand."
        action: "Lead your longest side suit repeatedly. Force declarer to ruff, shortening their trumps below yours."
        example:
          dummy: "♠73 ♥KJ9642 ♦A5 ♣Q84"
          contract: "4♥"
          you_hold: "♠KQJ105 ♥Q1083 ♦72 ♣A6"
          plan: "You have 4 trumps! Force declarer to ruff spades. Lead ♠K, then ♠Q, then ♠J. If declarer ruffs three times, they have fewer trumps than you. Your ♥Q1083 scores extra tricks."

    decision_flowchart:
      step_1: "Is there a RUNNING THREAT in dummy? → Line 1 (RACE) or Line 2 (ATTACK ENTRIES)"
      step_2: "Is there an ESTABLISHABLE SOURCE? → Line 2 (ATTACK ENTRIES) — hold up and cut access"
      step_3: "Does dummy have ruffing value (short suit + trumps)? → Line 4 (CUT RUFFS)"
      step_4: "Do you have 4+ trumps? → Line 5 (FORCE DECLARER)"
      step_5: "Dummy is flat with no threats? → Line 3 (PASSIVE)"

    # Quick reference: 8 dummy types with primary → fallback lines
    # Derived from F-DEF-019 (theorem) + F-DEF-020/021 (simulation profiles)
    dummy_type_quick_reference:
      title: "8 Dummy Types — Quick Reference (sorted by frequency)"
      two_lines_rule: >
        75% of all dummies need only RACE TO CASH or PASSIVE. Master these two
        lines first. ATTACK ENTRIES (16%) is the next priority. The remaining 9%
        (Force Declarer + Cut Ruffs) are specialist trump-control lines.
      types:
        - type: "NT WITH THREAT"
          frequency: "43.9%"
          avg_hcp: "10.5"
          typical_shapes: "4432, 5332, 5431"
          primary: "RACE TO CASH"
          fallback: "ATTACK ENTRIES — if can't race, cut the entry"
          signal_t1: "Reverse Smith Echo"
          signal_t1_cost: "FREE — cross-suit signal in declarer's suit"
          signal_t2: "Count"
          signal_t2_cost: "FREE — dummy's threat means declarer knows own length"

        - type: "STRANDED"
          frequency: "20.3%"
          avg_hcp: "9.1"
          typical_shapes: "4432, 5431, 5422"
          primary: "PASSIVE"
          fallback: "RACE TO CASH — if declarer finds entry, must race"
          signal_t1: "Count"
          signal_t1_cost: "FREE — stranded honours visible, count helps partner time hold-up"
          signal_t2: "Count"
          signal_t2_cost: "FREE"
          warning: >
            THE STRANDED TRAP: dummy has visible honours (avg 9.1 HCP) but no
            entry. Defenders who see honours and attack CREATE the entry declarer
            needs. Discipline: see honours, do nothing. Hardest defensive skill.

        - type: "WORKSHOP"
          frequency: "16.1%"
          avg_hcp: "12.3"
          typical_shapes: "4432, 5332, 5431"
          primary: "ATTACK ENTRIES"
          fallback: "PASSIVE — once entry removed, go quiet"
          signal_t1: "Attitude"
          signal_t1_cost: "COSTLY — dummy has entries + sources, attitude reveals your values"
          signal_t2: "Suit Preference"
          signal_t2_cost: "COSTLY — directs partner but also tells declarer which suit you guard"

        - type: "MIRROR DUMMY"
          frequency: "8.7%"
          avg_hcp: "8.5"
          typical_shapes: "5332, 4432, 4333"
          primary: "FORCE DECLARER"
          fallback: "PASSIVE — if can't force, wait"
          signal_t1: "Count"
          signal_t1_cost: "FREE — mirror shape means declarer already knows approximate distribution"
          signal_t2: "Count"
          signal_t2_cost: "FREE"

        - type: "NT BALANCED"
          frequency: "5.7%"
          avg_hcp: "5.9"
          typical_shapes: "5332, 4333, 4432"
          primary: "PASSIVE"
          fallback: "RACE TO CASH — if declarer develops threat, race"
          signal_t1: "Reverse Smith Echo"
          signal_t1_cost: "FREE — cross-suit signal in declarer's suit"
          signal_t2: "Attitude"
          signal_t2_cost: "FREE — featureless dummy, declarer has limited options"

        - type: "BARREN"
          frequency: "3.8%"
          avg_hcp: "6.2"
          typical_shapes: "5332, 4333, 4432"
          primary: "PASSIVE"
          fallback: "none — pure passive, no secondary needed"
          signal_t1: "Attitude"
          signal_t1_cost: "FREE — barren dummy, nothing for declarer to exploit"
          signal_t2: "Count"
          signal_t2_cost: "COSTLY — no dummy threat, count gives declarer split info"

        - type: "POWERHOUSE"
          frequency: "1.4%"
          avg_hcp: "15.8"
          typical_shapes: "5332, 4432, 5431"
          primary: "RACE TO CASH"
          fallback: "ATTACK ENTRIES — if can't cash enough, cut entries"
          signal_t1: "Attitude"
          signal_t1_cost: "COSTLY — powerhouse dummy has resources, attitude reveals your values"
          signal_t2: "Suit Preference"
          signal_t2_cost: "COSTLY — declarer learns which suit you're defending"

        - type: "RUFFING DUMMY"
          frequency: "0.1%"
          avg_hcp: "3.7"
          typical_shapes: "7321, 5521, 6421"
          primary: "CUT RUFFS"
          fallback: "FORCE DECLARER — once ruffs cut, force remaining trumps"
          signal_t1: "Obvious Shift"
          signal_t1_cost: "FREE — dummy is visible, obvious shift suit clear to all"
          signal_t2: "Trump Suit Preference"
          signal_t2_cost: "FREE — trump signals in dummy's trump suit, visible to all"
          note: >
            0.1% in random deals but much higher in real contracts — bidding
            selects for dummy with trump support + short suit.

  # ── Complete Worked Examples ─────────────────

  worked_examples:
    - title: "Running threat — race to cash"
      contract: "4♠"
      auction: "1♠-2♦-3♠-4♠"
      your_hand: "♠J6 ♥AK83 ♦1054 ♣Q972"
      dummy: "♠Q74 ♥652 ♦AKQ93 ♣85"
      taxonomy:
        spades: "TRUMP (3 cards, no short suit — no ruffing value)"
        hearts: "ATTACK TARGET (3 small)"
        diamonds: "RUNNING THREAT (5 cards, AKQ — will produce 5 tricks)"
        clubs: "ATTACK TARGET (2 small)"
      reconstruction: >
        Auction: 1♠ = 5+ spades. 2♦ raised to 3♠ by partner (dummy). Dummy has 3 spades and
        AKQ diamonds — dummy bid 2♦ showing the source. Declarer: 5+ spades, some side values,
        accepted game try. Likely 5-3-2-3 or 5-4-1-3.
      trick_count: "Dummy's ♦AKQ = 3 tricks (declarer has 2 diamonds). Declarer's trumps = 5. ♠Q = 1 more. That's 9. Need 10. The 4th and 5th diamonds are the source."
      plan: "ACTIVE — Line 1. Race to cash hearts. ♥A, then ♥K, then a heart to partner. Cash 3 hearts before diamonds run."
      result: "♥A, ♥K, ♥3 to partner's ♥Q. Partner cashes ♣A. Down 1."

    - title: "Attack entries — strand the long suit"
      contract: "3NT"
      auction: "1NT-3NT"
      your_hand: "♠KQ1074 ♥J93 ♦A8 ♣K65"
      dummy: "♠53 ♥A42 ♦Q109642 ♣83"
      taxonomy:
        spades: "ATTACK TARGET (2 small — lead freely)"
        hearts: "ENTRY SUIT (♥A is the only side entry to diamonds)"
        diamonds: "ESTABLISHABLE SOURCE (6 cards, Q-10-9 — needs ♦A and ♦K knocked out)"
        clubs: "ATTACK TARGET (2 small)"
      reconstruction: >
        1NT-3NT: declarer 12-14 balanced. Dummy: weak hand with long diamonds, no major, just gambled 3NT.
        Declarer: 12-14 HCP, probably ♦Kx or ♦KJx. Balanced = no singleton.
      trick_count: "If diamonds come in: ♥A + 5 diamonds = 6. Declarer has 12-14 HCP = likely 2-3 more tricks. That's 8-9. Tight."
      plan: "ACTIVE — Line 2. Lead ♠K (your suit). When you win ♦A, switch to ♥J to attack the ♥A entry. If hearts are removed before diamonds are established, the suit is stranded."
      result: "♠K lead, win 2 spades. Declarer leads ♦K — you duck! Declarer leads ♦J — win ♦A, switch to ♥J. ♥A is forced out. Declarer has 4 diamond tricks but only if they can reach dummy — they can't. Down 1."

    - title: "Passive defence — flat dummy"
      contract: "3NT"
      auction: "1♣-1♠-1NT-3NT"
      your_hand: "♠1042 ♥Q963 ♦J85 ♣K72"
      dummy: "♠KJ85 ♥J74 ♦Q63 ♣J105"
      taxonomy:
        spades: "No threat (K-J with stoppers both sides)"
        hearts: "ATTACK TARGET (J-7-4, but leading into J is risky)"
        diamonds: "No threat (Q-6-3, positional)"
        clubs: "No threat (J-10-5, positional)"
      reconstruction: >
        1♣ = 4+ clubs. 1NT rebid = 12-14 balanced. Dummy bid 1♠ = 4+ spades, 6-13 HCP.
        Declarer: 12-14, balanced, 4+ clubs, denies 4 hearts (didn't bid them), denies 4 spades
        (rebid 1NT not 2♠). Probably 2-3-3-5 or 3-3-2-5 or 2-3-4-4.
      trick_count: "Dummy has no running suit. Declarer has clubs but no outside source. Count: ♣AQ (2), ♠A (1), ♦AK (2) = 5 sure tricks. Needs 4 more. Where from?"
      plan: "PASSIVE — Line 3. Declarer needs to develop 4 tricks from broken holdings. Every suit you break gives declarer a free finesse. Lead partner's suit if they bid, otherwise sit tight."
      result: "Partner led ♦A then ♦K then ♦4. You play ♦J, ♦8, ♦5. Passive. Declarer struggles to find 9 tricks without help. Down 1."

    - title: "Cut the ruffs — singleton in dummy"
      contract: "4♥"
      auction: "1♥-2♣-2♥-4♥"
      your_hand: "♠A63 ♥K4 ♦KJ82 ♣Q1074"
      dummy: "♠8 ♥Q10763 ♦A953 ♣A85"
      taxonomy:
        spades: "Singleton = RUFFING VALUE (!!!)"
        hearts: "TRUMP (5 cards — strong support)"
        diamonds: "No immediate threat (A-9-5-3, but ♦A is an entry)"
        clubs: "ENTRY SUIT (♣A provides access)"
      reconstruction: >
        1♥ = 5+ hearts. 2♣ by dummy = 4+ clubs. 2♥ = minimum. 4♥ = dummy has game values
        with the fit. Declarer: 5+ hearts, 12-14, probably 4-5-2-2 or 3-5-2-3.
      trick_count: "Dummy has ♠ singleton → 2-3 spade ruffs if not stopped. Declarer's spade losers can disappear. With ♥Q10763 as trumps, each ruff is valuable."
      plan: "ACTIVE — Line 4. Win ♠A at first opportunity, lead a trump. Win ♥K later, lead another trump. Cut the ruffs."
      result: "Partner leads ♠K. You signal low (TSP — prefer lower suit = diamonds). Partner leads ♠Q, you overtake with ♠A. Lead ♥4 — cutting first ruff. Win ♥K later, lead ♥ again. Two ruffs cut. Down 1."

    - title: "Force declarer — 4 trumps"
      contract: "4♠"
      auction: "1♠-2♠-4♠"
      your_hand: "♠J1083 ♥4 ♦AKQ63 ♣J75"
      dummy: "♠K74 ♥J9653 ♦72 ♣A84"
      taxonomy:
        hearts: "No threat (J-9-6-5-3, no outside honour to set up)"
        diamonds: "ATTACK TARGET (7-2, you have AKQ!)"
        clubs: "ENTRY SUIT (♣A)"
        spades: "TRUMP (K-7-4 support)"
      reconstruction: >
        1♠ = 5+ spades. 2♠ = 6-9, 3+ spades. 4♠ = extras. Declarer: 15-17, 5+ spades.
        Likely ♠AQ9xx with ♥AKxx type.
      trick_count: "Declarer has ~5 spade tricks + ♥AK (2) + ♣A (1) = 8. Needs 2 more — will try to ruff diamonds or set up hearts."
      plan: "ACTIVE — Line 5. You have 4 trumps (J-10-8-3). Force declarer! Lead ♦A, ♦K, ♦Q. Declarer must ruff. After 2 forces, declarer has fewer trumps than you. Your ♠J108 will score."
      result: "♦A, ♦K, ♦Q — declarer ruffs the third. Declarer draws 2 rounds of trumps but can't draw yours without running out. You score ♠J and ♠10. Down 1."

# ──────────────────────────────────────────────
# Psychology — Competitive Protocols
# ──────────────────────────────────────────────

psychology:
  title: "Psychology — Competitive Protocols"
  principle: >
    Bridge is not purely mathematical — psychological tactics have a legitimate
    and critical role. Protocol-driven psychology converts book knowledge into
    table performance across four pillars: reading opponents, table presence,
    deception, and pressure management.

  pillars:
    reading_opponents:
      name: "Reading Opponents"
      description: >
        Card reading is logical deduction, not guesswork. Every bid, every card,
        every pass contains information — if you know how to read it. But bridge
        is played by humans, and humans leak information through tempo, emotion,
        body language, and behaviour. The expert reads ALL channels: cards, bids,
        non-bids, hesitations, posture, mood, and session momentum.

      # ── Logical Deduction Layer ────────────────
      didd_method:
        name: "DIDD Method — Distribute, Infer, Decide, Do"
        steps:
          - step: "Distribute"
            action: "Gather all clues from bidding, opening lead, and early play"
          - step: "Infer"
            action: "Construct a hypothesis about the unseen hands"
          - step: "Decide"
            action: "Test the hypothesis against further evidence as tricks are played"
          - step: "Do"
            action: "Choose the line consistent with the most likely layout"
        master_rule: >
          By trick 8-9, aim to know all four suit lengths for both defenders.
          Most bridge 'guesses' are not guesses at all — the available data has
          narrowed the layout to one or two possibilities.
        integration_with_intelligence: >
          DIDD is the human layer on top of card counting (S-READ-*). The
          Intelligence division handles mechanics: tracking cards, computing
          splits, updating probabilities. Perception adds the human signals:
          tempo, emotion, non-actions, opponent tendencies. The combined
          pipeline: DIDD gathers clues (Perception) → counting refines the
          hypothesis (Intelligence) → archetype and tempo adjust probabilities
          (Perception) → decision.

      negative_inferences:
        name: "Negative Inferences — The Dog That Did Not Bark"
        principle: >
          Inferences from what opponents chose NOT to do are as important as
          inferences from what they did. Every pass, every non-lead, every
          non-double is a statement about their hand.
        bidding_inferences:
          - situation: "Opponent didn't open the bidding"
            inference: "Fewer than 12 HCP (usually). Narrows HCP range immediately."
          - situation: "Opponent overcalled but didn't lead his suit"
            inference: "Likely lacks key honours in that suit — the overcall was for lead direction but the suit is too weak to lead"
          - situation: "Opponent didn't raise partner's suit"
            inference: "Likely fewer than 3 cards in support"
          - situation: "Opponent didn't double for penalty"
            inference: "Limited defensive strength — at most 1 trump trick"
          - situation: "Opponent didn't bid 3NT with a balanced hand and stoppers"
            inference: "Either unbalanced or lacks stopper — tells you about distribution"
          - situation: "Opponent didn't preempt"
            inference: "Doesn't have 7+ cards in any suit — more balanced than typical weak hand"
          - situation: "Opponent passed partner's forcing bid"
            inference: "System gap or minimum — but also places specific cards with the passing hand"
        play_inferences:
          - situation: "Defender didn't cover your honour with their honour"
            inference: "They don't have the honour above yours — place it with the other defender"
          - situation: "Defender didn't return partner's suit after winning a trick"
            inference: "Likely has a singleton/void in that suit, or found a better attack"
          - situation: "Defender didn't signal encouragement in partner's suit"
            inference: "Likely odd count (doubleton or void) or weak holding — plan accordingly"
          - situation: "Defender didn't split their honours when you led toward dummy"
            inference: "Either has only one honour or has length and is waiting"
          - situation: "Declarer didn't draw trumps immediately"
            inference: "Needs ruffs, or has a side suit to establish first — signals distribution"

      # ── Human Intelligence Layer ───────────────
      tempo_reads:
        name: "Reading Opponent Tempo"
        principle: >
          Opponent hesitations are legal to observe (not partner's). Tempo is the
          richest source of human information at the bridge table. A single
          hesitation can narrow a defender's hand to 2-3 possible holdings.
        bidding_tempo:
          - tell: "Long pause before passing"
            meaning: "Had something to say — extra values or a borderline action. They're near the top of their range or had a competitive action they rejected."
          - tell: "Long pause before bidding"
            meaning: "Doubt about the action taken. The bid was close — they might have passed, or bid something different."
          - tell: "Snap bid (immediate action)"
            meaning: "Automatic — either very clear (strong hand) or pre-planned. No information about borderline holdings."
          - tell: "Long pause then pass over your preempt"
            meaning: "Had values but couldn't find a good call. Place them with 12-15 HCP and no clear suit to bid."
          - tell: "Quick pass of partner's opening bid"
            meaning: "Truly weak — didn't even consider responding. Likely < 6 HCP."
          - tell: "Hesitation before raising partner"
            meaning: "Borderline raise — minimum support or borderline strength. The raise is at the bottom of its range."
        play_tempo:
          - tell: "Defender hesitates before following suit with a small card"
            meaning: "Had a choice — likely holds an honour in that suit they considered playing. Place the missing honour with them."
          - tell: "Defender plays quickly to trick 1"
            meaning: "Likely singleton or automatic play from a sequence. Low card fast = singleton or low from xx."
          - tell: "Defender hesitates at trick 1 then plays small"
            meaning: "Has the missing high card (Ace or King) and considered winning. Finesse away from them if possible."
          - tell: "Defender thinks before discarding"
            meaning: "Holds something worth keeping in multiple suits — distribution or honours revealed by what they're reluctant to release."
          - tell: "Declarer pauses at trick 1 before playing from dummy"
            meaning: "Declarer is planning — count winners/losers. Watch what they study in dummy: that's their problem suit."
          - tell: "Opponent plays a card then immediately picks up the next trick's cards"
            meaning: "Eager pace suggests confidence — they see a clear plan. Be more cautious with your defence."
        caution: >
          ETHICAL OBLIGATION: never act on PARTNER's tempo. Only opponents' tempo
          is legal information. Be aware that strong opponents may use deliberate
          tempo deception — but this is rare at club level. Most tempo tells are
          genuine. The Laws of Bridge (Law 73) permit drawing inferences from
          opponents' tempo but prohibit acting on partner's.

      # ── Emotional and Behavioural Reads ─────────
      emotional_reads:
        name: "Reading Opponent Emotions and Behaviour"
        principle: >
          Bridge players are emotional beings. Frustration, confidence, anxiety,
          and tilt leak through body language, pace of play, and bidding
          aggression. Reading these signals gives you a competitive edge that
          pure card reading misses.
        pre_hand_reads:
          - observation: "Opponent picks up hand eagerly, sits up straighter"
            inference: "Good hand incoming. Be prepared for aggressive bidding. Consider a light competitive action to disrupt."
          - observation: "Opponent glances at scorecard between boards"
            inference: "Tracking the score — either winning (may get conservative) or losing (may get desperate). Both are exploitable."
          - observation: "Opponent sighs, slumps, or shakes head before bidding starts"
            inference: "Bad hand or residual frustration from previous board. Tilt risk. Push harder in competitive auctions."
          - observation: "Opponents discuss the previous board before picking up cards"
            inference: "Distracted. Not fully focused. Their first decision this board may be impulsive."
          - observation: "Opponent carefully sorts hand, counts points visibly"
            inference: "Borderline hand. They're calculating whether to act. If they bid, they're at the bottom of the range."
        dummy_reactions:
          - observation: "Declarer's face falls when dummy comes down"
            inference: "Dummy is worse than expected. Contract may be in trouble — defend actively, don't give away tricks."
          - observation: "Declarer brightens or relaxes when seeing dummy"
            inference: "Dummy is better than expected or the contract is comfortable. Be aggressive on defence — tricks may disappear."
          - observation: "Declarer studies dummy for a long time"
            inference: "Complex hand with a difficult plan. They're counting winners/losers. What they study longest is their key problem."
          - observation: "Declarer glances quickly at dummy and plays fast"
            inference: "Either an easy hand (routine contract) or they've seen this position before. Standard technique will apply."
        mid_play_reads:
          - observation: "Defender's posture shifts — leans forward or backward"
            inference: "Engagement change. Leaning forward = key moment, they have a card to play. Leaning back = nothing left to contribute."
          - observation: "Opponent's tempo changes mid-hand — speeds up after being slow"
            inference: "Decision made. They've figured out the position or given up on a suit. Their remaining plays are likely automatic."
          - observation: "Opponent makes a face or visible reaction to partner's card"
            inference: "Surprised by partner's play. Possible defensive miscommunication. Their defence may be uncoordinated."
          - observation: "Opponent counts cards in their hand repeatedly"
            inference: "Close hand. Counting is a stress response. They're near a critical decision. Apply time pressure by playing briskly."
        frustration_exploitation:
          name: "Exploiting Opponent Frustration"
          principle: >
            After a bad board, opponents are emotionally compromised for 2-3 boards.
            Frustration manifests as: overbidding to 'get the score back', underbidding
            from loss of confidence, impulsive doubles, or abandoning their system.
          protocol:
            - "After giving opponents a bottom: expect them to be aggressive on the next board. Be ready to double."
            - "If opponents argued during the previous board: their partnership trust is damaged. Compete harder — they'll misdefend."
            - "If an opponent made a visible error: they'll try to 'make up for it'. This usually means overbidding or taking anti-percentage lines."
            - "If opponents have been losing all session: by round 4-5, their judgement is degraded. Push marginal competitive decisions."
            - "NEVER exploit your own frustration. Apply the reset ritual instead."
        session_arc_reads:
          name: "Reading the Session Arc"
          principle: >
            Opponents' play quality changes over the course of a session. Track
            the arc: fresh and sharp in round 1, potential fatigue or tilt by
            round 3-4, desperation or resignation in the final rounds.
          adjustments:
            - phase: "Round 1-2"
              opponent_state: "Fresh, focused, disciplined"
              your_adjustment: "Play your system straight. Deception has lower success rate against fresh opponents."
            - phase: "Round 3-4"
              opponent_state: "Fatigue setting in. Accumulated frustration from bad boards possible."
              your_adjustment: "Increase competitive aggression. Opponents make more errors in the middle of sessions."
            - phase: "Final rounds"
              opponent_state: "Tired, possibly tilted or resigned. Score-conscious pairs may panic-bid."
              your_adjustment: "Maximum discipline. The field makes its worst decisions here. Solid play rises."
            - phase: "After a top against current opponents"
              opponent_state: "Demoralised. May overbid to compensate."
              your_adjustment: "Conservative bidding, aggressive defence. Let them overreach."

      # ── Counter-Deception ──────────────────────
      counter_deception:
        name: "Countering Opponents' Deception"
        principle: >
          Opponents false-card too. Recognising and neutralising their deception
          is as important as executing your own.
        five_methods:
          - method: "Pattern recognition"
            rule: "Against habitual false-carders, their 'honest' plays become the tell. If they always false-card, the straight play IS the deception."
          - method: "Count the hand"
            rule: "A complete count makes deception impossible to sustain. If you know the distribution, a 'singleton' King from a player who bid the suit is obviously from KQ or Kx."
          - method: "Bidding constraints"
            rule: "The bidding constrains possible holdings. A player who opened 1NT can't have a singleton. A player who preempted can't have side-suit honours."
          - method: "Play-bidding consistency"
            rule: "Does the card played make sense given the bidding? If not, suspect deception. A defender who passed but drops the King probably doesn't have KQ."
          - method: "Trust math"
            rule: "Percentage plays overcome psychological traps. If the finesse is 68% and the drop is 32%, take the finesse regardless of the defender's false-card."

    table_presence:
      name: "Table Presence"
      description: >
        How you conduct yourself at the table affects opponents' decisions.
        Confidence projects strength. Calm unnerves the aggressive. Discipline
        frustrates the creative.
      half_a_loaf:
        name: "Half-a-Loaf Principle"
        rule: >
          Aim for the best result possible, not the best possible result. Secure
          consistent small wins rather than risking the contract for maximum gain.
          Even a quarter of potential points is better than nothing.
        applications:
          - "When a greedy line risks the contract for an overtrick, prefer the safe line"
          - "Take the sure plus rather than the speculative double"
          - "Accept a quiet partscore rather than competing to a level you might not make"
      opponent_archetypes:
        name: "Opponent Archetype Recognition"
        principle: >
          Classify each opponent pair at the start of a round. Adjust strategy
          to exploit their predictable patterns.
        archetypes:
          - type: "Aggressive"
            pattern: "Overbids, competes aggressively, doubles readily"
            counter: "Let them overbid; be ready to double; avoid pushing them into sacrifices"
          - type: "Timid"
            pattern: "Underbids, sells out quickly, avoids doubles"
            counter: "Compete harder; steal partscores; they won't punish you"
          - type: "Tilted"
            pattern: "Emotional after bad boards, makes impulsive decisions"
            counter: "Apply maximum pressure; bid aggressively on marginal hands"
          - type: "Disciplined"
            pattern: "Consistent tempo, sound bidding, accurate play"
            counter: "Play your best bridge; deception has lower success rate; avoid gambles"
      disciplined_tempo:
        name: "Your Own Tempo Discipline"
        rule: >
          5-10 seconds per routine decision. Do not speed up with bad hands or
          slow down with good ones. Consistent tempo denies opponents free
          information and protects partnership ethics.

    deception:
      name: "Deception"
      description: >
        Deception is a legitimate competitive weapon — within the Laws and
        without misleading partner. The key is distinguishing free deception
        (always good) from costly deception (sometimes good).
      free_vs_costly:
        name: "Free vs Costly Deception"
        definition:
          free: >
            Cannot cost a trick regardless of the layout. Example: dropping an
            honour from equals (Q from QJ, K from KQ when partner holds the A).
            Execute routinely.
          costly: >
            Risks a trick to mislead. Example: ducking the Ace, leading from
            a tenace, false-carding with a unique card. Attempt only when
            the expected gain exceeds the risk.
        examples:
          - type: "Free"
            play: "Drop the Queen from QJ doubleton when partner leads the King"
            why: "The Queen and Jack are equals — the false-card costs nothing"
          - type: "Free"
            play: "Win with the Ace (not the King) from AK when you want to conceal the King"
            why: "You would win the trick with either card"
          - type: "Costly"
            play: "Duck the Ace at trick 1 to mislead declarer about its location"
            why: "Declarer may not finesse again — you risk losing the trick entirely"
          - type: "Costly"
            play: "Lead the King from Kx to suggest a KQ holding"
            why: "If partner reads it wrong, defence collapses"
      cardinal_rule:
        name: "The Cardinal Rule of Deceptive Play"
        rule: >
          Deception must be spontaneous. It must be effected as though it were the
          perfectly normal and natural play — with neither undue haste nor undue
          deliberation. Pre-plan deceptive plays before the critical moment arrives.
        corollaries:
          - "No hesitation — if you pause before false-carding, you telegraph the deception"
          - "Pre-plan — decide your deceptive play during dummy's think time or before the hand begins"
          - "Don't false-card every time — mix your plays to remain unpredictable"
          - "Never mislead partner — deception targets opponents, not your own side"
      reputation:
        name: "Reputation as a Weapon"
        principle: >
          A reputation for honest, disciplined play makes occasional deception
          devastating. Habitual false-carders become predictable — their 'honest'
          plays become the tell. The optimal frequency is low enough to maintain
          credibility but high enough to create doubt.

      # ── Deception Catalogue ────────────────────
      defender_catalogue:
        name: "Standard Defensive Deceptive Positions"
        principle: >
          These ~13 positions recur frequently. Drill until recognition is
          automatic (< 2 seconds). Free positions should be executed every time.
        positions:
          - id: 1
            name: "QJ from QJ doubleton"
            classification: "Free"
            holding: "You: QJ, Dummy: K1092, Declarer leads toward dummy"
            standard_play: "Play the Jack"
            deceptive_play: "Drop the Queen — declarer may finesse the 10 next"
            why_free: "Q and J are equals; neither costs a trick"
          - id: 2
            name: "Win high from AK"
            classification: "Free"
            holding: "You: AK(x), Declarer leads the suit"
            standard_play: "Win with the King (standard)"
            deceptive_play: "Win with the Ace — conceals the King's location"
            why_free: "You win the trick either way"
          - id: 3
            name: "Drop honour from equals under Ace"
            classification: "Free"
            holding: "Partner leads A (from AK), you hold QJ(x)"
            standard_play: "Play the Jack (lowest of touching)"
            deceptive_play: "Play the Queen — declarer may place the Jack with partner"
            why_free: "Q and J are equals; you can spare either"
          - id: 4
            name: "Smith Echo false count"
            classification: "Free"
            holding: "Any side suit on opening lead"
            standard_play: "High-low = encouraging, low-high = discouraging"
            deceptive_play: "Reverse your signal to mislead declarer about your attitude"
            why_free: "Costs nothing if partner reads the position, not your card"
          - id: 5
            name: "False count signal"
            classification: "Free (if partner reads position)"
            holding: "Following suit with a choice of small cards"
            standard_play: "High-low = even count, low-high = odd count"
            deceptive_play: "Reverse the count signal to mislead declarer"
            why_free: "Partner should read count from the bidding + hand, not solely from the signal"
          - id: 6
            name: "Duck the Ace"
            classification: "Costly"
            holding: "You: Axx(x), Declarer leads the suit"
            standard_play: "Win the Ace"
            deceptive_play: "Duck smoothly — declarer may finesse the wrong way next"
            risk: "Declarer may never play the suit again; you lose the Ace trick"
            when_to_use: "When declarer has a two-way finesse and you want to steer them wrong"
          - id: 7
            name: "Drop the King from Kx"
            classification: "Costly"
            holding: "You: Kx, Dummy: Qxxx, Declarer plays the Ace"
            standard_play: "Play small"
            deceptive_play: "Drop the King — declarer thinks it's singleton, finesses against partner next"
            risk: "If declarer reads it as Kx, you've wasted the King"
            when_to_use: "When partner's Jxx will win a trick if declarer finesses the wrong way"
          - id: 8
            name: "Lead the King from Kx (not KQ)"
            classification: "Costly"
            holding: "You: Kx on defence, leading through declarer"
            standard_play: "Lead small"
            deceptive_play: "Lead the King — suggests KQ sequence"
            risk: "Partner may duck with the Ace, thinking you have KQ"
            when_to_use: "Only when you can afford the confusion and need declarer to misjudge"
          - id: 9
            name: "Smoothly play small from Kx behind dummy's AQJ"
            classification: "Costly"
            holding: "Dummy: AQJ, You (behind dummy): Kx"
            standard_play: "Cover or duck"
            deceptive_play: "Duck quickly — declarer may finesse the Queen, losing to partner"
            risk: "If declarer plays the Ace, your King is dead"
            when_to_use: "When declarer has a choice of finesses and you want to steer them away"
          - id: 10
            name: "Split honours out of turn"
            classification: "Costly"
            holding: "You: KQ or QJ, Declarer leads toward dummy"
            standard_play: "Play small if possible"
            deceptive_play: "Split (play the higher honour) when you DON'T have to — suggests shortage"
            risk: "Wastes an honour trick"
            when_to_use: "When you want declarer to miscount the suit or misread your distribution"
          - id: 11
            name: "False-card the ten from 10xx"
            classification: "Free"
            holding: "You: 10xx, Partner leads high (K or A), Dummy: Jxxx"
            standard_play: "Play low (count signal)"
            deceptive_play: "Drop the 10 — declarer may misread as doubleton"
            why_free: "The 10 has no trick-taking potential in this layout"
          - id: 12
            name: "Win with unnecessary high card (overtake)"
            classification: "Free"
            holding: "Partner leads the Queen, you hold AK"
            standard_play: "Encourage with a high spot"
            deceptive_play: "Overtake with the King — suggests a different honour layout to declarer"
            why_free: "You hold both honours; overtaking costs nothing"
          - id: 13
            name: "Delayed duck"
            classification: "Costly"
            holding: "You: Axx in dummy's long suit (NT defence)"
            standard_play: "Win the Ace immediately"
            deceptive_play: "Win on the SECOND round (not third) — makes declarer think you ducked once with Ax"
            risk: "If declarer can switch suits, you may not get the Ace trick"
            when_to_use: "When you want declarer to miscount the suit and play a third round into your Ace"

      declarer_catalogue:
        name: "Standard Declarer Deceptive Positions"
        principle: >
          These ~8 positions are declarer's deceptive toolkit. Unlike defender
          deception, declarer deception targets both defenders simultaneously.
        positions:
          - id: 1
            name: "Win high to conceal length"
            classification: "Free"
            holding: "You: AKx(x), Defenders lead the suit"
            deceptive_play: "Win with the Ace — conceal the King"
            why_free: "You win the trick either way"
            effect: "Defenders may think partner has the King and continue the suit"
          - id: 2
            name: "Lead toward weakness"
            classification: "Free"
            holding: "You: xxx, Dummy: Qxx"
            deceptive_play: "Lead small toward dummy's Queen as if you hold the King"
            why_free: "You'd lead toward the Queen anyway as a normal finesse attempt"
            effect: "Left-hand defender may not cover with the King, or may waste the Ace"
          - id: 3
            name: "Steal a trick early"
            classification: "Costly"
            holding: "Dummy: Kx, Defender behind dummy has the Ace"
            deceptive_play: "At trick 2, lead a low card toward dummy's King"
            risk: "If the Ace takes, no deception; if it ducks, you steal a trick"
            effect: "Works best early when defenders haven't counted tricks"
          - id: 4
            name: "Tempo deception (snap play)"
            classification: "Free"
            holding: "Any difficult decision"
            deceptive_play: "Play quickly on hard decisions to project confidence"
            why_free: "Tempo costs nothing"
            effect: "Defenders second-guess their defence when declarer appears confident"
          - id: 5
            name: "Fake ruff attempt"
            classification: "Costly"
            holding: "Side suit you don't need to ruff"
            deceptive_play: "Lead the side suit as if attempting to ruff in dummy"
            risk: "Defenders may lead trumps (which you wanted) or may not be fooled"
            effect: "Defenders waste a trump lead; or continue the wrong suit"
          - id: 6
            name: "False discard"
            classification: "Costly"
            holding: "Long suit you want to keep, short suit that looks like a discard"
            deceptive_play: "Discard a card from the suit you want to run, suggesting weakness"
            risk: "You weaken your actual suit"
            effect: "Defenders attack the wrong suit or fail to hold up"
          - id: 7
            name: "Finesse into the 'wrong' hand"
            classification: "Costly"
            holding: "Two-way finesse available"
            deceptive_play: "Finesse into the hand that DOESN'T have the dangerous shift"
            risk: "The finesse may lose"
            effect: "Even if it loses, the defender on lead can't damage you"
          - id: 8
            name: "Duck in dummy at trick 1"
            classification: "Free (when automatic)"
            holding: "Dummy: Kx, LHO leads Ace (from AQ)"
            deceptive_play: "Duck smoothly — LHO may shift, saving your King"
            why_free: "The King would lose to the Ace anyway"
            effect: "LHO may think partner has the King and shift suits"

    pressure_management:
      name: "Pressure Management"
      description: >
        Managing your own psychology and exploiting opponents' emotional state
        is a core competitive skill.
      have_have_not:
        name: "Have/Have-Not Dynamic"
        rule: >
          When you hold strong cards (HAVE): play constructive, accurate bridge.
          When you hold weak cards (HAVE-NOT): deploy psychological weapons —
          obstruction, deception, harassment. The best players seamlessly
          transition between both roles.
        key_insight: >
          Opponents hold good cards roughly 50% of the time. Making a game by
          deception counts exactly as much as making it by brute force.
      reset_ritual:
        name: "Reset Ritual"
        protocol:
          - "After a bad board: deep breath, 5 seconds of silence"
          - "Clear the mind: the last board does not exist"
          - "Treat the next board as if the session just started"
          - "Never discuss results mid-session — save all analysis for post-mortem"
        key_insight: >
          One bad board becomes three when frustration infects decision-making.
          The reset breaks the cascade.
      session_momentum:
        name: "Session Momentum"
        principle: >
          Track your emotional state, not just the boards. After a string of
          bad boards, opponents often loosen — exploit this with precise, aggressive
          play. After a string of good boards, guard against overconfidence.
        strong_closing: >
          Treat the last 5 boards as a new session. T1-T4 data shows consistent
          second-half improvement when closing discipline is maintained.

  decision_trees:
    name: "Decision Trees"
    when_to_deceive:
      question: "Should I false-card here?"
      tree:
        - "Is it free (from equals)? → YES, always"
        - "Is it costly? → Check: will declarer/opponent likely take a specific line without the false-card?"
        - "If yes: does the false-card redirect them to a losing line? → YES, attempt with smooth tempo"
        - "If no: the false-card gains nothing → PASS"
        - "Can you execute without hesitation? → If not, DON'T — a telegraphed false-card is worse than none"
    when_to_read:
      question: "What do I know about the unseen hands?"
      tree:
        - "Step 1: HCP count — 40 minus (your hand + dummy + any shown cards)"
        - "Step 2: Distribution — track cards played in each suit"
        - "Step 3: Negative inferences — what didn't opponents do?"
        - "Step 4: Tempo — any hesitations from opponents?"
        - "Step 5: Construct hypothesis → test against next trick → decide"
    when_to_reset:
      question: "Am I tilted?"
      tree:
        - "Did the last board go badly? → Execute reset ritual before picking up cards"
        - "Am I thinking about a previous board? → YES, you're tilted — reset"
        - "Am I making decisions faster than usual? → Slow down to standard 5-10 second tempo"
        - "Am I considering a line I wouldn't normally play? → Check: is this bold or reckless?"

  common_errors:
    name: "Common Errors"
    errors:
      - rank: 1
        error: "Telegraphing the false-card"
        description: "Hesitating before a deceptive play tells opponents exactly what you did"
        fix: "Pre-plan deceptions during dummy think time. If you can't be smooth, don't attempt it"
      - rank: 2
        error: "Ignoring negative inferences"
        description: "Focusing only on what opponents did, not what they chose not to do"
        fix: "After every auction, ask: what did they NOT bid? What does that tell me?"
      - rank: 3
        error: "Playing the same way against all opponents"
        description: "Treating the aggressive bidder and the conservative bidder identically"
        fix: "Classify opponents at round start. Adjust your competitive threshold"
      - rank: 4
        error: "Greedy play (anti-Half-a-Loaf)"
        description: "Risking the contract for an overtrick, or doubling for the thrill"
        fix: "Ask: what do I gain vs what do I lose? If the loss is larger, take the safe line"
      - rank: 5
        error: "Tilt cascade — letting one bad board infect the next"
        description: "Frustration from board N leads to impulsive decisions on board N+1"
        fix: "Execute the reset ritual. Every single time. No exceptions"

  # ── Worked Examples from Tournament Play ────
  worked_examples:
    - title: "Reading Opponents — Counterintuitive Trump Attack (T4, Board 14)"
      pillar: "Reading Opponents"
      contract: "E 3♠"
      result: "Down 1 — NS +50 (TOP)"
      your_hand: "♠J1083 ♥4 ♦AKQ63 ♣J75"
      scenario: >
        East opens with 6 spades + club void. Standard defence leads a club
        or heart. But DIDD reveals the danger: East's void means ruff potential.
      psychology_applied: >
        NEGATIVE INFERENCE: East didn't bid 4♠ — limited strength despite shape.
        DIDD: Distribute East's cards — 6 spades + void = extreme shape. The
        danger is ruffs, not brute force. DECIDE: attack trumps with ♠J to
        shorten East's trumps before the void becomes useful. DO: ♠J lead.
      lesson: >
        The field led 'normal' suits and gave East ruffs. Psychology pillar
        (reading) + Intelligence pillar (counting distribution) combined to
        find the only defence that beats the contract.

    - title: "Half-a-Loaf — Penalty Defence Beats Declaring (T3, Board 12)"
      pillar: "Table Presence"
      contract: "E 3♥ doubled"
      result: "Down 4 — NS +800 (TOP)"
      your_hand: "♥AK84 behind East's weak 2♥ rebid"
      scenario: >
        East opened weak, raised to 3♥. Partner doubled (takeout). You hold
        ♥AK84. Could declare 4♠ or pass for penalty.
      psychology_applied: >
        HALF-A-LOAF: +800 (penalty) vs +620 (making game) vs -100 (game goes
        down). The safe defence is the CERTAIN result; declaring is speculative.
        ARCHETYPE: East is desperate (weak preemptor pushed to 3♥) — likely
        going down multiple tricks. DECIDE: pass for penalty.
      lesson: >
        The greedy play (declaring) risks -100. The safe play (defending) gets
        +800. Half-a-Loaf says take the sure plus. The field bid and scored +620
        at best. Discipline > brilliance.

    - title: "Exploiting Opponent Tilt — Passive Lead from Shaken Pair (T4, Board 16)"
      pillar: "Pressure Management"
      contract: "S 2♠ +2"
      result: "NS +170 (TOP)"
      scenario: >
        Round 4 — opponents have had a bad session. Previous board was a
        disaster for them. East leads ♠8 into your ♠AQJ — a passive,
        unfocused lead that gifts a trick.
      psychology_applied: >
        FRUSTRATION READ: opponents discussed previous board before picking up
        cards — distracted. ARCHETYPE: tilted pair, impulsive decisions likely.
        SESSION ARC: Round 4, opponents degraded. EXPLOIT: won the ♠ cheaply,
        ran clubs, collected +170 when the field conceded -140.
      lesson: >
        Opponents' emotional state directly affected their lead quality. A
        focused pair leads a club or diamond. A tilted pair leads passively
        into declarer's strength. Read the mood, not just the cards.

    - title: "Negative Inference in Defence — Elite Trick Extraction (T2, Board 6)"
      pillar: "Reading Opponents"
      contract: "E 4♥"
      result: "Down 1 — NS +100 (TOP)"
      scenario: >
        DD analysis says 4♥ makes 10 tricks at every other table. Only our
        table beat 4♥. South holds ♥AJ — the defensive holding.
      psychology_applied: >
        NEGATIVE INFERENCE: Declarer didn't draw trumps immediately — needs
        side-suit tricks first. This means declarer's trumps are not solid.
        DIDD: track the play; declarer's ♥ holding is KQ10xxx with a finesse
        position. Partner's count signal shows even length. DECIDE: hold up
        the ♥A to force declarer to misguess the position. DO: duck the first
        heart, win the second, cash side winners.
      lesson: >
        Card reading via negative inference (declarer's tempo, non-actions)
        found the only defence. The field's defenders played automatically;
        our defenders read the position.

    - title: "Free Deception — Defender False-Card from Equals"
      pillar: "Deception"
      contract: "S 3NT"
      result: "Representative position"
      your_hand: "♠QJ3 (as West, defending 3NT)"
      dummy: "♠K1092"
      scenario: >
        Declarer leads small spade toward dummy's K1092. You hold ♠QJ3.
        Standard play is the Jack (bottom of touching). Deceptive play
        is the Queen.
      psychology_applied: >
        FREE DECEPTION: Q and J are equals — playing the Q costs nothing.
        CARDINAL RULE: play the Q smoothly, without hesitation. EFFECT:
        declarer may place the Jack with East and finesse the 10 on the next
        round, losing to your J. If you played the J, declarer covers with K,
        then finesses the 10 — your Q falls under the K and 10 scores.
      lesson: >
        This is position #1 from the Defender Catalogue. Free, automatic,
        no risk. The hesitation-free drop of the Q is more effective than the
        'correct' J. Drill until this is automatic.

# ──────────────────────────────────────────────
# Additional Materials — Hand Evaluation
# ──────────────────────────────────────────────

hand_evaluation:
  principle: >
    High Card Points are the lingua franca of bridge, but HCP alone misjudge
    distributional hands, honour placement, and fit quality. A complete
    evaluation combines HCP with distributional adjustments, Losing Trick Count,
    controls, working honours, and suit quality.

  # ── Milton Work High Card Points ────────────
  hcp:
    name: "Milton Work Point Count"
    origin: "Milton Work, 1929; popularised by Charles Goren"
    values:
      - card: Ace
        points: 4
      - card: King
        points: 3
      - card: Queen
        points: 2
      - card: Jack
        points: 1
    total_deck: 40
    average_per_hand: 10
    guidelines:
      opening: "12+ HCP (or Rule of 20)"
      game_major: "~25 combined HCP with 8+ fit"
      game_minor: "~28-29 combined HCP"
      game_nt: "~25 combined HCP with stoppers"
      slam_small: "~33 combined HCP"
      slam_grand: "~37 combined HCP"
    limitations:
      - "Treats all aces as equal — A opposite KQJ is better than A opposite xxx"
      - "Ignores distribution entirely"
      - "Overvalues unsupported honours (singleton K, doubleton Q)"
      - "Ignores intermediates (tens, nines)"

  # ── Distributional Points ───────────────────
  distributional_points:
    name: "Distributional Adjustments"
    principle: >
      Distribution creates tricks beyond HCP. There are two schools:
      length points (Goren original) count long suits before a fit is found;
      shortness points (Karpin/Bergen) count short suits after a fit is found.
      Both capture the same truth: shape generates tricks.

    length_points:
      name: "Length Points (Goren)"
      rule: "Add 1 point per card beyond four in any suit"
      examples:
        - holding: "5-card suit"
          add: 1
        - holding: "6-card suit"
          add: 2
        - holding: "7-card suit"
          add: 3
      when: "Use when evaluating your hand before a fit is found"

    shortness_points:
      name: "Shortness Points (Dummy Points)"
      rule: "When raising partner's suit, add points for shortness"
      values:
        - holding: "Void"
          add: 5
        - holding: "Singleton"
          add: 3
        - holding: "Doubleton"
          add: 1
      when: "Use only when you have 4+ card support for partner's suit"
      warning: >
        Do not count shortness points when you are the declarer or when
        the short suit contains wasted honours (Qx, Jx).

  # ── Rule of 20 ─────────────────────────────
  rule_of_20:
    name: "Bergen's Rule of 20"
    rule: "Add HCP + length of two longest suits. If total >= 20, open the bidding."
    examples:
      - hand: "!S:AQxxx !H:KJxxx !D:Jx !C:x"
        hcp: 11
        lengths: "5+5=10"
        total: 21
        verdict: "Open"
      - hand: "!S:AQxx !H:KJx !D:Qxx !C:xxx"
        hcp: 12
        lengths: "4+3=7"
        total: 19
        verdict: "Pass (flat shape, poor controls)"
    note: >
      The Rule of 20 captures what experienced players feel intuitively:
      distributional hands with good suits open lighter than flat hands
      with scattered honours.

  # ── Working Honours ─────────────────────────
  working_honours:
    name: "Working vs Wasted Honours"
    principle: >
      Honours in partner's suits and in your long suits generate tricks.
      Honours in short suits or in opponent's suits are wasted.
    adjustments:
      - situation: "Honour in partner's suit"
        effect: "+1 (the honour is working)"
      - situation: "Honour in opponent's bid suit"
        effect: "-1 (likely not pulling weight on offense)"
      - situation: "Singleton honour (K, Q, J alone)"
        effect: "-2 (cannot develop tricks, may be captured)"
      - situation: "Doubleton honour (Qx, Jx)"
        effect: "-1 (needs partner's help to be worth anything)"
      - situation: "Aces and Kings"
        effect: "Always working — they take tricks regardless"
    note: >
      AK opposite xxx is worth more than QJ opposite QJ. Always upgrade
      hands with aces and downgrade hands with queens and jacks in isolation.

  # ── Controls ────────────────────────────────
  controls:
    name: "Control Count"
    values:
      - card: Ace
        controls: 2
      - card: King
        controls: 1
    rule: >
      An average hand has 4 controls. Hands with 5+ controls are slam-oriented;
      hands with 3 or fewer are defensive.
    italian_method: >
      The Italian school (Blue Team) valued controls over HCP for slam bidding.
      A hand with 14 HCP but only 2 controls (two kings, no aces) is dangerous
      at the 5-level. A hand with 12 HCP and 5 controls (two aces + one king)
      is a powerful slam hand.
    note: >
      Our 2!D Game Force response already uses controls (A=2, K=1) as the
      first step. This extends the philosophy to all slam evaluation.

  # ── Honour Combinations ─────────────────────
  honour_combinations:
    name: "Honour Combinations and Intermediates"
    principle: >
      Honours working together generate tricks. AKQ in one suit is worth
      more than A, K, Q spread across three suits. Intermediates (T, 9)
      fill out suits and prevent losers.
    examples:
      - holding: "AKJTx"
        note: "Almost certainly 5 tricks — the T fills beautifully"
      - holding: "AKxxx"
        note: "Only 3 sure tricks — needs 3-2 break for 4"
      - holding: "QJT9x"
        note: "Self-sufficient opposite any doubleton — 3 tricks likely"
      - holding: "Qxxxx"
        note: "Generates tricks only with partner's help"
    adjustment_rules:
      - "Add 1 for each ten in a suit with higher honours"
      - "Add 1 for AK or KQ tight (honours reinforce each other)"
      - "Subtract 1 for QJ or Jx without support from higher cards"

  # ── Suit Quality Test ───────────────────────
  suit_quality_test:
    name: "Suit Quality Test (SQT)"
    rule: "SQT = suit length + number of honour cards (A, K, Q, J, T) in the suit"
    principle: >
      A suit is biddable at the N-level if SQT >= N + number of tricks you need.
      Useful for overcalls, preempts, and competitive decisions.
    examples:
      - suit: "KQJ9xxx"
        sqt: 11
        comment: "SQT 11 — strong enough for a 3-level preempt at any vulnerability"
      - suit: "Qxxxxx"
        sqt: 7
        comment: "SQT 7 — marginal for a 2-level weak two; fine at favorable"
      - suit: "AKJTx"
        sqt: 9
        comment: "SQT 9 — excellent 5-card overcall suit"
      - suit: "Jxxxx"
        sqt: 6
        comment: "SQT 6 — do not overcall with this suit"
    note: >
      A suit with SQT >= 10 is self-sufficient (generates tricks without
      partner's help). A suit with SQT < 7 should rarely be bid voluntarily.

  # ── Adjust-3 Method ────────────────────────
  adjust_3:
    name: "Adjust-3 (Quick Revaluation)"
    rule: >
      After a fit is found, add 1 point for each trump beyond the eighth,
      add 1 for a side singleton, add 1 for a side void, and subtract 1
      for each flat-hand indicator (4333).
    note: >
      Designed as a quick mental adjustment at the table, not a precise
      calculation. The point is to revalue your hand dynamically after
      new information (partner's bid, fit discovery, opponent's bid).

  # ── Playing Tricks vs Defensive Tricks ──────
  playing_vs_defensive:
    name: "Playing Tricks vs Defensive Tricks"
    principle: >
      A hand has playing tricks (tricks it can take as declarer) and defensive
      tricks (tricks it can take defending). Distributional hands have many
      playing tricks but few defensive. Balanced hands have defensive tricks
      but limited playing tricks.
    guidelines:
      - "Aces and kings are both playing and defensive"
      - "Long suits add playing tricks but not defensive"
      - "Queens and jacks in short suits add defensive tricks but not playing"
      - "Voids add playing tricks (via ruffs) but zero defensive"
    practical: >
      This distinction matters in competitive auctions. When deciding
      'bid or double', count your defensive tricks. If you have 2 or fewer
      defensive tricks, bidding is usually right. If you have 4+, doubling
      pays better.

  # ── Summary ─────────────────────────────────
  summary:
    - tool: "HCP"
      best_for: "Opening bids, NT ranges, first approximation"
      limitation: "Ignores distribution"
    - tool: "Distributional points"
      best_for: "Suit contracts, revaluation after fit"
      limitation: "Meaningless in NT"
    - tool: "Rule of 20"
      best_for: "Marginal opening decisions"
      limitation: "Doesn't account for vulnerability or seat"
    - tool: "Working honours"
      best_for: "Revaluation during the auction"
      limitation: "Requires information from bidding"
    - tool: "Controls"
      best_for: "Slam evaluation"
      limitation: "Ignores suit quality"
    - tool: "SQT"
      best_for: "Overcalls, preempts, competitive bids"
      limitation: "Suit-specific, not whole-hand"
    - tool: "Losing Trick Count"
      best_for: "Suit contracts, competitive decisions, slam tries"
      limitation: "Unreliable in NT; assumes a trump fit"

# ──────────────────────────────────────────────
# Additional Materials — Losing Trick Count
# ──────────────────────────────────────────────

losing_trick_count:
  principle: >
    The Losing Trick Count evaluates hand strength by counting losers —
    cards that will not win tricks even in the best case. It is more
    accurate than HCP for suit contracts, especially for distributional
    hands and competitive decisions. The formula: 24 minus combined
    losers equals the number of tricks the partnership can expect.

  # ── Counting Rules ──────────────────────────
  counting_rules:
    name: "How to Count Losers"
    rule: >
      Examine only the top three cards in each suit. Each missing top
      honour (Ace, King, Queen) in the top three is one loser.
      A void has 0 losers. A singleton has at most 1 loser.
      A doubleton has at most 2 losers.
    maximum_per_suit:
      - length: "Void"
        max_losers: 0
      - length: "Singleton"
        max_losers: 1
      - length: "Doubleton"
        max_losers: 2
      - length: "3+ cards"
        max_losers: 3
    note: >
      Only the top three matter. AKQxxxx has 0 losers, not negative losers.
      Jxxxx has 3 losers, same as xxxxx. The jack does not reduce the count
      in standard LTC (but see NLTC adjustments below).

  # ── Loser Table ─────────────────────────────
  loser_table:
    title: "Standard LTC — Losers per Holding"
    entries:
      - holding: "—"
        losers: 0
        note: "Void"
      - holding: "A"
        losers: 0
        note: ""
      - holding: "K"
        losers: 1
        note: "Singleton K counts as 1 (may be captured)"
      - holding: "Q"
        losers: 1
        note: "Singleton Q counts as 1 (usually lost)"
      - holding: "x"
        losers: 1
        note: "Small singleton"
      - holding: "AK"
        losers: 0
        note: ""
      - holding: "AQ"
        losers: 0.5
        note: "Half loser (finesse dependent)"
      - holding: "Ax"
        losers: 1
        note: ""
      - holding: "KQ"
        losers: 1
        note: ""
      - holding: "Kx"
        losers: 1
        note: ""
      - holding: "Qx"
        losers: 2
        note: "Very likely both lost without help"
      - holding: "xx"
        losers: 2
        note: ""
      - holding: "AKQ"
        losers: 0
        note: ""
      - holding: "AKx"
        losers: 1
        note: ""
      - holding: "AQx"
        losers: 1
        note: "Half loser rounded up; finesse for Q"
      - holding: "Axx"
        losers: 2
        note: ""
      - holding: "KQx"
        losers: 1
        note: ""
      - holding: "Kxx"
        losers: 2
        note: ""
      - holding: "Qxx"
        losers: 2.5
        note: "The queen rarely takes a trick without support"
      - holding: "xxx"
        losers: 3
        note: "Maximum losers for any holding"

  # ── The 24-Minus Formula ────────────────────
  formula:
    name: "Combined Loser Count → Expected Tricks"
    rule: "24 minus (opener's losers + responder's losers) = expected tricks"
    examples:
      - opener_losers: 7
        responder_losers: 9
        combined: 16
        tricks: 8
        level: "2-level (partscore)"
      - opener_losers: 7
        responder_losers: 7
        combined: 14
        tricks: 10
        level: "4-level (game in major)"
      - opener_losers: 5
        responder_losers: 7
        combined: 12
        tricks: 12
        level: "6-level (small slam)"
      - opener_losers: 4
        responder_losers: 7
        combined: 11
        tricks: 13
        level: "7-level (grand slam)"
    note: >
      The formula assumes an 8+ card trump fit and normal breaks.
      Adjust -1 trick for bad breaks, +1 for known favourable position
      (e.g., finesse is onside based on bidding).

  # ── Cover Cards and Fillers ─────────────────
  cover_cards:
    name: "Cover Cards"
    principle: >
      A cover card is a card that covers one of partner's losers —
      typically an ace or king in the right suit. When partner opens
      and you hold fitting honours, count cover cards rather than HCP
      to decide whether to bid game or slam.
    example: >
      Partner opens 1!S showing 5+ spades. You hold
      !S:Kxxx !H:Axx !D:Qxxx !C:xx (9 HCP, 9 losers).
      Count cover cards for partner's likely hand: the !S:K covers one spade
      loser, the !H:A covers a heart loser — 2 cover cards.
      If partner has 7 losers, combined = 14 - 2 = 12 tricks? No —
      the loser count method is more accurate. 24 - (7+9) = 8 tricks.
      But if partner's 7-loser hand has specific losers in hearts and spades,
      your covers are perfectly placed.
    note: >
      Cover cards are a qualitative supplement to LTC, not a replacement.
      They help when LTC says 'borderline' — good cover cards tip toward bidding.

  # ── LTC by Bidding Action ───────────────────
  ltc_by_bidding:
    title: "Typical Loser Count by Common Bidding Actions"
    actions:
      - action: "Open at the 1-level"
        typical_losers: "7 (range 5-8)"
      - action: "Minimum response (6-9 HCP)"
        typical_losers: "9-10"
      - action: "Invitational raise (10-12)"
        typical_losers: "8"
      - action: "Game-forcing response (12+)"
        typical_losers: "7 or fewer"
      - action: "Preemptive opening (weak two)"
        typical_losers: "8-9"
      - action: "Preemptive opening (3-level)"
        typical_losers: "8-9 (7+ card suit)"
      - action: "Strong 2!C opening"
        typical_losers: "4-5"
      - action: "Strong 2!D opening (game force)"
        typical_losers: "3-4"
      - action: "Overcall (simple)"
        typical_losers: "7-8"
      - action: "Takeout double"
        typical_losers: "6 (shape compensates)"

  # ── Klinger's Adjustments ───────────────────
  klinger_adjustments:
    name: "Ron Klinger's Queen Adjustments"
    principle: >
      Standard LTC overvalues queens. Klinger suggested adjustments:
      a guarded queen (Qxx+) in a bid suit is worth half a loser less;
      a singleton or doubleton queen is worth nothing.
    adjustments:
      - situation: "Qxx+ in partner's bid suit"
        adjustment: "Subtract 0.5 losers"
      - situation: "Qxx+ in your own long suit"
        adjustment: "Subtract 0.5 losers"
      - situation: "Singleton Q"
        adjustment: "Count as 1 full loser (same as singleton x)"
      - situation: "Doubleton Qx"
        adjustment: "Count as 2 losers (queen is unlikely to take a trick)"

  # ── New Losing Trick Count (NLTC) ──────────
  nltc:
    name: "New Losing Trick Count (Koelman)"
    principle: >
      NLTC refines the standard count by weighting losers: an ace loser
      (missing the ace) costs more than a queen loser (missing the queen),
      because aces take tricks independently while queens need support.
    weights:
      - missing: "Ace"
        loser_value: 1.5
      - missing: "King"
        loser_value: 1.0
      - missing: "Queen"
        loser_value: 0.5
    formula: "26 minus combined NLTC losers = expected tricks"
    note: >
      NLTC is more accurate than standard LTC for slam hands. For
      routine game decisions, standard LTC is sufficient. Use NLTC
      when deciding between game and slam.

  # ── When LTC Works and When It Fails ────────
  reliability:
    name: "Reliability and Limitations"
    works_well:
      - "Suit contracts with an 8+ card trump fit"
      - "Competitive decisions (bid vs pass vs double)"
      - "Slam exploration in suit contracts"
      - "Evaluating distributional hands that HCP undervalue"
    fails:
      - "Notrump contracts (distribution doesn't generate ruffs)"
      - "Misfits (no 8-card fit; losers don't cancel)"
      - "Very short suits opposite very long suits (duplication)"
      - "Hands where the opponents' lead kills a critical entry"
    note: >
      LTC is a planning tool, not an oracle. It tells you the expected
      trick count assuming normal play and reasonable breaks. At the table,
      always count your actual tricks before committing.

  # ── LTC vs HCP: When to Use Each ───────────
  ltc_vs_hcp:
    title: "LTC vs HCP Decision Guide"
    comparisons:
      - situation: "Opening the bidding"
        prefer: "HCP (Rule of 20 for borderline)"
        reason: "LTC requires a fit to be meaningful"
      - situation: "Raising partner's suit"
        prefer: "LTC"
        reason: "Fit is confirmed; LTC measures playing strength"
      - situation: "Notrump bidding"
        prefer: "HCP"
        reason: "LTC assumes ruffs; NT relies on high cards and stoppers"
      - situation: "Competitive decisions"
        prefer: "LTC"
        reason: "Distributional hands overbid by LTC less than by HCP"
      - situation: "Slam investigation"
        prefer: "LTC (NLTC for precision)"
        reason: "Controls and playing tricks matter, not scattered queens"
      - situation: "Penalty doubles"
        prefer: "HCP + defensive tricks"
        reason: "You need quick tricks, not playing tricks"
