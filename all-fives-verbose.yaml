# All Fives Bidding System
# Card symbols: !S = spades, !H = hearts, !D = diamonds, !C = clubs
# Card ranks: A K Q J T 9 8 7 6 5 4 3 2 (T = ten)
# A natural, disciplined bidding system built on common sense.

system:
  name: All Fives
  tagline: "A natural, disciplined bidding system built on common sense."
  central_idea: "Every 1-level suit opening promises 5+ cards."
  exceptions:
    - >
      With extra strength (15-17 balanced), opener may hold only 4 cards
      and escapes to NT on the next bid, or makes a reverse (16+ HCP).
    - >
      In 3rd seat, 1!C promises only 2+ clubs. A 12-14 balanced hand
      cannot open 1NT (15-17 in 3rd seat), so it opens 1!C as a
      prepared bid and rebids 1NT.

philosophy:
  - "No crazy openings. Bids mean what they look like."
  - "Partner is reliable. Trust his bids."
  - "Use the opponents' information."
  - "Stay flexible. This is an experimental system."
  - "Most auctions are competitive. Keep opening principles in mind."

known_problems:
  - id: 1
    problem: >
      3rd/4th seat 1NT is 15-17 HCP (not 12-14), because a weak NT
      blocks us without a chance at game. After a 3rd/4th-seat suit
      opening, the NT rebid shows 12-14 balanced. Responder must not
      jump-raise clubs without 5+ clubs (the "prepared 1!C trap").
      Addressed by H-9: explicit 4th seat entry, prepared !C warning,
      and upgrade policy added to spec.
  - id: 2
    problem: "The 4441 distribution. Every system struggles with this."
  - id: 3
    problem: >
      1!S usually promises 5 spades, but with a strong 4333 hand
      it may show only 4 — which feels awkward.
  - id: 4
    problem: >
      New defensive bidding package (CRASH, Michaels, Lebensohl) is adopted but
      untested at the table. See H-7 for the effectiveness tracking plan.

# ──────────────────────────────────────────────
# Openings
# ──────────────────────────────────────────────

openings:

  # ── 1NT ────────────────────────────────────
  - bid: 1NT
    seat: "1st/2nd"
    hcp: "12-14"
    shape: ["4333", "4432", "5332"]
    note: "5332 includes a 5-card major."

  - bid: 1NT
    seat: "3rd"
    hcp: "15-17"
    shape: ["4333", "4432", "5332"]
    note: >
      Stronger range in 3rd seat. With a weak 12-14 hand we risk
      blocking ourselves from game when partner passed with 11.
      With 12-14 balanced, open a suit and plan a 1NT rebid (see below).

  - bid: 1NT
    seat: "4th"
    hcp: "15-17"
    shape: ["4333", "4432", "5332"]
    note: >
      Same strong range as 3rd seat. With 12-14 balanced in 4th seat,
      either pass (acceptable — everyone else passed) or open a suit
      planning a 1NT rebid to show 12-14 balanced.

  - bid: 1NT
    section: upgrade_policy
    name: "1NT Upgrade / Downgrade Policy"
    note: >
      Borderline hands may be upgraded or downgraded by 1 HCP for
      1NT purposes. This applies in all seats but matters most in
      3rd/4th seat where the gap between weak (12-14) and strong
      (15-17) NT creates difficult hands at 14-15 HCP.
    upgrade: >
      Add 1 HCP when: all honours are concentrated (working together
      in long suits or honour combinations like KQ10, QJ10, AJ10),
      multiple good intermediates (10s, 9s), or a 5-card suit with
      body. A strong 14 may be opened 1NT (15-17) in 3rd/4th seat.
    downgrade: >
      Subtract 1 HCP when: scattered quacks in short suits (Qx, Jx),
      4333 shape, no intermediates, or honours in opponent's suit
      (after an overcall). A flat 15 with quacks may be opened at
      the 1-level instead of 1NT.

  - bid: 1NT
    section: responses
    responses:
      - bid: 2!C
        meaning: "Puppet Stayman — asks for a 5-card major"
        continuations:
          - bid: 2!D
            meaning: "Denies 5-card major"
          - bid: 2!H
            meaning: "5 hearts"
          - bid: 2!S
            meaning: "5 spades"
        after_2d_denial:
          - bid: 2!H
            by: responder
            meaning: "4 spades (not 4 hearts). Opener bids 2!S with a fit, 2NT without."
          - bid: 2!S
            by: responder
            meaning: "4 hearts (not 4 spades). Opener bids 3!H with a fit, 2NT without."
          - bid: 2NT
            by: responder
            meaning: "No 4-card major, invitational"
          - bid: 3NT
            by: responder
            meaning: "No 4-card major, game values"
          - note: >
              After 2!C - 2!D, responder's major bids are TRANSFER-LIKE:
              bidding 2!H shows spades (the other major), 2!S shows hearts.
              This lets the strong hand (opener) become declarer.
      - bid: 2!D
        meaning: "Transfer to !H"
        completion: "Opener bids 2!H (or 3!H with maximum and 4-card support — see H-4)"
      - bid: 2!H
        meaning: "Transfer to !S"
        completion: "Opener bids 2!S (or 3!S with maximum and 4-card support — see H-4)"
      - bid: 2!S
        meaning: "Transfer to !C"
        completion: "Opener bids 3!C"
      - bid: 3!C
        meaning: "Transfer to !D"
        completion: "Opener bids 3!D"

  - bid: 1NT
    section: escape_1ntx
    name: "Helvic Wriggle"
    trigger: "1NT - (X)"
    bids:
      - bid: XX
        meaning: "One-suited hand. Opener bids 2!C, responder passes or corrects."
      - bid: 2!C
        meaning: "!C + !D (touching pairs)"
      - bid: 2!D
        meaning: "!D + !H (touching pairs)"
      - bid: 2!H
        meaning: "!H + !S (touching pairs)"
      - bid: Pass
        meaning: "To play, or will bid later"
    delayed_xx:
      trigger: "Pass - Pass - XX"
      meaning: >
        SOS with non-touching pairs (!C+!H or !D+!S).
        Opener bids 2!C, responder passes or corrects.
    responder_actions:
      - hand: "Weak, shapely"
        action: "Wriggle (escape to a suit fit)"
      - hand: "Weak, balanced"
        action: "Pass (hope for the best)"
      - hand: "Strong (10+ HCP)"
        action: "Pass — penalty. Thank them for doubling."
    note: >
      If opponents doubled, they show 15+ HCP. If responder has 10+,
      our side has 22+ combined — the opponents made a mistake.
      Pass and collect the penalty.

  # ── 1-level suits ─────────────────────────
  - bid: "1!C / 1!D / 1!H / 1!S"
    seat: "1st/2nd"
    hcp: "12+"
    ltc: "7 losers typical (range 5-8)"
    promise: "5+ cards (4+ with extra strength and NT escape)"
    rules:
      - "With two 4-card suits, open the lower one first."
      - "With 15-17 balanced, open 4 cards and rebid NT."
      - "A 2NT rebid confirms 4 cards (not 5) in the opening suit."

  - bid: "1!C"
    seat: "3rd"
    hcp: "8+"
    promise: "2+ clubs"
    note: >
      In 3rd seat, 1!C promises only 2+ clubs (not 5+) because
      12-14 balanced hands cannot open 1NT (which is 15-17 here).
      A 4432 or 4333 hand with 12-14 HCP opens 1!C as a prepared bid,
      planning to rebid 1NT to show 12-14 balanced.
    responder_rules:
      - "Do NOT jump-raise clubs without 5+ clubs."
      - "Bid a new suit or 1NT — wait for opener's rebid."
      - "After 1!C, a 1NT rebid = 12-14 balanced (prepared 1!C)."
      - "After 1!C, a 2!C rebid = real clubs (5+)."
    see_also: "H-9 (prepared 1!C trap)"

  - bid: "1!D / 1!H / 1!S"
    seat: "3rd"
    hcp: "8+"
    promise: "5+ cards (may be lighter than 1st/2nd seat)"
    note: >
      This is a passed-hand opening. Partner already passed, so
      there is no risk of missing game. The lighter range is tactical —
      competing for the partscore and directing the lead.

  - bid: "1!C / 1!D / 1!H / 1!S"
    section: continuations
    minor_opening_warning: >
      1-minor openings may be shorter than the system's 5+ promise when
      opener has a balanced hand. Responder must keep this in mind:
      - 1st/2nd seat: 1!C or 1!D may be 4 cards with 15-17 balanced
        (opener plans to rebid NT). Majors always promise 5+.
      - 3rd seat: 1!C may be as short as 2 cards with 12-14 balanced
        (opener cannot open 1NT, which is 15-17 here — see H-9).
      In all cases, wait for opener's rebid before committing to a minor
      fit. A 1NT or 2NT rebid confirms the opening was prepared (short).
      A 2!C or 2!D rebid confirms real length (5+).
    raises:
      - sequence: "1x - 2x (single raise)"
        meaning: "6-9 HCP, 3+ card support"
        ltc: "9-10 losers"
        note: "Standard. If opener had only 4, he rebids 2NT."
      - sequence: "1x - 3x (limit raise)"
        meaning: "10-12 HCP, 4+ card support"
        ltc: "7-8 losers"
        note: "Invitational. Opener bids game with 5-6 losers."
      - sequence: "1M - 4M (game raise)"
        meaning: "Distributional, 5+ card support or strong hand"
        ltc: "6-7 losers"
        note: "Based on playing tricks, not just HCP."
    raise_ltc_note: >
      After a fit is found, re-evaluate using LTC: 24 minus combined losers =
      expected tricks. A hand with 10 HCP but 7 losers (e.g. !S:KQxxx !H:x
      !D:Axxx !C:xxx) is a limit raise by LTC, though HCP says only a single
      raise. Trust LTC in suit contracts — see H-8.

    after_1minor_1major:
      rule: >
        After 1!C or 1!D, a response of 1!H or 1!S promises 5 cards
        if weak. With invitational+ strength, may show only 4 (with a
        plan to rebid NT or raise). Therefore, opener may support with
        just 3 cards.

    response_1nt:
      meaning: "6-9 HCP, no fit (at most 3 cards), no 5-card major, no game ambitions"
      ltc: "10+ losers (no fit found — LTC less relevant here)"
      note: >
        We may miss a 4-4 fit, but if we are weak the opponents will bid.
        If not, everyone has misfit or balanced — NT is the right spot.
        See hypothesis H-2 for forcing 1NT as a future improvement.

    example_rebids:
      title: "Opener's rebids after 1!C - 1!H"
      bids:
        - rebid: 1!S
          meaning: "4+ spades, any strength (not a reverse — still at the 1-level)"
        - rebid: 1NT
          meaning: "15-17 HCP, balanced (confirms 4-card !C opening)"
        - rebid: 2!C
          meaning: "6+ clubs, or 5 with extra strength"
        - rebid: 2!D
          meaning: "Reverse — 16+ HCP, 4+ !D (forcing)"
        - rebid: 2!H
          meaning: "Simple raise — 3+ !H support, not a reverse"
        - rebid: 2!S
          meaning: "Reverse — 16+ HCP, 4+ !S (forcing)"
        - rebid: 2NT
          meaning: "18-19 HCP, balanced (confirms 4-card !C opening)"
        - rebid: 3!C
          meaning: "6+ clubs, invitational"

    quick_reference:
      - sequence: "1!C - 1!D"
        meaning: "Natural, 4+ diamonds, waiting"
      - sequence: "1!C - 1!H/!S"
        meaning: "5+ if weak; 4+ if strong (invitational+)"

    competitive_revaluation:
      title: "Competitive Re-evaluation with LTC"
      principle: >
        When opponents intervene after our suit opening, both partners must
        re-evaluate using LTC, not just HCP. The auction (1!H) - 2!S - ?
        asks responder: 'How many losers do I have in support of partner's
        suit?' A hand with 10 HCP and 9 losers should pass; a hand with
        9 HCP and 7 losers should compete to 3!H.
      guidelines:
        - action: "Compete to the 2-level"
          combined_ltc: "16+ (8 tricks)"
          note: "Free bid at the 2-level shows values; LTC confirms it's safe."
        - action: "Compete to the 3-level"
          combined_ltc: "15 (9 tricks)"
          note: "Law of Total Tricks applies here — with 9 trumps, bid to 3."
        - action: "Bid game despite interference"
          combined_ltc: "14 or fewer (10+ tricks)"
          note: "Don't let opponents push you out of game."
        - action: "Double (penalty-oriented)"
          note: "Prefer double when you hold 2+ defensive tricks and a misfit."
      sacrifice_guide:
        principle: >
          At favorable vulnerability, sacrifice when your combined LTC
          suggests you are outgunned. Going down 2 doubled non-vulnerable
          (-300) is better than letting them make game (+420/+620).
        guideline: "Sacrifice with 16+ combined losers at favorable; never at unfavorable."

  # ── 2!C Semi-Strong (Benji) ───────────────
  - bid: 2!C
    name: "Semi-Strong (Benji)"
    types:
      - type: 1
        name: "Balanced"
        hcp: "22-23"
        sequence: "2!C - 2!D - 2NT"
      - type: 2
        name: "Strong Major (Acol-style)"
        sequence: "2!C - 2!D - 2!H/!S"
        requirements:
          - "About 5 losers"
          - "At least 5 cards in the suit (usually 6+)"
          - "At least 3 top honours (A, K, Q)"
          - "Partner needs roughly 2 fillers to make game"
      - type: 3
        name: "Reserved"
        note: "Under investigation for strong two-suiters (18-21, 5-5+). See hypothesis H-6."

    responses:
      - bid: 2!D
        meaning: "Waiting (0-7 HCP)"
      - bid: 2!H
        meaning: "Positive relay — balanced, no 5-card suit, 8+ HCP"
        note: >
          This is NOT natural hearts. It is a general positive
          showing values without a 5-card suit to bid. Hearts are
          shown via 2NT (see below).
      - bid: 2!S
        meaning: "5+ spades, 8+ HCP"
      - bid: 2NT
        meaning: "5+ hearts, 8+ HCP"
        note: "Hearts and spades are swapped to let opener describe his hand at a low level."
      - bid: "3!C / 3!D"
        meaning: "5+ clubs/diamonds, game-force, slam interest opposite 22-23"
    note: >
      All non-2!D responses are game-forcing (8+ HCP). This avoids the
      problem where after 2!C - 2!D - 2!H, responder cannot show a
      5-card major.

  # ── 2!D Strong Game-Force ─────────────────
  - bid: 2!D
    name: "Strong Game-Force"
    ltc: "3-4 losers (game in hand or near it)"
    response_method: "Controls (Ace = 2, King = 1)"
    responses:
      - bid: 2!H
        controls: "0-1"
      - bid: 2!S
        controls: "2"
      - bid: 2NT
        controls: "3"
      - bid: 3!C
        controls: "4"
      - bid: 3!D
        controls: "5"
      - bid: 3!H
        controls: "6"
    note: >
      Excellent for slam exploration. Opener immediately knows the
      combined control count and can place the contract or ask further.

  # ── 2!H / 2!S Weak Two ───────────────────
  - bid: "2!H / 2!S"
    name: "Weak Two"
    hcp: "6-10"
    ltc: "8-9 losers"
    suit_length: "6+"
    style: "Disciplined, especially when vulnerable"
    suit_quality: "At least 2 of the top 5 honours (A, K, Q, J, T)"
    requirements:
      - "6+ cards in the bid major"
      - "6-10 HCP (not less, not more)"
      - "Decent suit quality — partner may raise pre-emptively or try for game"
      - "Avoid opening a weak two with a void or a strong 4-card side suit"
    enquiry:
      convention: "Ogust (2NT asks)"
      responses:
        - bid: 3!C
          meaning: "Minimum (6-7 HCP), poor suit (0-1 top honours)"
        - bid: 3!D
          meaning: "Minimum (6-7 HCP), good suit (2+ top honours)"
        - bid: 3!H
          meaning: "Maximum (8-10 HCP), poor suit"
        - bid: 3!S
          meaning: "Maximum (8-10 HCP), good suit"
        - bid: 3NT
          meaning: "Solid suit (AKQxxx+) — to play"
      continuations:
        - bid: 3M
          meaning: "Sign-off"
        - bid: "new suit at 3-level"
          meaning: "Forcing (slam exploration)"
        - bid: 3NT
          meaning: "To play"
        - bid: 4M
          meaning: "To play"
        - bid: "new suit at 4-level"
          meaning: "Cue-bid, slam try"
      interference:
        name: "DOPI (Double = step 1, Pass = step 2)"
        trigger: "Opponents interfere over the 2NT enquiry"
        bids:
          - bid: X
            meaning: "= 3!C response (minimum, poor suit)"
          - bid: Pass
            meaning: "= 3!D response (minimum, good suit)"
          - bid: "Any bid"
            meaning: "Ogust off, natural bidding"

  # ── 2NT ────────────────────────────────────
  - bid: 2NT
    hcp: "20-21"
    shape: ["4333", "4432", "5332"]
    responses:
      - bid: 3!C
        meaning: "Puppet Stayman — asks for 5-card major"
        continuations:
          - bid: 3!D
            meaning: "Denies 5-card major, then check for 4-card fits"
          - bid: 3!H
            meaning: "5 hearts"
          - bid: 3!S
            meaning: "5 spades"
      - bid: 3!D
        meaning: "Transfer to !H"
      - bid: 3!H
        meaning: "Transfer to !S"
      - bid: 4NT
        meaning: "Quantitative (inviting 6NT)"
    note: >
      Puppet Stayman fits better over 2NT than 1NT: the auction is
      already at the 3-level, so information leakage matters less,
      and finding the right major-suit game matters more.

  # ── 3-level and above ─────────────────────
  - bid: "3!C / 3!D / 3!H / 3!S"
    name: "Preemptive"
    suit_length: "7+"
    hcp: "~5-10"
    ltc: "7-8 losers (favorable: 8-9; unfavorable: 7)"
    meaning: "Destructive block. Sound at unfavourable vulnerability."

  - bid: 3NT
    name: "Gambling"
    meaning: "AKQxxxx+ in a minor, no outside A or K"

  - bid: "4!H / 4!S"
    meaning: "To play — strong distributional hand or preemptive"

  - bid: "4!C / 4!D"
    meaning: "Strong preempt (8+ card minor, some values)"

  - bid: "5!C / 5!D"
    meaning: "Extreme preempt or to play"

# ──────────────────────────────────────────────
# Defensive Bidding (when opponents open)
# ──────────────────────────────────────────────

competitive:

  # ── Vulnerability and LTC Framework ─────────
  vulnerability_framework:
    name: "Vulnerability-Adjusted Losing Trick Count"
    principle: >
      All defensive bidding actions are governed by Losing Trick Count (LTC)
      adjusted for vulnerability. HCP gives a rough guide, but LTC measures
      offensive potential — the number of tricks your hand can contribute.
      Vulnerability determines how aggressive you can afford to be: cheap
      penalties at favorable allow lighter action; expensive penalties at
      unfavorable demand discipline.
    definitions:
      favorable: "We are Not Vulnerable, they are Vulnerable (NV vs Vul)"
      equal: "Both Vulnerable or both Not Vulnerable"
      unfavorable: "We are Vulnerable, they are Not Vulnerable (Vul vs NV)"
    ltc_adjustment: >
      At favorable vulnerability, act with 1 more loser than standard
      (the penalty for going down is cheap: 50/trick undoubled).
      At unfavorable vulnerability, require 1 fewer loser than standard
      (the penalty is expensive: 100/trick undoubled, 200+ doubled).
      At equal vulnerability, use standard thresholds.
    reference_table:
      - action: "Simple overcall"
        favorable: "9 losers"
        equal: "8 losers"
        unfavorable: "7 losers"
      - action: "Jump overcall (weak)"
        favorable: "10 losers"
        equal: "9 losers"
        unfavorable: "8 losers"
      - action: "Takeout double"
        favorable: "7 losers"
        equal: "6 losers"
        unfavorable: "5 losers"
      - action: "CRASH / CRASH vs 1NT"
        favorable: "9 losers, 5-4+ shape"
        equal: "8 losers, 5-4+ shape"
        unfavorable: "7 losers, 5-5+ shape"
      - action: "Michaels / Unusual 2NT"
        favorable: "9 losers (weak side)"
        equal: "8 losers (weak side)"
        unfavorable: "7 losers or 16+ HCP (strong side only)"
      - action: "RAPTOR 1NT overcall"
        favorable: "9 losers"
        equal: "8 losers"
        unfavorable: "7 losers"
      - action: "Natural overcall at 2-level"
        favorable: "8 losers"
        equal: "7 losers"
        unfavorable: "6 losers"

  # ── Overcalls (general) ────────────────────
  overcalls:
    simple:
      hcp: "8-16"
      suit_length: "5+"
      ltc: "8 losers at equal; 9 at favorable; 7 at unfavorable"
      note: >
        Suit quality matters more than HCP. A 5-card suit headed by two honours
        with 8 losers is a sound overcall. Assess tricks, not points.
    jump_overcall:
      meaning: "Weak — same as a weak two/three opening at the appropriate level"
      ltc: "9 losers at equal; 10 at favorable; 8 at unfavorable"
    takeout_double:
      meaning: "Support for all unbid suits, typically 12+ HCP or any 17+"
      ltc: "6 losers at equal (shape compensates for fewer HCP with good support)"

  # ── RAPTOR ─────────────────────────────────
  raptor:
    name: "RAPTOR Convention"
    trigger: "Overcall of 1NT over opponent's suit opening"
    hcp: "10-16"
    ltc: "8 losers at equal; 9 at favorable; 7 at unfavorable"
    shows:
      - "4 cards in the unbid major"
      - "5+ cards in a minor"
    principle: "Minimax — aiming to sign off, tolerate a suit."
    note: >
      Comes up more frequently than a natural 1NT (15-17) overcall.
      The HCP range is 10-16 because lighter hands pass and stronger
      hands start with a takeout double. LTC is more accurate than HCP
      here because the 4-5+ two-suited shape generates tricks.

    after_opponent_opens_major:
      trigger: "Opponent opens 1!H or 1!S, we overcall 1NT"
      shows: "4 in unbid major + 5+ in a minor"
      responses:
        - bid: "Cue bid (opponent's suit)"
          meaning: "Asks for the major"
        - bid: "2 of other minor"
          meaning: "To play"
        - bid: "2 of unbid major"
          meaning: "Natural, 5+ cards, willing to play"
        - bid: 2NT
          meaning: "Invitational+, asks overcaller's shape"

    after_opponent_opens_minor:
      trigger: "Opponent opens 1!C or 1!D, we overcall 1NT"
      shows: "5+ in other minor + 4 in an unknown major"
      responses:
        - bid: "2!C (cheapest minor)"
          meaning: "Pass or correct to overcaller's minor"
        - bid: "Cue bid (opponent's suit)"
          meaning: "Asks for the major"
        - bid: "2!H / 2!S"
          meaning: "Natural, 5+ cards"
        - bid: 2NT
          meaning: "Invitational+, asks overcaller's shape"

  # ── CRASH over artificial/strong openings ────
  crash:
    name: "CRASH Convention"
    trigger: "Opponents open artificial/strong bid or short/garbage suit (strong 1!C, 2!C, 2!D, short !C 2+, garbage 1!D). NOT against Multi 2!D — use natural bidding instead."
    principle: >
      When opponents open an artificial/strong bid that does not promise a specific
      suit, all four suits are 'unbid'. CRASH provides three two-suited bids organized
      by suit-pairing property: Color, Rank, Shape. The same applies to garbage/short
      openings where the bid does not promise length in the suit.
    definitions:
      Color: "Two same-color suits (!H+!D reds, or !S+!C blacks)"
      Rank: "Two same-rank suits (!H+!S majors, or !C+!D minors)"
      Shape: "Two same-shape suits (!S+!D pointed, or !H+!C rounded)"
    requirements:
      - "5-4+ shape (5-5+ required at unfavorable vulnerability)"
      - "LTC: 8 losers at equal, 9 at favorable, 7 at unfavorable"
      - "At unfavorable: only act with 5-5+ shape and 7 or fewer losers"
      - "At favorable: 5-4 shape with 9 losers is acceptable — disruption value is high"
    vs_strong_2C:
      trigger: "(2!C) - ?"
      bids:
        - bid: X
          meaning: "Color (reds or blacks)"
        - bid: 2!D
          meaning: "Rank (majors or minors)"
        - bid: 2!H
          meaning: "Natural, 5+ hearts"
        - bid: 2!S
          meaning: "Natural, 5+ spades"
        - bid: 2NT
          meaning: "Shape (pointed or rounded)"
    vs_strong_1C:
      trigger: "(1!C) - ?"
      bids:
        - bid: X
          meaning: "Color (reds or blacks)"
        - bid: 1!D
          meaning: "Rank (majors or minors)"
        - bid: 1!H
          meaning: "Natural, 5+ hearts"
        - bid: 1!S
          meaning: "Natural, 5+ spades"
        - bid: 1NT
          meaning: "Shape (pointed or rounded)"
    vs_strong_2D:
      trigger: "(2!D) - ? [strong or garbage 2!D only — NOT Multi 2!D]"
      note: >
        CRASH is excluded against Multi 2!D (weak two in either major). Simulation
        evidence: 40,000 deals show 46.9% MP and 0.8:1 gain/loss ratio — the only
        negative-expectation CRASH scenario. Multi is a preemptive opening; the opener
        is weak (5-10 HCP) with a known 6-card major, reducing CRASH's disruption value.
        Use natural bidding (double/overcall) until a dedicated defense is developed.
      bids:
        - bid: X
          meaning: "Color (reds or blacks)"
        - bid: 2!H
          meaning: "Rank (majors or minors)"
        - bid: 2!S
          meaning: "Natural, 5+ spades"
        - bid: 2NT
          meaning: "Shape (pointed or rounded)"
    vs_garbage_1D:
      trigger: "(1!D) - ? [garbage/short !D, does not promise length]"
      bids:
        - bid: X
          meaning: "Color (reds or blacks)"
        - bid: 1!H
          meaning: "Rank (majors or minors)"
        - bid: 1!S
          meaning: "Natural, 5+ spades"
        - bid: 1NT
          meaning: "Shape (pointed or rounded)"
    advancer_actions:
      title: "Advancer (partner of CRASH bidder)"
      principle: >
        Advancer uses pass/correct to find the right suit. Bid your better suit
        in the shorter possible pair. If you hold equal preference, bid the cheaper suit.
      examples:
        - scenario: "Partner bids Color (reds or blacks), you hold !H:Kxxx !D:xx !S:Jxx !C:xxxx"
          action: "Bid hearts (your better red suit). If partner has blacks, he corrects to !S."
        - scenario: "Partner bids Rank (majors or minors), you hold !H:xx !S:Qxxx !C:Kxxxx !D:x"
          action: "Bid !S (your better major). If partner has minors, he corrects to his minor."

  # ── Defense to opponents' 1NT ────────────────
  defense_vs_1nt:
    name: "CRASH Defense to 1NT (differentiated by strength)"
    principle: >
      Unified CRASH framework extends to 1NT defense. Against weak NT, a penalty
      double is too valuable to sacrifice (opponents are minimum, conversion is
      frequent). Against strong NT, disruption via CRASH is more productive than
      penalty. After a penalty double, if opponents run, revert to natural bidding.

    vs_strong_nt:
      trigger: "(1NT: 15-17) - ?"
      label: "Vs Strong NT (15-17)"
      bids:
        - bid: X
          meaning: "Color (reds or blacks)"
        - bid: 2!C
          meaning: "Rank (majors or minors)"
        - bid: 2!D
          meaning: "Shape (pointed or rounded)"
        - bid: 2!H
          meaning: "Natural, 5+ hearts"
        - bid: 2!S
          meaning: "Natural, 5+ spades"
      note: >
        Pure CRASH. No penalty double — against 15-17, we are unlikely to have
        a big penalty. Disruption and lead direction are more valuable.

    vs_weak_nt:
      trigger: "(1NT: 12-14) - ?"
      label: "Vs Weak NT (12-14)"
      bids:
        - bid: X
          meaning: "Penalty (15+ HCP)"
        - bid: 2!C
          meaning: "Color (reds or blacks)"
        - bid: 2!D
          meaning: "Rank (majors or minors)"
        - bid: 2!H
          meaning: "Natural, 5+ hearts"
        - bid: 2!S
          meaning: "Natural, 5+ spades"
        - bid: 2NT
          meaning: "Shape (pointed or rounded)"
      note: >
        CRASH shifts one step up to make room for penalty double. Shape moves to
        2NT. Against 12-14, the penalty double is high-frequency and lucrative —
        opponents are minimum and unlikely to make 1NT doubled.

    after_penalty_double:
      trigger: "(1NT) - X - Run by opponents"
      principle: "Natural bidding resumes. No CRASH, no special meanings."

    requirements:
      - "5-4+ shape (5-5+ at unfavorable)"
      - "LTC: 8 losers at equal, 9 at favorable, 7 at unfavorable"
      - "Penalty double vs weak NT: 15+ HCP regardless of vulnerability (trick-based, not LTC)"

  # ── Michaels Cuebid ──────────────────────────
  michaels:
    name: "Michaels Cuebid"
    trigger: "Direct cuebid of opponent's natural suit opening"
    requirements:
      - "5-5+ in the two suits shown"
      - "Weak side: 8-9 losers at equal, 9-10 at favorable, 7-8 at unfavorable"
      - "Strong side: 5-6 losers (16+ HCP equivalent)"
      - "Intermediate hands (11-15, 7 losers): overcall first, bid second suit later"
      - "At unfavorable vulnerability, only use weak Michaels with 5-5+ and max 8 losers"
    over_minor:
      trigger: "(1!C) - 2!C or (1!D) - 2!D"
      shows: "Both majors (5-5+)"
      responses:
        - bid: "2!H / 2!S"
          meaning: "To play (preference)"
        - bid: 2NT
          meaning: "Asks for minor; game interest"
        - bid: "3!H / 3!S"
          meaning: "Invitational (4+ card support)"
        - bid: "4!H / 4!S"
          meaning: "To play"
    over_major:
      trigger: "(1!H) - 2!H or (1!S) - 2!S"
      shows: "Other major + unspecified minor (5-5+)"
      responses:
        - bid: "2!S (or 2!H)"
          meaning: "To play in the other major"
        - bid: 2NT
          meaning: "Asks which minor (3!C = clubs, 3!D = diamonds)"
        - bid: "3!C"
          meaning: "Pass or correct (to play in overcaller's minor)"
        - bid: "3 of other major"
          meaning: "Invitational"
        - bid: "4 of other major"
          meaning: "To play"

  # ── Unusual 2NT ──────────────────────────────
  unusual_2nt:
    name: "Unusual 2NT"
    trigger: "Jump to 2NT over opponent's 1-level suit opening"
    shows: "Two lowest unbid suits (5-5+)"
    range: "Same as Michaels: weak (8-9 losers) or strong (5-6 losers)"
    vulnerability_note: >
      Same LTC thresholds as Michaels. At favorable, 9-10 losers acceptable
      (you are bidding at the 2-level with a known fit). At unfavorable,
      only strong Unusual 2NT (5-6 losers) — weak side is too dangerous.
    examples:
      - auction: "(1!C) - 2NT"
        shows: "!D + !H (two lowest unbid)"
      - auction: "(1!D) - 2NT"
        shows: "!C + !H (two lowest unbid)"
      - auction: "(1!H) - 2NT"
        shows: "!C + !D (two lowest unbid = minors)"
      - auction: "(1!S) - 2NT"
        shows: "!C + !D (two lowest unbid = minors)"
    responses:
      - bid: "3 of a minor"
        meaning: "To play (preference)"
      - bid: "4 of a minor"
        meaning: "Invitational or preemptive"
      - bid: 3NT
        meaning: "To play (rare — good stoppers in their suit)"

  # ── Lebensohl after double of weak two ───────
  lebensohl:
    name: "Lebensohl"
    trigger: "Partner doubles opponent's weak two (2!H or 2!S) for takeout"
    principle: >
      Without Lebensohl, advancer cannot distinguish weak (0-7), invitational
      (8-11), and game-forcing (12+) hands. The 2NT relay creates a weak
      channel; direct bids become constructive. Slow Shows, Fast Denies
      resolves the 3NT stopper question.
    advancer_ltc:
      - range: "Weak (0-7 HCP, 10+ losers)"
        action: "Bid 2NT relay → pass or correct at 3-level"
      - range: "Invitational (8-11 HCP, 8-9 losers)"
        action: "Bid directly at 3-level (natural, non-forcing)"
      - range: "Game-forcing (12+ HCP, 7 or fewer losers)"
        action: "Cuebid or direct 3NT"
      - range: "Penalty (any HCP, 5+ strong trumps in opponent's suit)"
        action: "Pass (penalty conversion). Partner leads a trump."
    responses:
      - bid: 2NT
        meaning: "Relay to 3!C (weak hand, 0-7 HCP, 10+ losers)"
        continuations:
          - bid: 3!C
            by: doubler
            meaning: "Forced relay"
          - bid: "Pass / 3!D / 3!H"
            by: advancer
            meaning: "Pass or correct to play in advancer's suit"
      - bid: "direct 3-level suit"
        meaning: "Invitational (8-11 HCP), natural, non-forcing"
      - bid: "cuebid (3 of their suit)"
        meaning: "Game-forcing, asks for stopper in opponent's suit"
      - bid: "direct 3NT"
        meaning: "To play, denies stopper in their suit (Fast Denies)"
      - bid: "2NT then 3NT (after relay)"
        meaning: "To play, shows stopper in their suit (Slow Shows)"
      - bid: Pass
        meaning: "Penalty conversion — 5+ strong trumps (2+ of AKQ) in opponent's suit. Partner leads a trump."
    note: >
      'Slow Shows, Fast Denies' — going through the 2NT relay before bidding 3NT
      shows a stopper (you took the slow route). Bidding 3NT directly denies a
      stopper (fast route). This lets partner judge whether 3NT or a suit game
      is better.

  # ── Defense to Multi 2D (Fighters style) ────
  defense_vs_multi_2D:
    name: "Defense to Multi 2!D (Fighters style)"
    trigger: "(2!D) - ? [Multi 2!D — weak two in either major, 5-10 HCP, 6-card major]"
    principle: >
      Multi 2!D is PREEMPTIVE, not artificial/strong. CRASH is explicitly excluded
      (simulation: 46.9% MP, 0.8:1 gain/loss across 40,000 deals). The key problem
      is ambiguity — which major do they have? The Fighters defense acts minimally
      in direct seat, then uses pass-then-act to compete once the suit is revealed.
    exclusion_note: >
      CRASH was falsified against Multi 2!D by DD simulation. The opener is weak
      (5-10 HCP) with a known 6-card major, so CRASH's suit-pairing disruption adds
      no value. Our side typically holds 20-25 HCP — the goal is to reach the right
      contract, not to disrupt. See contract-bridge/simulation/crash.md.
    direct_seat:
      title: "Direct Seat Actions (immediately over 2!D)"
      bids:
        - bid: X
          meaning: "Fighters double: 12-15 HCP balanced, OR any 19+ HCP"
          continuations:
            - situation: "Doubler has 12-15 balanced"
              advancer: >
                Place the contract: pass (penalty, rare), 2!H/2!S natural to play,
                2NT invitational, 3-level natural.
            - situation: "Doubler has 19+"
              advancer: >
                Doubler bids again strongly: double of their suit = takeout,
                cuebid = game force, jump = natural strong.
        - bid: 2!H
          meaning: "Natural, 5+ hearts, 10+ HCP, good suit"
        - bid: 2!S
          meaning: "Natural, 5+ spades, 10+ HCP, good suit"
        - bid: 2NT
          meaning: "16-18 HCP balanced (systems on — Puppet Stayman, transfers)"
        - bid: 3!C
          meaning: "Natural, good 6+ suit, constructive (opening values)"
        - bid: 3!D
          meaning: "Natural, good 6+ suit, constructive (opening values)"
        - bid: 3!H
          meaning: "Natural, good 6+ suit, constructive (opening values)"
        - bid: 3!S
          meaning: "Natural, good 6+ suit, constructive (opening values)"
        - bid: Pass
          meaning: "Default — most hands. Wait for suit to be revealed."
    phase_2:
      title: "Phase 2 — After Opponent's Suit Is Revealed"
      trigger: "(2!D) - Pass - 2!H/2!S (pass or correct) - ?"
      principle: >
        Once the suit is known, treat exactly as defense to a standard weak two.
        Lebensohl applies (R-BID-021, F-SYS-018). This is the primary advantage
        of pass-then-act: no new convention needed, existing Lebensohl covers it.
      bids:
        - bid: X
          meaning: "Takeout of the revealed major"
        - bid: 2NT
          meaning: "Lebensohl relay to 3!C (weak hand, pass or correct)"
        - bid: "direct 3-level suit"
          meaning: "Invitational (8-11 HCP), natural, non-forcing"
        - bid: "cuebid (3 of their suit)"
          meaning: "Game-forcing, asks stopper"
        - bid: "direct 3NT"
          meaning: "To play (Fast Denies stopper)"
        - bid: "2NT then 3NT"
          meaning: "To play (Slow Shows stopper)"
    examples:
      - scenario: "Multi 2!D, you hold !S:AQ43 !H:K52 !D:J76 !C:A32 (14 HCP balanced)"
        action: "Double (12-15 balanced). Partner places contract."
      - scenario: "Multi 2!D, you hold !S:AKQ2 !H:AK4 !D:K76 !C:Q32 (22 HCP)"
        action: "Double (19+). You will bid again strongly after partner's response."
      - scenario: "Multi 2!D, you hold !S:KQJ84 !H:A3 !D:72 !C:KJ54 (14 HCP)"
        action: "2!S natural (5+ spades, 10+ HCP). Lead-directing and constructive."
      - scenario: "Multi 2!D - Pass - 2!H, you hold !S:AK32 !H:52 !D:KJ76 !C:A32"
        action: "Double (takeout of hearts). Lebensohl applies — partner bids naturally."

  # ── Defense to 5-5 Openings ─────────────────
  defense_vs_55_openings:
    name: "Defense to 5-5 Openings"
    trigger: "(2!H) = 5!H + 5-card minor, or (2!S) = 5!S + 5-card minor"
    principle: >
      The bid major is known — treat as a weak two in that major. Standard weak-two
      defense applies: double = takeout, Lebensohl structures responses. The only
      additional awareness: opener has a 5-card minor, so bid minors cautiously
      (prefer the longer minor when advancer has a choice between two).
    bids:
      - bid: X
        meaning: "Takeout of the bid major. Lebensohl applies."
      - bid: 2NT
        meaning: "16-18 HCP balanced (systems on — Puppet Stayman, transfers)"
      - bid: "new suit"
        meaning: "Natural, constructive (opening values)"
      - bid: "cuebid (3!H over 2!H, 3!S over 2!S)"
        meaning: "Game-forcing, stopper ask"
      - bid: 3NT
        meaning: "To play, with stopper(s)"
    minor_caution: >
      Opener has a 5-card minor. If advancer is choosing between clubs and diamonds,
      prefer the longer one. If equal length, prefer the one less likely to be
      opener's second suit (often unknowable — just bid your longer/stronger minor).
    examples:
      - scenario: "(2!H = 5!H + 5m), you hold !S:KQ43 !H:52 !D:AJ76 !C:K32"
        action: "Double (takeout of hearts). Lebensohl applies if needed."
      - scenario: "(2!S = 5!S + 5m), you hold !S:72 !H:AKJ84 !D:Q3 !C:KJ54"
        action: "3!H natural, constructive (good 5-card suit, opening values)."

  # ── Defense to 3-Level Preempts ──────────────
  defense_vs_3_level_preempts:
    name: "Defense to 3-Level Preempts"
    trigger: "Opponent opens 3!C / 3!D / 3!H / 3!S"
    principle: >
      At the 3-level, double is takeout/cooperative — partner should bid with shape
      and pass with flat defence. New suits at the 3-level are forcing. Lebensohl
      does NOT apply (already at the 3-level, no 2NT relay available).
    bids:
      - bid: X
        meaning: "Takeout/cooperative — asks partner to bid with shape, pass with flat defence"
      - bid: 3NT
        meaning: "To play (requires stopper in their suit)"
      - bid: "new suit at 3-level"
        meaning: "Forcing, natural, good suit"
      - bid: "new suit at 4-level"
        meaning: "To play (not forcing)"
      - bid: 4NT
        meaning: "Unusual — two lowest unbid suits"
    note: >
      Against major preempts, the cooperative double is the key tool — "do something
      intelligent." Against minor preempts, there is more room to bid naturally.
    examples:
      - scenario: "(3!H), you hold !S:AQ43 !H:52 !D:KJ76 !C:A32 (14 HCP, short hearts)"
        action: "Double (takeout). Partner bids best suit."
      - scenario: "(3!D), you hold !S:KQ2 !H:AJ4 !D:QJ76 !C:K32 (16 HCP, diamond stopper)"
        action: "3NT to play."
      - scenario: "(3!C), you hold !S:72 !H:AKJ843 !D:KQ3 !C:54 (13 HCP, good suit)"
        action: "3!H forcing — natural, good suit."

  # ── Defense to 4-Level Preempts ──────────────
  defense_vs_4_level_preempts:
    name: "Defense to 4-Level Preempts"
    trigger: "Opponent opens 4!C / 4!D / 4!H / 4!S"
    principle: >
      The key rule: double of a major preempt at game level = penalty-oriented
      (partner passes unless very distributional). Double of a minor preempt
      below game = takeout (room to find a major fit).
    bids:
      - bid: "X of 4!H / 4!S"
        meaning: "Penalty-oriented (partner passes unless very distributional)"
      - bid: "X of 4!C / 4!D"
        meaning: "Takeout (room to find major fit below game)"
      - bid: "4NT over 4!H / 4!S"
        meaning: "Two-suited takeout (both minors, or any 5-5+)"
      - bid: "5-level"
        meaning: "To play"
    examples:
      - scenario: "(4!S), you hold !S:KJ4 !H:AQ7 !D:K983 !C:A52 (17 HCP, balanced)"
        action: "Double (penalty). Expect to defeat 4!S."
      - scenario: "(4!D), you hold !S:AQ43 !H:KJ76 !D:2 !C:AJ32 (15 HCP, short diamonds)"
        action: "Double (takeout). Partner bids best major."
      - scenario: "(4!H), you hold !S:3 !H:— !D:KQJ876 !C:AQJ54 (extreme shape)"
        action: "4NT (two-suited takeout). Both minors."

  # ── Balancing / Protection ───────────────────
  balancing:
    name: "Balancing (Protection)"
    trigger: "Opponent's bidding dies at a low level — (1x) - P - P - ? or (1x) - P - (2x) - P - P - ?"
    principle: >
      When opponents stop low, partner's pass may trap values behind the opener
      ("borrowing a king from partner"). Act with ~3 HCP less than a direct action.
      Critical at matchpoints — letting opponents play undisturbed at the 1-2 level
      is often a bottom board.
    adjustments:
      - action: "Balancing 1NT"
        range: "~11-14 HCP (not 15-18 like direct seat)"
      - action: "Balancing takeout double"
        range: "10+ HCP (not 12+ like direct seat)"
      - action: "Balancing overcall"
        range: "8+ HCP, reasonable suit"
      - action: "Balancing jump overcall"
        range: "Intermediate (not weak — partner already passed)"
    partner_adjustment: >
      Partner must downgrade by ~3 HCP when responding to a balancing action
      ("return the borrowed king"). Do not jump to game when partner balances
      unless your hand justifies it independently.
    examples:
      - scenario: "(1!S) - Pass - Pass - ?, you hold !S:52 !H:KJ43 !D:A76 !C:Q832 (10 HCP)"
        action: "Double (balancing takeout). Would pass in direct seat (too weak for direct X)."
      - scenario: "(1!H) - Pass - Pass - ?, you hold !S:KQ4 !H:J76 !D:AJ32 !C:Q54 (13 HCP)"
        action: "1NT (balancing, shows ~11-14). Not strong enough for direct 1NT (15-18)."
      - scenario: "(1!D) - Pass - (2!D) - Pass - Pass - ?, you hold !S:AJ84 !H:K43 !D:72 !C:Q832"
        action: "Double (balancing). Partner's pass trapped values."

  # ── Advancing Partner's Overcall ─────────────
  advancing_overcall:
    name: "Advancing Partner's Overcall"
    trigger: "(1x) - 1y/2y [partner overcalls] - Pass/Bid - ?"
    principle: >
      Key insight: cuebid = good raise, jump raise = weak. This reverses what many
      club players assume. Simple raise is competitive (Law of Total Tricks), not
      invitational. New suits are non-forcing.
    bids:
      - bid: "simple raise"
        meaning: "Competitive, 6-9 HCP, 3+ support (Law of Total Tricks, not invitational)"
      - bid: "cuebid of opponent's suit"
        meaning: "Limit raise or better (10+ HCP, 3+ support)"
      - bid: "jump raise"
        meaning: "Preemptive (weak, 4+ support — NOT invitational)"
      - bid: 2NT
        meaning: "Sound constructive raise (9-11 HCP, 3+ support, balanced)"
      - bid: "new suit"
        meaning: "Non-forcing (constructive, but may be passed)"
      - bid: "jump in new suit"
        meaning: "Fit-showing (good suit + support for partner, invitational)"
    examples:
      - scenario: "(1!H) - 1!S - Pass - ?, you hold !S:Q43 !H:72 !D:KJ76 !C:8432 (6 HCP)"
        action: "2!S (simple raise, competitive — not invitational)."
      - scenario: "(1!H) - 1!S - Pass - ?, you hold !S:K43 !H:72 !D:AJ76 !C:K432 (11 HCP)"
        action: "2!H (cuebid = limit raise+). Shows 10+ with spade support."
      - scenario: "(1!H) - 1!S - Pass - ?, you hold !S:QJ43 !H:2 !D:J9763 !C:843 (4 HCP)"
        action: "3!S (jump raise = preemptive, 4 trumps, weak)."
      - scenario: "(1!D) - 1!S - Pass - ?, you hold !S:K3 !H:AQJ84 !D:76 !C:J543 (10 HCP)"
        action: "2!H (new suit, non-forcing). Constructive but partner may pass."

  # ── Advancing Partner's Takeout Double ───────
  advancing_takeout_double:
    name: "Advancing Partner's Takeout Double (of 1-Level)"
    trigger: "(1x) - X - Pass - ?"
    principle: >
      The most common use of a takeout double. Partner has asked you to bid —
      you MUST bid unless you want to convert to penalty. Lebensohl covers
      responses to doubles of weak twos (see Lebensohl section). This section
      covers responses to doubles of 1-level openings.
    bids:
      - bid: "cheapest 4-card suit"
        meaning: "Minimum (0-8 HCP) — forced, even with nothing"
      - bid: "jump in a suit"
        meaning: "Invitational (9-11 HCP), shows real values and 4+ cards"
      - bid: "cuebid of opener's suit"
        meaning: "Game force (12+ HCP), no clear direction — asks doubler to describe"
      - bid: 1NT
        meaning: "6-10 HCP with stopper in opener's suit"
      - bid: 2NT
        meaning: "11-12 HCP with stopper in opener's suit (invitational)"
      - bid: Pass
        meaning: "Penalty conversion (rare — requires 5+ strong trumps in opener's suit)"
    pass_conversion_note: >
      The penalty pass is a powerful but rare weapon. Requirements: 5+ cards in
      opener's suit with good honours (e.g., KQJ9x). Partner must lead a trump.
      Do NOT pass just because you have nothing — bid your cheapest suit instead.
    examples:
      - scenario: "(1!H) - X - Pass - ?, you hold !S:J743 !H:852 !D:964 !C:Q32 (2 HCP)"
        action: "1!S (cheapest 4-card suit). Forced — even with nothing."
      - scenario: "(1!H) - X - Pass - ?, you hold !S:KQ43 !H:52 !D:A76 !C:J832 (10 HCP)"
        action: "2!S (jump = invitational, shows 9-11 and 4+ spades)."
      - scenario: "(1!D) - X - Pass - ?, you hold !S:A43 !H:KJ6 !D:Q74 !C:K832 (13 HCP)"
        action: "2!D (cuebid = game force). Asks partner to describe further."
      - scenario: "(1!H) - X - Pass - ?, you hold !S:43 !H:KQJ97 !D:864 !C:Q32 (8 HCP)"
        action: "Pass (penalty conversion). Strong trumps; partner leads a trump."

  # ── Lead-Directing Doubles ───────────────────
  lead_directing_doubles:
    name: "Lead-Directing Doubles of Artificial Bids"
    trigger: "Opponents make an artificial bid (Stayman, transfer, cuebid, slam)"
    principle: >
      One principle covers all cases: double of an artificial bid always requests
      a lead of that suit. This is free information at zero memory cost.
    bids:
      - bid: "X of Stayman (2!C)"
        meaning: "Lead clubs"
      - bid: "X of transfer (2!D over 1NT)"
        meaning: "Lead diamonds (the suit doubled, not the target major)"
      - bid: "X of transfer (2!H over 1NT)"
        meaning: "Lead hearts (the suit doubled, not the target major)"
      - bid: "X of any cuebid"
        meaning: "Lead the cuebid suit"
      - bid: "X of voluntarily-bid slam"
        meaning: "Lightner double — unusual lead request (NOT your normal lead)"
    lightner_note: >
      Lightner double requests the most unusual lead: typically dummy's first-bid
      suit, or a suit where you can ruff. It explicitly says "do NOT lead the
      normal suit (our suit, or the unbid suit)."
    examples:
      - scenario: "(1NT) - Pass - (2!C Stayman) - X"
        action: "Lead clubs. You hold !C:KQJ84 or similar."
      - scenario: "(1NT) - Pass - (2!D transfer) - X"
        action: "Lead diamonds. You hold !D:AKJ or good diamonds."
      - scenario: "Opponents bid 6!S voluntarily, you double (Lightner)"
        action: "Partner leads dummy's first-bid suit (or the most unusual suit)."

  # ── Defense to Opponents' Transfers over 1NT ─
  defense_vs_transfers:
    name: "Defense to Opponents' Transfers over Their 1NT"
    trigger: "(1NT) - Pass - (2!D/2!H transfer) - ?"
    principle: >
      Extends the lead-directing double principle. Generally be conservative —
      opponents have announced combined 20+ HCP. Only compete with shape or
      strength.
    bids:
      - bid: "X of transfer"
        meaning: "Lead-directing — shows the suit being doubled (not the target major)"
      - bid: "bid of transfer suit"
        meaning: "Natural — you hold that suit (e.g., 2!D over 2!D shows diamonds)"
      - bid: "bid of target suit"
        meaning: "Takeout/lead-directing (showing the other suits)"
    examples:
      - scenario: "(1NT) - Pass - (2!D = transfer to !H) - X"
        action: "Shows diamonds (lead-directing). Bid 2!H if you have hearts (natural)."
      - scenario: "(1NT) - Pass - (2!H = transfer to !S) - 2!S"
        action: "Takeout of spades (the target suit). Showing the other suits."

  # ── Sandwich Position ────────────────────────
  sandwich_position:
    name: "Sandwich Position"
    trigger: "(1x) - Pass - (1y) - ? [sitting between two bidding opponents]"
    principle: >
      Acting between two bidding opponents is dangerous — both have values. Be
      cautious. The key agreement: 1NT in the sandwich position is UNUSUAL
      (showing the two lower unbid suits), NOT natural. Only act with real
      shape or real strength.
    bids:
      - bid: X
        meaning: "Both unbid suits, moderate values (at least opening count)"
      - bid: 1NT
        meaning: "Unusual — two lower unbid suits (NOT natural)"
      - bid: "overcall"
        meaning: "Natural, good suit required (sandwiched between two bidders)"
    caution: >
      The sandwich position is the most dangerous position at the table. Both
      opponents have values, and partner is broke. Only act with extreme shape
      (5-5+) or genuine strength. Light actions here produce catastrophic results.
    examples:
      - scenario: "(1!C) - Pass - (1!H) - ?, you hold !S:KQ43 !H:2 !D:AQJ76 !C:843"
        action: "1NT (unusual — shows diamonds + spades, the two lower unbid)."
      - scenario: "(1!D) - Pass - (1!S) - ?, you hold !S:72 !H:AKJ84 !D:Q3 !C:KJ54"
        action: "2!H (overcall, good suit). Dangerous position but suit quality justifies."

# ──────────────────────────────────────────────
# Defensive Carding
# ──────────────────────────────────────────────

defensive_carding:
  principle: >
    Use your head first, not partner's signals. In most situations,
    the bidding and dummy tell you everything. Signals are a last resort.

  attitude:
    name: "Attitude (Encourage / Discourage)"
    signals:
      - signal: "Low card"
        meaning: "Encouraging — continue this suit"
      - signal: "High card"
        meaning: "Discouraging — please switch"
    exception: >
      When partner leads the Ace, give count (even/odd) instead of attitude.
      If partner wants continuation from AK, he leads the King.

  count:
    name: "Count (Even / Odd)"
    signals:
      - signal: "High card"
        meaning: "Even number of cards"
      - signal: "Low card"
        meaning: "Odd number of cards"
    mnemonic: "From a doubleton (even), play high."

  suit_preference:
    name: "Suit Preference on Discards (Italian Style)"
    signals:
      - discard: "Odd card (3, 5, 7, 9)"
        meaning: "Interest in the suit being discarded"
      - discard: "Low even card (2, 4)"
        meaning: "Interest in the lower-ranking side suit"
      - discard: "High even card (6, 8)"
        meaning: "Interest in the higher-ranking side suit"
    elimination:
      - sequence: "4 then 2"
        meaning: "Denies interest in the lower suit"
      - sequence: "9 then 3"
        meaning: "Denies interest in the discarded suit"
      - sequence: "8 then 6"
        meaning: "Denies interest in the higher suit"
    note: "The higher the discard, the less reliable. The second discard confirms."

  opening_leads:
    rule: "Lead 3rd or 5th highest from length"
    vs_suits: "Prefer top-of-sequence leads. Avoid leading from unsupported honours into declarer's strength."
    vs_nt: "Lead your longest suit unless the bidding clearly shows opponents hold it."

    from_length:
      - holding: "K95"
        lead: "5"
        rule: "3rd highest"
      - holding: "KQ752"
        lead: "2"
        rule: "5th highest"

    from_sequences:
      - holding: "AKx(x)"
        lead: "K (A asks for count)"
      - holding: "KQx(x)"
        lead: "K"
      - holding: "QJx(x)"
        lead: "Q"
      - holding: "JTx(x)"
        lead: "J"
      - holding: "T9x(x)"
        lead: "T"
      - holding: "AKQx(x)"
        lead: "A (then K — showing the sequence)"

    from_short_holdings:
      - holding: "xx"
        lead: "Higher card"
      - holding: "xxx"
        lead: "Middle, then high (MUD)"
      - holding: "xxxx"
        lead: "Highest safe, then low"

    special: >
      If you hold the J, lead 4th highest.
      Example: from KJ732, lead the 3 (not the 2).

# ──────────────────────────────────────────────
# Additional Materials — Hand Evaluation
# ──────────────────────────────────────────────

hand_evaluation:
  principle: >
    High Card Points are the lingua franca of bridge, but HCP alone misjudge
    distributional hands, honour placement, and fit quality. A complete
    evaluation combines HCP with distributional adjustments, Losing Trick Count,
    controls, working honours, and suit quality.

  # ── Milton Work High Card Points ────────────
  hcp:
    name: "Milton Work Point Count"
    origin: "Milton Work, 1929; popularised by Charles Goren"
    values:
      - card: Ace
        points: 4
      - card: King
        points: 3
      - card: Queen
        points: 2
      - card: Jack
        points: 1
    total_deck: 40
    average_per_hand: 10
    guidelines:
      opening: "12+ HCP (or Rule of 20)"
      game_major: "~25 combined HCP with 8+ fit"
      game_minor: "~28-29 combined HCP"
      game_nt: "~25 combined HCP with stoppers"
      slam_small: "~33 combined HCP"
      slam_grand: "~37 combined HCP"
    limitations:
      - "Treats all aces as equal — A opposite KQJ is better than A opposite xxx"
      - "Ignores distribution entirely"
      - "Overvalues unsupported honours (singleton K, doubleton Q)"
      - "Ignores intermediates (tens, nines)"

  # ── Distributional Points ───────────────────
  distributional_points:
    name: "Distributional Adjustments"
    principle: >
      Distribution creates tricks beyond HCP. There are two schools:
      length points (Goren original) count long suits before a fit is found;
      shortness points (Karpin/Bergen) count short suits after a fit is found.
      Both capture the same truth: shape generates tricks.

    length_points:
      name: "Length Points (Goren)"
      rule: "Add 1 point per card beyond four in any suit"
      examples:
        - holding: "5-card suit"
          add: 1
        - holding: "6-card suit"
          add: 2
        - holding: "7-card suit"
          add: 3
      when: "Use when evaluating your hand before a fit is found"

    shortness_points:
      name: "Shortness Points (Dummy Points)"
      rule: "When raising partner's suit, add points for shortness"
      values:
        - holding: "Void"
          add: 5
        - holding: "Singleton"
          add: 3
        - holding: "Doubleton"
          add: 1
      when: "Use only when you have 4+ card support for partner's suit"
      warning: >
        Do not count shortness points when you are the declarer or when
        the short suit contains wasted honours (Qx, Jx).

  # ── Rule of 20 ─────────────────────────────
  rule_of_20:
    name: "Bergen's Rule of 20"
    rule: "Add HCP + length of two longest suits. If total >= 20, open the bidding."
    examples:
      - hand: "!S:AQxxx !H:KJxxx !D:xx !C:x"
        hcp: 11
        lengths: "5+5=10"
        total: 21
        verdict: "Open"
      - hand: "!S:AQxx !H:KJx !D:Qxx !C:xxx"
        hcp: 12
        lengths: "4+3=7"
        total: 19
        verdict: "Pass (flat shape, poor controls)"
    note: >
      The Rule of 20 captures what experienced players feel intuitively:
      distributional hands with good suits open lighter than flat hands
      with scattered honours.

  # ── Working Honours ─────────────────────────
  working_honours:
    name: "Working vs Wasted Honours"
    principle: >
      Honours in partner's suits and in your long suits generate tricks.
      Honours in short suits or in opponent's suits are wasted.
    adjustments:
      - situation: "Honour in partner's suit"
        effect: "+1 (the honour is working)"
      - situation: "Honour in opponent's bid suit"
        effect: "-1 (likely not pulling weight on offense)"
      - situation: "Singleton honour (K, Q, J alone)"
        effect: "-2 (cannot develop tricks, may be captured)"
      - situation: "Doubleton honour (Qx, Jx)"
        effect: "-1 (needs partner's help to be worth anything)"
      - situation: "Aces and Kings"
        effect: "Always working — they take tricks regardless"
    note: >
      AK opposite xxx is worth more than QJ opposite QJ. Always upgrade
      hands with aces and downgrade hands with queens and jacks in isolation.

  # ── Controls ────────────────────────────────
  controls:
    name: "Control Count"
    values:
      - card: Ace
        controls: 2
      - card: King
        controls: 1
    rule: >
      An average hand has 4 controls. Hands with 5+ controls are slam-oriented;
      hands with 3 or fewer are defensive.
    italian_method: >
      The Italian school (Blue Team) valued controls over HCP for slam bidding.
      A hand with 14 HCP but only 2 controls (two kings, no aces) is dangerous
      at the 5-level. A hand with 12 HCP and 5 controls (two aces + one king)
      is a powerful slam hand.
    note: >
      Our 2!D Game Force response already uses controls (A=2, K=1) as the
      first step. This extends the philosophy to all slam evaluation.

  # ── Honour Combinations ─────────────────────
  honour_combinations:
    name: "Honour Combinations and Intermediates"
    principle: >
      Honours working together generate tricks. AKQ in one suit is worth
      more than A, K, Q spread across three suits. Intermediates (T, 9)
      fill out suits and prevent losers.
    examples:
      - holding: "AKJTx"
        note: "Almost certainly 5 tricks — the T fills beautifully"
      - holding: "AKxxx"
        note: "Only 3 sure tricks — needs 3-2 break for 4"
      - holding: "QJT9x"
        note: "Self-sufficient opposite any doubleton — 3 tricks likely"
      - holding: "Qxxxx"
        note: "Generates tricks only with partner's help"
    adjustment_rules:
      - "Add 1 for each ten in a suit with higher honours"
      - "Add 1 for AK or KQ tight (honours reinforce each other)"
      - "Subtract 1 for QJ or Jx without support from higher cards"

  # ── Suit Quality Test ───────────────────────
  suit_quality_test:
    name: "Suit Quality Test (SQT)"
    rule: "SQT = suit length + number of honour cards (A, K, Q, J, T) in the suit"
    principle: >
      A suit is biddable at the N-level if SQT >= N + number of tricks you need.
      Useful for overcalls, preempts, and competitive decisions.
    examples:
      - suit: "KQJ9xxx"
        sqt: 11
        comment: "SQT 11 — strong enough for a 3-level preempt at any vulnerability"
      - suit: "Qxxxxx"
        sqt: 7
        comment: "SQT 7 — marginal for a 2-level weak two; fine at favorable"
      - suit: "AKJTx"
        sqt: 9
        comment: "SQT 9 — excellent 5-card overcall suit"
      - suit: "Jxxxx"
        sqt: 6
        comment: "SQT 6 — do not overcall with this suit"
    note: >
      A suit with SQT >= 10 is self-sufficient (generates tricks without
      partner's help). A suit with SQT < 7 should rarely be bid voluntarily.

  # ── Adjust-3 Method ────────────────────────
  adjust_3:
    name: "Adjust-3 (Quick Revaluation)"
    rule: >
      After a fit is found, add 1 point for each trump beyond the eighth,
      add 1 for a side singleton, add 1 for a side void, and subtract 1
      for each flat-hand indicator (4333).
    note: >
      Designed as a quick mental adjustment at the table, not a precise
      calculation. The point is to revalue your hand dynamically after
      new information (partner's bid, fit discovery, opponent's bid).

  # ── Playing Tricks vs Defensive Tricks ──────
  playing_vs_defensive:
    name: "Playing Tricks vs Defensive Tricks"
    principle: >
      A hand has playing tricks (tricks it can take as declarer) and defensive
      tricks (tricks it can take defending). Distributional hands have many
      playing tricks but few defensive. Balanced hands have defensive tricks
      but limited playing tricks.
    guidelines:
      - "Aces and kings are both playing and defensive"
      - "Long suits add playing tricks but not defensive"
      - "Queens and jacks in short suits add defensive tricks but not playing"
      - "Voids add playing tricks (via ruffs) but zero defensive"
    practical: >
      This distinction matters in competitive auctions. When deciding
      'bid or double', count your defensive tricks. If you have 2 or fewer
      defensive tricks, bidding is usually right. If you have 4+, doubling
      pays better.

  # ── Summary ─────────────────────────────────
  summary:
    - tool: "HCP"
      best_for: "Opening bids, NT ranges, first approximation"
      limitation: "Ignores distribution"
    - tool: "Distributional points"
      best_for: "Suit contracts, revaluation after fit"
      limitation: "Meaningless in NT"
    - tool: "Rule of 20"
      best_for: "Marginal opening decisions"
      limitation: "Doesn't account for vulnerability or seat"
    - tool: "Working honours"
      best_for: "Revaluation during the auction"
      limitation: "Requires information from bidding"
    - tool: "Controls"
      best_for: "Slam evaluation"
      limitation: "Ignores suit quality"
    - tool: "SQT"
      best_for: "Overcalls, preempts, competitive bids"
      limitation: "Suit-specific, not whole-hand"
    - tool: "Losing Trick Count"
      best_for: "Suit contracts, competitive decisions, slam tries"
      limitation: "Unreliable in NT; assumes a trump fit"

# ──────────────────────────────────────────────
# Additional Materials — Losing Trick Count
# ──────────────────────────────────────────────

losing_trick_count:
  principle: >
    The Losing Trick Count evaluates hand strength by counting losers —
    cards that will not win tricks even in the best case. It is more
    accurate than HCP for suit contracts, especially for distributional
    hands and competitive decisions. The formula: 24 minus combined
    losers equals the number of tricks the partnership can expect.

  # ── Counting Rules ──────────────────────────
  counting_rules:
    name: "How to Count Losers"
    rule: >
      Examine only the top three cards in each suit. Each missing top
      honour (Ace, King, Queen) in the top three is one loser.
      A void has 0 losers. A singleton has at most 1 loser.
      A doubleton has at most 2 losers.
    maximum_per_suit:
      - length: "Void"
        max_losers: 0
      - length: "Singleton"
        max_losers: 1
      - length: "Doubleton"
        max_losers: 2
      - length: "3+ cards"
        max_losers: 3
    note: >
      Only the top three matter. AKQxxxx has 0 losers, not negative losers.
      Jxxxx has 3 losers, same as xxxxx. The jack does not reduce the count
      in standard LTC (but see NLTC adjustments below).

  # ── Loser Table ─────────────────────────────
  loser_table:
    title: "Standard LTC — Losers per Holding"
    entries:
      - holding: "—"
        losers: 0
        note: "Void"
      - holding: "A"
        losers: 0
        note: ""
      - holding: "K"
        losers: 1
        note: "Singleton K counts as 1 (may be captured)"
      - holding: "Q"
        losers: 1
        note: "Singleton Q counts as 1 (usually lost)"
      - holding: "x"
        losers: 1
        note: "Small singleton"
      - holding: "AK"
        losers: 0
        note: ""
      - holding: "AQ"
        losers: 0.5
        note: "Half loser (finesse dependent)"
      - holding: "Ax"
        losers: 1
        note: ""
      - holding: "KQ"
        losers: 1
        note: ""
      - holding: "Kx"
        losers: 1
        note: ""
      - holding: "Qx"
        losers: 2
        note: "Very likely both lost without help"
      - holding: "xx"
        losers: 2
        note: ""
      - holding: "AKQ"
        losers: 0
        note: ""
      - holding: "AKx"
        losers: 1
        note: ""
      - holding: "AQx"
        losers: 1
        note: "Half loser rounded up; finesse for Q"
      - holding: "Axx"
        losers: 2
        note: ""
      - holding: "KQx"
        losers: 1
        note: ""
      - holding: "Kxx"
        losers: 2
        note: ""
      - holding: "Qxx"
        losers: 2.5
        note: "The queen rarely takes a trick without support"
      - holding: "xxx"
        losers: 3
        note: "Maximum losers for any holding"

  # ── The 24-Minus Formula ────────────────────
  formula:
    name: "Combined Loser Count → Expected Tricks"
    rule: "24 minus (opener's losers + responder's losers) = expected tricks"
    examples:
      - opener_losers: 7
        responder_losers: 9
        combined: 16
        tricks: 8
        level: "2-level (partscore)"
      - opener_losers: 7
        responder_losers: 7
        combined: 14
        tricks: 10
        level: "4-level (game in major)"
      - opener_losers: 5
        responder_losers: 7
        combined: 12
        tricks: 12
        level: "6-level (small slam)"
      - opener_losers: 4
        responder_losers: 7
        combined: 11
        tricks: 13
        level: "7-level (grand slam)"
    note: >
      The formula assumes an 8+ card trump fit and normal breaks.
      Adjust -1 trick for bad breaks, +1 for known favourable position
      (e.g., finesse is onside based on bidding).

  # ── Cover Cards and Fillers ─────────────────
  cover_cards:
    name: "Cover Cards"
    principle: >
      A cover card is a card that covers one of partner's losers —
      typically an ace or king in the right suit. When partner opens
      and you hold fitting honours, count cover cards rather than HCP
      to decide whether to bid game or slam.
    example: >
      Partner opens 1!S showing 5+ spades. You hold
      !S:Kxxx !H:Axx !D:xxxx !C:xx (9 HCP, 9 losers).
      Count cover cards for partner's likely hand: the !S:K covers one spade
      loser, the !H:A covers a heart loser — 2 cover cards.
      If partner has 7 losers, combined = 14 - 2 = 12 tricks? No —
      the loser count method is more accurate. 24 - (7+9) = 8 tricks.
      But if partner's 7-loser hand has specific losers in hearts and spades,
      your covers are perfectly placed.
    note: >
      Cover cards are a qualitative supplement to LTC, not a replacement.
      They help when LTC says 'borderline' — good cover cards tip toward bidding.

  # ── LTC by Bidding Action ───────────────────
  ltc_by_bidding:
    title: "Typical Loser Count by Common Bidding Actions"
    actions:
      - action: "Open at the 1-level"
        typical_losers: "7 (range 5-8)"
      - action: "Minimum response (6-9 HCP)"
        typical_losers: "9-10"
      - action: "Invitational raise (10-12)"
        typical_losers: "8"
      - action: "Game-forcing response (12+)"
        typical_losers: "7 or fewer"
      - action: "Preemptive opening (weak two)"
        typical_losers: "8-9"
      - action: "Preemptive opening (3-level)"
        typical_losers: "8-9 (7+ card suit)"
      - action: "Strong 2!C opening"
        typical_losers: "4-5"
      - action: "Strong 2!D opening (game force)"
        typical_losers: "3-4"
      - action: "Overcall (simple)"
        typical_losers: "7-8"
      - action: "Takeout double"
        typical_losers: "6 (shape compensates)"

  # ── Klinger's Adjustments ───────────────────
  klinger_adjustments:
    name: "Ron Klinger's Queen Adjustments"
    principle: >
      Standard LTC overvalues queens. Klinger suggested adjustments:
      a guarded queen (Qxx+) in a bid suit is worth half a loser less;
      a singleton or doubleton queen is worth nothing.
    adjustments:
      - situation: "Qxx+ in partner's bid suit"
        adjustment: "Subtract 0.5 losers"
      - situation: "Qxx+ in your own long suit"
        adjustment: "Subtract 0.5 losers"
      - situation: "Singleton Q"
        adjustment: "Count as 1 full loser (same as singleton x)"
      - situation: "Doubleton Qx"
        adjustment: "Count as 2 losers (queen is unlikely to take a trick)"

  # ── New Losing Trick Count (NLTC) ──────────
  nltc:
    name: "New Losing Trick Count (Koelman)"
    principle: >
      NLTC refines the standard count by weighting losers: an ace loser
      (missing the ace) costs more than a queen loser (missing the queen),
      because aces take tricks independently while queens need support.
    weights:
      - missing: "Ace"
        loser_value: 1.5
      - missing: "King"
        loser_value: 1.0
      - missing: "Queen"
        loser_value: 0.5
    formula: "26 minus combined NLTC losers = expected tricks"
    note: >
      NLTC is more accurate than standard LTC for slam hands. For
      routine game decisions, standard LTC is sufficient. Use NLTC
      when deciding between game and slam.

  # ── When LTC Works and When It Fails ────────
  reliability:
    name: "Reliability and Limitations"
    works_well:
      - "Suit contracts with an 8+ card trump fit"
      - "Competitive decisions (bid vs pass vs double)"
      - "Slam exploration in suit contracts"
      - "Evaluating distributional hands that HCP undervalue"
    fails:
      - "Notrump contracts (distribution doesn't generate ruffs)"
      - "Misfits (no 8-card fit; losers don't cancel)"
      - "Very short suits opposite very long suits (duplication)"
      - "Hands where the opponents' lead kills a critical entry"
    note: >
      LTC is a planning tool, not an oracle. It tells you the expected
      trick count assuming normal play and reasonable breaks. At the table,
      always count your actual tricks before committing.

  # ── LTC vs HCP: When to Use Each ───────────
  ltc_vs_hcp:
    title: "LTC vs HCP Decision Guide"
    comparisons:
      - situation: "Opening the bidding"
        prefer: "HCP (Rule of 20 for borderline)"
        reason: "LTC requires a fit to be meaningful"
      - situation: "Raising partner's suit"
        prefer: "LTC"
        reason: "Fit is confirmed; LTC measures playing strength"
      - situation: "Notrump bidding"
        prefer: "HCP"
        reason: "LTC assumes ruffs; NT relies on high cards and stoppers"
      - situation: "Competitive decisions"
        prefer: "LTC"
        reason: "Distributional hands overbid by LTC less than by HCP"
      - situation: "Slam investigation"
        prefer: "LTC (NLTC for precision)"
        reason: "Controls and playing tricks matter, not scattered queens"
      - situation: "Penalty doubles"
        prefer: "HCP + defensive tricks"
        reason: "You need quick tricks, not playing tricks"
